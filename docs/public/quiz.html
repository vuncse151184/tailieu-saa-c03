 these requirements with the LEAST operational overhead?"},{"id":189,"options":[{"letter":"A","text":"Implement a client VPN."},{"letter":"B","text":"Implement AWS Direct Connect."},{"letter":"C","text":"Implement a bastion host on Amazon EC2."},{"letter":"D","text":"Implement an AWS Site-to-Site VPN connection."}],"answer":["D"],"question":"A company needs a secure connection between its on-premises environment and AWS. This connection does not need high bandwidth and will handle a small amount of traffic. The connection should be set up quickly.\nWhat is the MOST cost-effective method to establish this type of connection?"},{"id":190,"options":[{"letter":"A","text":"Use an Amazon S3 bucket to store the datasets. Use Amazon Athena to perform SQL JOIN queries to find connections."},{"letter":"B","text":"Use Amazon Neptune to store the datasets with edges and vertices. Query the data to find connections."},{"letter":"C","text":"Use Amazon RDS to store the datasets with multiple tables. Perform SQL JOIN queries to find connections."},{"letter":"D","text":"Use an Amazon S3 bucket to store the datasets. Use Amazon QuickSight to visualize connections."}],"answer":["B"],"question":"A company has 5 TB of datasets. The datasets consist of 1 million user profiles and 10 million connections. The user profiles have connections as many-to-many relationships. The company needs a performance efficient way to find mutual connections up to five levels.\nWhich solution will meet these requirements?"},{"id":191,"options":[{"letter":"A","text":"Store objects in Amazon S3 Glacier. Use S3 Select to provide applications with access to the data."},{"letter":"B","text":"Transition objects to the S3 Standard-Infrequent Access (S3 Standard-IA) storage class. Create an AWS Lambda function to transition objects to the S3 Standard storage class when they are accessed by an application."},{"letter":"C","text":"Create an S3 Lifecycle rule to transition objects to the S3 Intelligent-Tiering storage class."},{"letter":"D","text":"Use data from S3 storage class analysis to create S3 Lifecycle rules to automatically transition objects to the S3 Standard-Infrequent Access (S3 Standard-IA) storage class."}],"answer":["C"],"question":"A company uses an Amazon S3 bucket as its data lake storage platform. The S3 bucket contains a massive amount of data that is accessed randomly by multiple teams and hundreds of applications. The company wants to reduce the S3 storage costs and provide immediate availability for frequently accessed objects.\nWhat is the MOST operationally efficient solution that meets these requirements?"},{"id":192,"options":[{"letter":"A","text":"Configure the existing schedule to stop the EC2 instance at the completion of the job and restart the EC2 instance when the next job starts."},{"letter":"B","text":"Use AWS App2Container (A2C) to containerize the job. Install the container in the existing Amazon Machine Image (AMI). Ensure that the schedule stops the container when the task finishes."},{"letter":"C","text":"Copy the code into an AWS Lambda function that has 1 GB of memory. Create an Amazon EventBridge scheduled rule to run the code each hour."},{"letter":"D","text":"Use AWS App2Container (A2C) to containerize the job. Run the job as an Amazon Elastic Container Service (Amazon ECS) task on AWS Fargate with 0.5 virtual CPU (vCPU) and 1 GB of memory."}],"answer":["C"],"question":"A company runs a Java-based job on an Amazon EC2 instance. The job runs every hour and takes 10 seconds to run. The job runs on a scheduled interval and consumes 1 GB of memory. The CPU utilization of the instance is low except for short surges during which the job uses the maximum CPU available. The company wants to optimize the costs to run the job.\nWhich solution will meet these requirements?"},{"id":193,"options":[{"letter":"A","text":"Configure the cluster to use the Aurora Standard storage configuration."},{"letter":"B","text":"Configure the cluster storage type as Provisioned IOPS."},{"letter":"C","text":"Configure the cluster storage type as General Purpose."},{"letter":"D","text":"Configure the cluster to use the Aurora I/O-Optimized storage configuration."}],"answer":["D"],"question":"A company is planning to deploy its application on an Amazon Aurora PostgreSQL Serverless v2 cluster. The application will receive large amounts of traffic. The company wants to optimize the storage performance of the cluster as the load on the application increases.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":194,"options":[{"letter":"A","text":"Deploy an identity provider (IdP) on Amazon EC2. Link the IdP as an identity source within AWS IAM Identity Center."},{"letter":"B","text":"Use AWS Directory Service and create a two-way trust relationship with the company's self-managed Active Directory."},{"letter":"C","text":"Enable AWS IAM Identity Center. Configure a two-way forest trust relationship to connect the company's self-managed Active Directory with IAM Identity Center by using AWS Directory Service for Microsoft Active Directory."},{"letter":"D","text":"Create an Enterprise Edition Active Directory in AWS Directory Service for Microsoft Active Directory. Configure the Active Directory to be the identity source for AWS IAM Identity Center."}],"answer":["C"],"question":"A company is migrating applications from an on-premises Microsoft Active Directory that the company manages to AWS. The company deploys the applications in multiple AWS accounts. The company uses AWS Organizations to manage the accounts centrally.\nThe company's security team needs a single sign-on solution across all the company's AWS accounts. The company must continue to manage users and groups that are in the on-premises Active Directory.\nWhich solution will meet these requirements?"},{"id":195,"options":[{"letter":"A","text":"Migrate the data to the S3 bucket. Use server-side encryption with Amazon S3 managed keys (SSE-S3). Use the built-in key rotation behavior of SSE-S3 encryption keys."},{"letter":"B","text":"Create an AWS Key Management Service (AWS KMS) customer managed key. Enable automatic key rotation. Set the S3 bucket's default encryption behavior to use the customer managed KMS key. Migrate the data to the S3 bucket."},{"letter":"C","text":"Create an AWS Key Management Service (AWS KMS) customer managed key. Set the S3 bucket's default encryption behavior to use the customer managed KMS key. Migrate the data to the S3 bucket. Manually rotate the KMS key every year."},{"letter":"D","text":"Use customer key material to encrypt the data. Migrate the data to the S3 bucket. Create an AWS Key Management Service (AWS KMS) key without key material. Import the customer key material into the KMS key. Enable automatic key rotation."}],"answer":["B"],"question":"A company is planning to migrate data to an Amazon S3 bucket. The data must be encrypted at rest within the S3 bucket. The encryption key must be rotated automatically every year.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":196,"options":[{"letter":"A","text":"Deploy the application to EC2 instances that run in an Auto Scaling group behind an Application Load Balancer. Create an Amazon Redshift cluster that has multiple MySQL-compatible nodes."},{"letter":"B","text":"Deploy the application to EC2 instances that are configured as a target group behind an Application Load Balancer. Create an Amazon RDS for MySQL cluster that has multiple instances."},{"letter":"C","text":"Deploy the application to EC2 instances that run in an Auto Scaling group behind an Application Load Balancer. Create an Amazon Aurora Serverless MySQL cluster for the database layer."},{"letter":"D","text":"Deploy the application to EC2 instances that are configured as a target group behind an Application Load Balancer. Create an Amazon ElastiCache for Redis cluster that uses the MySQL connector."}],"answer":["C"],"question":"A company has an application that runs on a single Amazon EC2 instance. The application uses a MySQL database that runs on the same EC2 instance. The company needs a highly available and automatically scalable solution to handle increased traffic.\nWhich solution will meet these requirements?"},{"id":197,"options":[{"letter":"A","text":"Use an Application Load Balancer with a certificate attached from AWS Certificate Manager (ACM). Use query parameter-based routing."},{"letter":"B","text":"Use a Network Load Balancer with a certificate attached from AWS Certificate Manager (ACM). Use query parameter-based routing."},{"letter":"C","text":"Use a Gateway Load Balancer. Import a generated certificate in AWS Identity and Access Management (IAM). Attach the certificate to the load balancer. Use HTTP path-based routing."},{"letter":"D","text":"Use a Network Load Balancer. Import a generated certificate in AWS Identity and Access Management (IAM). Attach the certificate to the load balancer. Use query parameter-based routing."}],"answer":["A"],"question":"A robotics company is designing a solution for medical surgery. The robots will use advanced sensors, cameras, and AI algorithms to perceive their environment and to complete surgeries.\nThe company needs a public load balancer in the AWS Cloud that will ensure seamless communication with backend services. The load balancer must be capable of routing traffic based on the query strings to different target groups. The traffic must also be encrypted.\nWhich solution will meet these requirements?"},{"id":198,"options":[{"letter":"A","text":"Create AWS Config items for the customers."},{"letter":"B","text":"Create AWS Systems Manager templates for the customers."},{"letter":"C","text":"Create AWS Service Catalog products for the customers."},{"letter":"D","text":"Create AWS CloudFormation templates for the customers."}],"answer":["C"],"question":"A consulting company provides professional services to customers worldwide. The company provides solutions and tools for customers to expedite gathering and analyzing data on AWS. The company needs to centrally manage and deploy a common set of solutions and tools for customers to use for self-service purposes.\nWhich solution will meet these requirements?"},{"id":199,"options":[{"letter":"A","text":"Establish a VPN connection from the VPC to Salesforce. Use AWS Glue DataBrew to transfer data."},{"letter":"B","text":"Establish an AWS Direct Connect connection from the VPC to Salesforce. Use AWS Glue DataBrew to transfer data."},{"letter":"C","text":"Create a VPC peering connection to Salesforce. Use Amazon AppFlow to transfer data."},{"letter":"D","text":"Create an AWS PrivateLink connection in the VPC to Salesforce. Use Amazon AppFlow to transfer data."}],"answer":["D"],"question":"A company uses Salesforce. The company needs to load existing data and ongoing data changes from Salesforce to Amazon Redshift for analysis. The company does not want the data to travel over the public internet.\nWhich solution will meet these requirements with the LEAST development effort?"},{"id":200,"options":[{"letter":"A","text":"Create a container image for the cron jobs. Use Amazon EventBridge Scheduler to create a recurring schedule. Run the cron job tasks as AWS Lambda functions."},{"letter":"B","text":"Create a container image for the cron jobs. Create a workflow in AWS Step Functions that uses a Wait state to run the cron jobs at a specified time. Use the RunTask action to run the cron job tasks on AWS Fargate."},{"letter":"C","text":"Create a container image for the cron jobs. Use AWS Batch on Amazon Elastic Container Service (Amazon ECS) with a scheduling policy to run the cron jobs."},{"letter":"D","text":"Create a container image for the cron jobs. Use Amazon EventBridge Scheduler to create a recurring schedule. Run the cron job tasks on AWS ECS Fargate."}],"answer":["D"],"question":"A company is migrating a legacy application from an on-premises data center to AWS. The application relies on hundreds of cron jobs that run between 1 and 20 minutes on different recurring schedules throughout the day.\nThe company wants a solution to schedule and run the cron jobs on AWS with minimal refactoring. The solution must support running the cron jobs in response to an event in the future.\nWhich solution will meet these requirements?"},{"id":201,"options":[{"letter":"A","text":"Create an AWS Lambda function that uses gzip compression to compress the large objects as they are written to a DynamoDB table."},{"letter":"B","text":"Split all incoming large data into a collection of items that have the same partition key. Write the data to a DynamoDB table in a single operation by using the BatchWriteItem API operation."},{"letter":"C","text":"Store the large data as objects in an Amazon S3 bucket. In a DynamoDB table, create an item that has an attribute that points to the S3 URL of the data."},{"letter":"D","text":"Create an AWS Lambda function to filter the data that exceeds DynamoDB item size limits. Store the larger data in an Amazon DocumentDB (with MongoDB compatibility) database."}],"answer":["C"],"question":"A company’s application is receiving data from multiple data sources. The size of the data varies and is expected to increase over time. The current maximum size is 700 KB. The data volume and data size continue to grow as more data sources are added.\nThe company decides to use Amazon DynamoDB as the primary database for the application. A solutions architect needs to identify a solution that handles the large data sizes.\nWhich solution will meet these requirements in the MOST operationally efficient way?"},{"id":202,"options":[{"letter":"A","text":"Create an AWS Direct Connect connection to the application for data ingestion. Create Amazon Kinesis Data Firehose delivery streams to consume direct PUT operations from the application. Specify the S3 bucket as the destination of the delivery streams."},{"letter":"B","text":"Create database migration tasks in AWS Database Migration Service (AWS DMS). Specify replication instances of the EC2 instances as the source endpoints. Specify the S3 bucket as the target endpoint. Set the migration type to migrate existing data and replicate ongoing changes."},{"letter":"C","text":"Create Amazon Kinesis data streams for data ingestion. Create Amazon Kinesis Data Firehose delivery streams to consume the Kinesis data streams. Specify the S3 bucket as the destination of the delivery streams."},{"letter":"D","text":"Create and configure AWS DataSync agents on the EC2 instances. Configure DataSync tasks to transfer data from the EC2 instances to the S3 bucket."}],"answer":["C"],"question":"A company's application runs on Amazon EC2 instances that are in multiple Availability Zones. The application needs to ingest real-time data from third-party applications.\nThe company needs a data ingestion solution that places the ingested raw data in an Amazon S3 bucket.\nWhich solution will meet these requirements?"},{"id":203,"options":[{"letter":"A","text":"Provide the extracted insights to Amazon Comprehend for analysis. Save the analysis to an Amazon S3 bucket."},{"letter":"B","text":"Store the extracted insights in an Amazon DynamoDB table. Use Amazon SageMaker to build a sentiment model."},{"letter":"C","text":"Provide the extracted insights to Amazon Athena for analysis. Store the extracted insights and analysis in an Amazon S3 bucket."},{"letter":"D","text":"Store the extracted insights in an Amazon S3 bucket. Use Amazon QuickSight to visualize and analyze the data."}],"answer":["A"],"question":"A marketing team wants to build a campaign for an upcoming multi-sport event. The team has news reports from the past five years in PDF format. The team needs a solution to extract insights about the content and the sentiment of the news reports. The solution must use Amazon Textract to process the news reports.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":204,"options":[{"letter":"A","text":"Create a VPC peering connection between the eu-west-1 VPC and the ap-southeast-2 VPC. Create an inbound rule in the eu-west-1 application security group that allows traffic from the database server IP addresses in the ap-southeast-2 security group."},{"letter":"B","text":"Configure a VPC peering connection between the ap-southeast-2 VPC and the eu-west-1 VPC. Update the subnet route tables. Create an inbound rule in the ap-southeast-2 database security group that references the security group ID of the application servers in eu-west-1."},{"letter":"C","text":"Configure a VPC peering connection between the ap-southeast-2 VPC and the eu-west-1 VPC. Update the subnet route tables. Create an inbound rule in the ap-southeast-2 database security group that allows traffic from the eu-west-1 application server IP addresses."},{"letter":"D","text":"Create a transit gateway with a peering attachment between the eu-west-1 VPC and the ap-southeast-2 VPC. After the transit gateways are properly peered and routing is configured, create an inbound rule in the database security group that references the security group ID of the application servers in eu-west-1."}],"answer":["B"],"question":"A global marketing company has applications that run in the ap-southeast-2 Region and the eu-west-1 Region. Applications that run in a VPC in eu-west-1 need to communicate securely with databases that run in a VPC in ap-southeast-2.\nWhich network design will meet these requirements?"},{"id":205,"options":[{"letter":"A","text":"Create a standard accelerator in AWS Global Accelerator. Configure the existing NLBs as target endpoints."},{"letter":"B","text":"Create Application Load Balancers (ALBs) in each Region to replace the existing NLBs. Register the existing EC2 instances as targets for the ALBs in each Region."},{"letter":"C","text":"Create additional NLBs and EC2 instances in other Regions where the company has large customer bases."},{"letter":"D","text":"Configure Amazon Route 53 to route equally weighted traffic to the NLBs in each Region."}],"answer":["A"],"question":"An online gaming company hosts its platform on Amazon EC2 instances behind Network Load Balancers (NLBs) across multiple AWS Regions. The NLBs can route requests to targets over the internet. The company wants to improve the customer playing experience by reducing end-to-end load time for its global customer base.\nWhich solution will meet these requirements?"},{"id":206,"options":[{"letter":"A","text":"Use AWS Lambda functions to run the application. Use Amazon Simple Queue Service (Amazon SQS) to retrieve the messages."},{"letter":"B","text":"Migrate the container application to Amazon Elastic Kubernetes Service (Amazon EKS). Use Amazon MQ to retrieve the messages."},{"letter":"C","text":"Migrate the container application to Amazon Elastic Container Service (Amazon ECS). Use Amazon Simple Queue Service (Amazon SQS) to retrieve the messages."},{"letter":"D","text":"Use highly available Amazon EC2 instances to run the application. Use Amazon MQ to retrieve the messages."}],"answer":["B"],"question":"A company runs a container application on a Kubernetes cluster in the company's data center. The application uses Advanced Message Queuing Protocol (AMQP) to communicate with a message queue. The data center cannot scale fast enough to meet the company’s expanding business needs. The company wants to migrate the workloads to AWS.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":207,"options":[{"letter":"A","text":"Create an A Record for the development website that has the value set to the ALB. Create a listener rule on the ALB that forwards requests for the development website to the target group that contains the development instance."},{"letter":"B","text":"Recreate the development instance with a public IP address. Create an A Record for the development website that has the value set to the public IP address of the development instance."},{"letter":"C","text":"Create an A Record for the development website that has the value set to the ALB. Create a listener rule on the ALB to redirect requests for the development website to the public IP address of the development instance."},{"letter":"D","text":"Place all the instances in the same target group. Create an A Record for the development website. Set the value to the ALB. Create a listener rule on the ALB that forwards requests for the development website to the target group."}],"answer":["A"],"question":"A solutions architect runs a web application on multiple Amazon EC2 instances that are in individual target groups behind an Application Load Balancer (ALB). Users can reach the application through a public website.\nThe solutions architect wants to allow engineers to use a development version of the website to access one specific development EC2 instance to test new features for the application. The solutions architect wants to use an Amazon Route 53 hosted zone to give the engineers access to the development instance. The solution must automatically route to the development instance even if the development instance is replaced.\nWhich solution will meet these requirements?"},{"id":208,"options":[{"letter":"A","text":"Use Amazon Elastic Container Service (Amazon ECS) on AWS Fargate to run the job. Create a scheduled task based on the container image of the job to run every 10 minutes."},{"letter":"B","text":"Use AWS Batch to create a job that uses AWS Fargate resources. Configure the job scheduling to run every 10 minutes."},{"letter":"C","text":"Create an AWS Lambda function based on the container image of the job. Configure Amazon EventBridge to invoke the function every 10 minutes."},{"letter":"D","text":"Use Amazon Elastic Container Service (Amazon ECS) on AWS Fargate to run the job. Create a standalone task based on the container image of the job. Use Windows task scheduler to run the job every10 minutes."}],"answer":["A"],"question":"A company containerized a Windows job that runs on .NET 6 Framework under a Windows container. The company wants to run this job in the AWS Cloud. The job runs every 10 minutes. The job's runtime varies between 1 minute and 3 minutes.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":209,"options":[{"letter":"A","text":"Create an Amazon Managed Grafana workspace without a VPC. Create a public endpoint for the RDS database. Configure the public endpoint as a data source in Amazon Managed Grafana."},{"letter":"B","text":"Create an Amazon Managed Grafana workspace in a VPC. Create a private endpoint for the RDS database. Configure the private endpoint as a data source in Amazon Managed Grafana."},{"letter":"C","text":"Create an Amazon Managed Grafana workspace without a VPCreate an AWS PrivateLink endpoint to establish a connection between Amazon Managed Grafana and Amazon RDS. Set up Amazon RDS as a data source in Amazon Managed Grafana."},{"letter":"D","text":"Create an Amazon Managed Grafana workspace in a VPC. Create a public endpoint for the RDS database. Configure the public endpoint as a data source in Amazon Managed Grafana."}],"answer":["B"],"question":"A company wants to set up Amazon Managed Grafana as its visualization tool. The company wants to visualize data from its Amazon RDS database as one data source. The company needs a secure solution that will not expose the data over the internet.\nWhich solution will meet these requirements?"},{"id":210,"options":[{"letter":"A","text":"Instruct the vendor to create a Network Load Balancer (NLB). Place the NLB in front of the Amazon RDS for MySQL database. Use AWS PrivateLink to integrate the company's VPC and the vendor's VPC."},{"letter":"B","text":"Instruct the vendor to sign up for the AWS Hosted Connection Direct Connect Program. Use VPC peering to connect the company's VPC and the vendor's VPC."},{"letter":"C","text":"Configure a client VPN connection between the company's VPC and the vendor's VPC. Use VPC peering to connect the company's VPC and the vendor's VPC."},{"letter":"D","text":"Use AWS Transit Gateway to integrate the company's VPC and the vendor's VPC. Use VPC peering to connect the company’s VPC and the vendor's VPC."}],"answer":["A"],"question":"A company collects and processes data from a vendor. The vendor stores its data in an Amazon RDS for MySQL database in the vendor's own AWS account. The company’s VPC does not have an internet gateway, an AWS Direct Connect connection, or an AWS Site-to-Site VPN connection. The company needs to access the data that is in the vendor database.\nWhich solution will meet this requirement?"},{"id":211,"options":[{"letter":"A","text":"Use provisioned mode and DynamoDB Standard-Infrequent Access (DynamoDB Standard-IA). Reserve capacity for the forecasted workload."},{"letter":"B","text":"Use provisioned mode. Specify the read capacity units (RCUs) and write capacity units (WCUs)."},{"letter":"C","text":"Use on-demand mode. Set the read capacity units (RCUs) and write capacity units (WCUs) high enough to accommodate changes in the workload."},{"letter":"D","text":"Use on-demand mode. Specify the read capacity units (RCUs) and write capacity units (WCUs) with reserved capacity."}],"answer":["B"],"question":"A company collects data from a large number of participants who use wearable devices. The company stores the data in an Amazon DynamoDB table and uses applications to analyze the data. The data workload is constant and predictable. The company wants to stay at or below its forecasted budget for DynamoDB.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":212,"options":[{"letter":"A","text":"Deploy the workloads to Amazon Elastic Kubernetes Service (Amazon EKS). Use Amazon Elastic Container Registry (Amazon ECR) as a private image repository. Specify scan on push filters for the ECR enhanced scan."},{"letter":"B","text":"Store the container images in an Amazon S3 bucket that has versioning enabled. Configure an S3 Event Notification for s3:ObjectCreated:* events to invoke an AWS Lambda function. Configure the Lambda function to initiate an Amazon Inspector scan."},{"letter":"C","text":"Use Amazon Elastic Container Registry (Amazon ECR) as a private image repository to store the container images. Specify scan on push filters for the ECR basic scan."},{"letter":"D","text":"Store the container images in an Amazon S3 bucket. Use Amazon Macie to scan the images. Use an S3 Event Notification to initiate a Macie scan for every event with an s3:ObjectCreated:Put event type."}],"answer":["C"],"question":"A company runs its workloads on Amazon Elastic Container Service (Amazon ECS). The container images that the ECS task definition uses need to be scanned for Common Vulnerabilities and Exposures (CVEs). New container images that are created also need to be scanned.\nWhich solution will meet these requirements with the FEWEST changes to the workloads?"},{"id":213,"options":[{"letter":"A","text":"Configure provisioned concurrency for the Lambda functions. Increase the memory according to AWS Compute Optimizer recommendations."},{"letter":"B","text":"Configure provisioned concurrency for the Lambda functions. Decrease the memory allocated to the Lambda functions."},{"letter":"C","text":"Configure reserved concurrency for the Lambda functions. Increase the memory according to AWS Compute Optimizer recommendations."},{"letter":"D","text":"Configure reserved concurrency for the Lambda functions. Decrease the memory allocated to the Lambda functions."}],"answer":["A"],"question":"A company uses high concurrency AWS Lambda functions to process a constantly increasing number of messages in a message queue during marketing events. The Lambda functions use CPU intensive code to process the messages. The company wants to reduce the compute costs and to maintain service latency for Configure Amazon FSx File Gateway for storage."},{"letter":"B","text":"Migrate the simulation application to Linux Amazon EC2 instances. Migrate the visualization application to Windows EC2 instances. Configure Amazon FSx for NetApp ONTAP for storage."},{"letter":"C","text":"Migrate both applications to AWS Lambda. Create an Amazon S3 bucket to exchange data between the applications."},{"letter":"D","text":"Migrate the simulation application to Linux Amazon EC2 instances. Migrate the visualization application to Windows EC2 instances. Configure Amazon Simple Queue Service (Amazon SQS) to exchange data between the applications."}],"answer":["B"],"question":"A research company runs experiments that are powered by a simulation application and a visualization application. The simulation application runs on Linux and outputs intermediate data to an NFS share every 5 minutes. The visualization application is a Windows desktop application that displays the simulation output and requires an SMB file system.\nThe company maintains two synchronized file systems. This strategy is causing data duplication and inefficient resource usage. The company needs to migrate the applications to AWS without making code changes to either application.\nWhich solution will meet these requirements?"},{"id":217,"options":[{"letter":"A","text":"Configure Amazon Cognito user pools for user authentication. Enable the risk-based adaptive authentication feature with multifactor authentication (MFA)."},{"letter":"B","text":"Configure Amazon Cognito identity pools for user authentication. Enable multi-factor authentication (MFA)."},{"letter":"C","text":"Configure AWS Identity and Access Management (IAM) users for user authentication. Attach an IAM policy that allows the AllowManageOwnUserMFA action."},{"letter":"D","text":"Configure AWS IAM Identity Center (AWS Single Sign-On) authentication for user authentication. Configure the permission sets to require multi-factor authentication (MFA)."}],"answe nagement Service (AWS KMS) AWS managed key."},{"letter":"D","text":"Encrypt the data in the S3 bucket with server-side encryption (SSE) that uses an AWS Key Management Service (AWS KMS) customer managed key."}],"answer":["A"],"question":"A financial company needs to handle highly sensitive data. The company will store the data in an Amazon S3 bucket. The company needs to ensure that the data is encrypted in transit and at rest. The company must manage the encryption keys outside the AWS Cloud.\nWhich solution will meet these requirements?"},{"id":220,"options":[{"letter":"A","text":"Move the contents of the file system to a Lambda layer. Configure the Lambda layer's permissions to allow the company's secondary account to use the Lambda layer."},{"letter":"B","text":"Create a VPC peering connection between the VPCs that are in the primary account and the secondary account."},{"letter":"C","text":"Create a new EFS file system in the primary account. Use AWS DataSync to copy the contents of the original EFS file system to the new EFS file system."},{"letter":"D","text":"Create a second Lambda function in the secondary account that has a mount that is configured for the file system. Use the primary account's Lambda function to invoke the secondary account's Lambda function."}],"answer":["B"],"question":"A company needs to create an AWS Lambda function that will run in a VPC in the company's primary AWS account. The Lambda function needs to access files that the company stores in an Amazon Elastic File System (Amazon EFS) file system. The EFS file system is located in a secondary AWS account. As the company adds files to the file system, the solution must scale to meet the demand.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":221,"options":[{"letter":"A","text":"Use Amazon Data Lifecycle Manager (Amazon DLM) to copy EC2 backups and RDS backups to the separate Region."},{"letter":"B","text":"Create Amazon Elastic Block Store (Amazon EBS) snap ion of a large amount of data from its offices to Amazon S3. The company must complete the migration within 4 weeks.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":243,"options":[{"letter":"A","text":"Add the development team’s account Amazon Resource Name (ARN) to the launch permission list for the AMIs."},{"letter":"B","text":"Add the development team's OU Amazon Resource Name (ARN) to the launch permission list for the AMIs."},{"letter":"C","text":"Add the Organizations root Amazon Resource Name (ARN) to the launch permission list for the AMIs."},{"letter":"D","text":"Recreate the AWS KMS key. Add a key policy to allow the Organizations root Amazon Resource Name (ARN) to use the AWS KMS key."},{"letter":"E","text":"Update the key policy to allow the development team's OU to use the AWS KMS keys that are used to decrypt the snapshots."}],"answer":["B","E"],"question":"A company uses AWS Organizations for its multi-account AWS setup. The security organizational unit (OU) of the company needs to share approved Amazon Machine Images (AMIs) with the development OU. The AMIs are created by using AWS Key Management Service (AWS KMS) encrypted snapshots.\nWhich solution will meet these requirements? (Choose two.)"},{"id":244,"options":[{"letter":"A","text":"Migrate the database to Amazon Aurora with Aurora Replicas."},{"letter":"B","text":"Migrate the database to Amazon DynamoDB with global tables."},{"letter":"C","text":"Add an Amazon ElastiCache for Redis layer in front of the database."},{"letter":"D","text":"Add an Amazon ElastiCache for Memcached layer in front of the database."}],"answer":["C"],"question":"A company has a mobile game that reads most of its metadata from an Amazon RDS DB instance. As the game increased in popularity, developers noticed slowdowns related to the game's metadata load times. Performance metrics indicate that simply scaling the database will not help. A solutions architect must explore all options that include capabilities for snapshots, replication, and sub-millisecond response times.\nWhat should the solutions architect recommend to solve these issues?"},{"id":245,"options":[{"letter":"A","text":"Create an elastic network interface for the endpoint in each of the subnets of the VPC."},{"letter":"B","text":"Create a security group entry in the endpoint's security group to provide access."},{"letter":"C","text":"Create an interface endpoint for Amazon EC2."},{"letter":"D","text":"Create a gateway endpoint for DynamoDB."},{"letter":"E","text":"Create a route table entry for the endpoint."}],"answer":["D","E"],"question":"A solutions architect needs to ensure that API calls to Amazon DynamoDB from Amazon EC2 instances in a VPC do not travel across the internet.\nWhich combination of steps should the solutions architect take to meet this requirement? (Choose two.)"},{"id":246,"options":[{"letter":"A","text":"Write an AWS Lambda script that monitors security groups for SSH being open to 0.0.0.0/0 addresses and creates a notification every time it finds one."},{"letter":"B","text":"Enable the restricted-ssh AWS Config managed rule and generate an Amazon Simple Notification Service (Amazon SNS) notification when a noncompliant rule is created."},{"letter":"C","text":"Create an IAM role with permissions to globally open security groups and network ACLs. Create an Amazon Simple Notification Service (Amazon SNS) topic to generate a notification every time the role is assumed by a user."},{"letter":"D","text":"Configure a service control policy (SCP) that prevents non-administrative users from creating or editing security groups. Create a notification in the ticketing system when a user requests a rule that needs administrator permissions."}],"answer":["B"],"question":"A solutions architect must provide an automated solution for a company's compliance policy that states security groups cannot include a rule that allows SSH from 0.0.0.0/0. The company needs to be notified if there is any breach in the policy. A solution is needed as soon as possible.\nWhat should the solutions architect do to meet these requirements with the LEAST operational overhead?"},{"id":247,"options":[{"letter":"A","text":"Use AWS Auto Scaling to adjust the ALB capacity based on request rate."},{"letter":"B","text":"Use AWS Auto Scaling to scale the capacity of the VPC internet gateway."},{"letter":"C","text":"Use a target tracking scaling policy to scale the Auto Scaling group based on instance CPU utilization."},{"letter":"D","text":"Launch the EC2 instances in multiple AWS Regions to distribute the load across Regions."},{"letter":"E","text":"Use scheduled scaling to change the Auto Scaling group minimum, maximum, and desired capacity to zero for weekends. Revert to the default values at the start of the week."}],"answer":["C","E"],"question":"A solutions architect is designing the architecture for a software demonstration environment. The environment will run on Amazon EC2 instances in an Auto Scaling group behind an Application Load Balancer (ALB). The system will experience significant increases in traffic during working hours but is not required to operate on weekends.\nWhich combination of actions should the solutions architect take to ensure that the system can scale to meet demand? (Choose two.)"},{"id":248,"options":[{"letter":"A","text":"Use Amazon Elastic Container Service (Amazon ECS) with Amazon EC2 worker nodes."},{"letter":"B","text":"Use Amazon Elastic Kubernetes Service (Amazon EKS) with Amazon EC2 worker nodes."},{"letter":"C","text":"Use Amazon Elastic Container Service (Amazon ECS) with AWS Fargate."},{"letter":"D","text":"Use Amazon Elastic Kubernetes Service (Amazon EKS) with AWS Fargate."},{"letter":"E","text":"Provision an Amazon API Gateway API. Connect the API to AWS Lambda to run the containers."}],"answer":["C","D"],"question":"A company built an application with Docker containers and needs to run the application in the AWS Cloud. The company wants to use a managed service to host the application.\nThe solution must scale in and out appropriately according to demand on the individual container services. The solution also must not result in additional operational overhead or infrastructure to manage.\nWhich solutions will meet these requirements? (Choose two.)"},{"id":249,"options":[{"letter":"A","text":"Use the AWS Schema Conversion Tool (AWS SCT) to convert the Oracle schema to Aurora PostgreSQL schema. Use AWS Database Migration Service (AWS DMS) to migrate the existing data and replicate the ongoing changes."},{"letter":"B","text":"Use AWS DataSync to migrate the data to an Amazon S3 bucket. Import the S3 data to Aurora PostgreSQL by using the Aurora PostgreSQL aws_s3 extension."},{"letter":"C","text":"Use the AWS Schema Conversion Tool (AWS SCT) to convert the Oracle schema to Aurora PostgreSQL schema. Use the AWS Database Migration Service (AWS DMS) full-load migration task to migrate the data."},{"letter":"D","text":"Use an AWS Snowball device to migrate the data to an Amazon S3 bucket. Import the S3 data to Aurora PostgreSQL by using the Aurora PostgreSQL aws_s3 extension."}],"answer":["A"],"question":"A company stores data in an on-premises Oracle relational database. The company needs to make the data available in Amazon Aurora PostgreSQL for analysis. The company uses an AWS Site-to-Site VPN connection to connect its on-premises network to AWS.\nThe company must capture the changes that occur to the source database during the migration to Aurora PostgreSQL.\nWhich solution will meet these requirements?"},{"id":250,"options":[{"letter":"A","text":"Use On-Demand Instances for the production instances. Use Dedicated Hosts for the nonproduction instances on weekends only."},{"letter":"B","text":"Use Reserved Instances for the production instances and the nonproduction instances. Shut down the nonproduction instances when not in use."},{"letter":"C","text":"Use Compute Savings Plans for the production instances. Use On-Demand Instances for the nonproduction instances. Shut down the nonproduction instances when not in use."},{"letter":"D","text":"Use Dedicated Hosts for the production instances. Use EC2 Instance Savings Plans for the nonproduction instances."}],"answer":["C"],"question":"A company’s application is deployed on Amazon EC2 instances for an event-driven architecture. The company uses nonproduction development environments in a different AWS account to test new features before the company deploys the features to production.\nThe production instances show constant usage because of customers in different time zones. The company uses nonproduction instances only during business hours on weekdays. The company does not use the nonproduction instances on the weekends. The company wants to optimize the costs to run its application on AWS.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":251,"options":[{"letter":"A","text":"Configure AWS CloudTrail trails to log S3 API calls. Use AWS AppSync to process the files."},{"letter":"B","text":"Configure an object-created event notification within the S3 bucket to invoke an AWS Lambda function to process the files."},{"letter":"C","text":"Configure Amazon Kinesis Data Streams to process and send data to Amazon S3. Invoke an AWS Lambda function to process the files."},{"letter":"D","text":"Configure an Amazon Simple Notification Service (Amazon SNS) topic to process the files uploaded to Amazon S3. Invoke an AWS Lambda function to process the files."}],"answer":["B"],"question":"A company hosts an application used to upload files to an Amazon S3 bucket. Once uploaded, the files are processed to extract metadata, which takes less than 5 seconds. The volume and frequency of the uploads varies from a few files each hour to hundreds of concurrent uploads. The company has asked a solutions architect to design a cost-effective architecture that will meet these requirements.\nWhat should the solutions architect recommend?"},{"id":252,"options":[{"letter":"A","text":"Turn on streams on the table to capture a log of all changes to the table in the last 24 hours. Store a copy of the stream in an Amazon S3 bucket."},{"letter":"B","text":"Use an AWS Lambda function to make an on-demand backup of the table every hour."},{"letter":"C","text":"Use AWS Backup for the table."},{"letter":"D","text":"Configure point-in-time recovery for the table."}],"answer":["D"],"question":"A company has a business-critical application that runs on Amazon EC2 instances. The application stores data in an Amazon DynamoDB table. The company must be able to revert the table to any point within the last 24 hours.\nWhich solution meets these requirements with the LEAST operational overhead?"},{"id":253,"options":[{"letter":"A","text":"Run AWS DataSync as a scheduled cron job to migrate the data to an Amazon S3 bucket on an ongoing basis."},{"letter":"B","text":"Configure an AWS Site-to-Site VPN connection from the on-premises environment to AWS. Migrate data to an Amazon Elastic File System (Amazon EFS) file system."},{"letter":"C","text":"Deploy an AWS Storage Gateway file gateway with an Amazon S3 bucket as the target storage. Migrate the data to the Storage Gateway appliance."},{"letter":"D","text":"Deploy an AWS Storage Gateway volume gateway with cached volumes with an Amazon S3 bucket as the target storage. Migrate the data to the Storage Gateway appliance."}],"answer":["D"],"question":"A pharmaceutical company is developing a new drug. The volume of data that the company generates has grown exponentially over the past few months. The company's researchers regularly require a subset of the entire dataset to be immediately available with minimal lag. However, the entire dataset does not need to be accessed on a daily basis. All the data currently resides in on-premises storage arrays, and the company wants to reduce ongoing capital expenses.\nWhich storage solution should a solutions architect recommend to meet these requirements?"},{"id":254,"options":[{"letter":"A","text":"Attach the AmazonSSMManagedInstanceCore IAM policy to an IAM role that is associated with the EC2 instances. Instruct the developers to use AWS Systems Manager Session Manager to access the EC2 instances."},{"letter":"B","text":"Create an AWS Site-to-Site VPN connection between the corporate network and the VPC. Instruct the developers to use the Site-to-Site VPN connection to access the EC2 instances when the developers are on the corporate network. Instruct the developers to set up another VPN connection for access when they work remotely."},{"letter":"C","text":"Create a bastion host in the same subnet as the EC2 instances. Grant the ec2:CreateVpnConnection IAM permission to the developers. Install EC2 Instance Connect so that the developers can connect to the EC2 instances."},{"letter":"D","text":"Create a bastion host in the public subnet of the VPConfigure the security groups and SSH keys of the bastion host to only allow connections and SSH authentication from the developers’ corporate and remote networks. Instruct the developers to connect through the bastion host by using SSH to reach the EC2 instances."}],"answer":["A"],"question":"A company’s developers want a secure way to gain SSH access on the company's Amazon EC2 instances that run the latest version of Amazon Linux. The developers work remotely and in the corporate office.\nThe company wants to use AWS services as a part of the solution. The EC2 instances are hosted in a VPC private subnet and access the internet through a NAT gateway that is deployed in a public subnet.\nWhat should a solutions architect do to meet these requirements MOST cost-effectively?"},{"id":255,"options":[{"letter":"A","text":"Set up a DynamoDB Accelerator (DAX) cluster. Route all read requests through DAX."},{"letter":"B","text":"Set up Amazon ElastiCache for Redis between the DynamoDB table and the web application. Route all read requests through Redis."},{"letter":"C","text":"Set up Amazon DynamoDB Streams on the table, and have AWS Lambda read from the table and populate Amazon ElastiCache. Route all read requests through ElastiCache."},{"letter":"D","text":"Set up Amazon ElastiCache for Memcached between the DynamoDB table and the web application. Route all read requests through Memcached."}],"answer":["A"],"question":"A company's website handles millions of requests each day, and the number of requests continues to increase. A solutions architect needs to improve the response time of the web application. The solutions architect determines that the application needs to decrease latency when retrieving product details from the Amazon DynamoDB table.\nWhich solution will meet these requirements with the LEAST amount of operational overhead?"},{"id":256,"options":[{"letter":"A","text":"Migrate the web tier and the application tier to Amazon EC2 instances in public subnets. Migrate the database tier to Amazon Aurora MySQL in public subnets."},{"letter":"B","text":"Migrate the web tier to Amazon EC2 instances in public subnets. Migrate the application tier to EC2 instances in private subnets. Migrate the database tier to Amazon RDS for MySQL in private subnets."},{"letter":"C","text":"Migrate the web tier to Amazon EC2 instances in public subnets. Migrate the application tier to EC2 instances in private subnets. Migrate the database tier to Amazon Aurora MySQL in private subnets."},{"letter":"D","text":"Migrate the web tier and the application tier to Amazon EC2 instances in private subnets. Migrate the database tier to Amazon RDS for MySQL in private subnets."}],"answer":["C"],"question":"A company wants to migrate its three-tier application from on premises to AWS. The web tier and the application tier are running on third-party virtual machines (VMs). The database tier is running on MySQL.\nThe company needs to migrate the application by making the fewest possible changes to the architecture. The company also needs a database solution that can restore data to a specific point in time.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":257,"options":[{"letter":"A","text":"Use AWS Datasync to migrate data to AWS."},{"letter":"B","text":"Order AWS Snowball devices to ship the data to AWS."},{"letter":"C","text":"Enable Amazon S3 Transfer Acceleration and securely upload the data."},{"letter":"D","text":"Create an Amazon S3 VPC endpoint and establish a VPN to upload the data."}],"answer":["B"],"question":"A company has 150 TB of archived image data stored on-premises that needs to be moved to the AWS Cloud within the next month. The company’s current network connection allows up to 100 Mbps uploads for this purpose during the night only.\nWhat is the MOST cost-effective mechanism to move this data and meet the migration deadline?"},{"id":258,"options":[{"letter":"A","text":"Use Amazon GuardDuty. Create an Amazon EventBridge rule to filter the CRITICAL event type from GuardDuty findings and to send an Amazon Simple Notification Service (Amazon SNS) notification to the security team."},{"letter":"B","text":"Use Amazon GuardDuty. Create an Amazon EventBridge rule to filter the CRITICAL event type from GuardDuty findings and to send an Amazon Simple Queue Service (Amazon SQS) notification to the security team."},{"letter":"C","text":"Use Amazon Macie. Create an Amazon EventBridge rule to filter the SensitiveData event type from Macie findings and to send an Amazon Simple Notification Service (Amazon SNS) notification to the security team."},{"letter":"D","text":"Use Amazon Macie. Create an Amazon EventBridge rule to filter the SensitiveData:S3Object/Personal event type from Macie findings and to send an Amazon Simple Queue Service (Amazon SQS) notification to the security team."}],"answer":["C"],"question":"A company stores data in Amazon S3. According to regulations, the data must not contain personally identifiable information (PII). The company recently discovered that S3 buckets have some objects that contain PII. The company needs to automatically detect PII in S3 buckets and to notify the company's security team.\nWhich solution will meet these requirements?"},{"id":259,"options":[{"letter":"A","text":"Develop an on-premises custom identity broker application or process that uses AWS Security Token Service (AWS STS) to get short-lived credentials."},{"letter":"B","text":"Set up a process that rotates the IAM credentials whenever LDAP credentials are updated."},{"letter":"C","text":"Create an IAM policy that uses AWS credentials, and integrate the policy into LDAP."},{"letter":"D","text":"Enable AWS IAM Identity Center (AWS Single Sign-On) between AWS and the on-premises LDAP."}],"answer":["A"],"question":"A company needs to use its on-premises LDAP directory service to authenticate its users to the AWS Management Console. The directory service is not compatible with Security Assertion Markup Language (SAML).\nWhich solution meets these requirements?"},{"id":260,"options":[{"letter":"A","text":"Create a new IAM user and use the existing IAM credentials in the Lambda function."},{"letter":"B","text":"Create a signed request using the existing IAM credentials in the Lambda function."},{"letter":"C","text":"Add required IAM permissions in the resource policy of the Lambda function."},{"letter":"D","text":"Create an IAM execution role with the required permissions and attach the IAM role to the Lambda function."}],"answer":["D"],"question":"A developer has an application that uses an AWS Lambda function to upload files to Amazon S3 and needs the required permissions to perform the task. The developer already has an IAM user with valid IAM credentials required for Amazon S3.\nWhat should a solutions architect do to grant the permissions?"},{"id":261,"options":[{"letter":"A","text":"Store newer movie video files in S3 Intelligent-Tiering. Store older movie video files in S3 Glacier Flexible Retrieval. When a user orders an older movie, retrieve the video file by using expedited retrieval."},{"letter":"B","text":"Store newer movie video files in S3 Standard. Store older movie video files in S3 Standard-infrequent Access (S3 Standard-IA). When a user orders an older movie, retrieve the video file by using standard retrieval."},{"letter":"C","text":"Store all media content in Amazon S3. Use S3 Lifecycle policies to move media data into the Infrequent Access tier when the demand for a movie decreases."},{"letter":"D","text":"Store newer movie video files in S3 Standard. Store older movie video files in S3 Glacier Flexible Retrieval. When a user orders an older movie, retrieve the video file by using bulk retrieval."}],"answer":["B"],"question":"A media company stores movies in Amazon S3. Each movie is stored in a single video file that ranges from 1 GB to 10 GB in size.\nThe company must be able to provide the streaming content of a movie within 5 minutes of a user purchase. There is higher demand for movies that are less than 20 years old than for movies that are more than 20 years old. The company wants to minimize hosting service costs based on demand.\nWhich solution will meet these requirements?"},{"id":262,"options":[{"letter":"A","text":"Use an AWS Lambda function. Configure the Lambda function to connect to a VPC. Configure Application Auto Scaling to use Lambda as a scalable target. Set the minimum capacity to 3."},{"letter":"B","text":"Use Amazon EC2 Reserved Instances. Launch three EC2 instances in a spread placement group. Configure an Auto Scaling group to use target tracking scaling. Set the minimum capacity to 3."},{"letter":"C","text":"Use Amazon Elastic Container Service (Amazon ECS). Configure Amazon ECS Service Auto Scaling to use target tracking scaling. Set the minimum capacity to 3. Set the task placement strategy type to spread with an Availability Zone attribute."},{"letter":"D","text":"Use Amazon Elastic Kubernetes Service (Amazon EKS) self-managed nodes. Configure Application Auto Scaling to use target tracking scaling. Set the minimum capacity to 3."}],"answer":["C"],"question":"A company wants to deploy its containerized application workloads to a VPC across three Availability Zones. The company needs a solution that is highly available across Availability Zones. The solution must require minimal changes to the application.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":263,"options":[{"letter":"A","text":"Create an Amazon CloudWatch alarm to recover the EC2 instance in case of failure."},{"letter":"B","text":"Launch the EC2 instance with two Amazon Elastic Block Store (Amazon EBS) volumes that use RAID configurations for storage redundancy."},{"letter":"C","text":"Configure the EC2 instance for Multi-AZ deployment."},{"letter":"D","text":"Enable termination protection for the EC2 instance."}],"answer":["A"],"question":"A company is running a legacy system on an Amazon EC2 instance. The application code cannot be modified, and the system cannot run on more than one instance. A solutions architect must design a resilient solution that can improve the recovery time for the system.\nWhat should the solutions architect recommend to meet these requirements?"},{"id":264,"options":[{"letter":"A","text":"Create an Object Lambda Access Point. Create an AWS Lambda function that redacts the PII when the function reads the file. Instruct the external service provider to access the Object Lambda Access Point."},{"letter":"B","text":"Create a batch process on an Amazon EC2 instance that regularly reads all new files, redacts the PII from the files, and writes the redacted files to a different S3 bucket. Instruct the external service provider to access the bucket that does not contain the PII."},{"letter":"C","text":"Create a web application on an Amazon EC2 instance that presents a list of the files, redacts the PII from the files, and allows the external service provider to download new versions of the files that have the PII redacted."},{"letter":"D","text":"Create an Amazon DynamoDB table. Create an AWS Lambda function that reads only the data in the files that does not contain PII. Configure the Lambda function to store the non-PII data in the DynamoDB table when a new file is written to Amazon S3. Grant the external service provider access to the DynamoDB table."}],"answer":["A"],"question":"A company stores text files in Amazon S3. The text files include customer chat messages, date and time information, and customer personally identifiable information (PII).\nThe company needs a solution to provide samples of the conversations to an external service provider for quality control. The external service provider needs to randomly pick sample conversations up to the most recent conversation. The company must not share the customer PII with the external service provider. The solution must scale when the number of customer conversations increases.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":265,"options":[{"letter":"A","text":"Switch to Amazon Redshift with relocation capability."},{"letter":"B","text":"Switch from Aurora to Amazon RDS with Multi-AZ cluster deployment."},{"letter":"C","text":"Use Amazon RDS Proxy in front of the Aurora database."},{"letter":"D","text":"Switch to Amazon DynamoDB with DynamoDB Accelerator (DAX) for read connections."}],"answer":["C"],"question":"A company’s data platform uses an Amazon Aurora MySQL database. The database has multiple read replicas and multiple DB instances across different Availability Zones. Users have recently reported errors from the database that indicate that there are too many connections. The company wants to reduce the failover time by 20% when a read replica is promoted to primary writer.\nWhich solution will meet this requirement?"},{"id":266,"options":[{"letter":"A","text":"Put the EC2 instances behind Application Load Balancers (ALBs) in each Region. Create an Amazon CloudFront distribution with an origin that uses Amazon Route 53 latency-based routing to route requests to the ALBs. Deploy AWS WAF on the CloudFront distribution."},{"letter":"B","text":"Put the EC2 instances behind Network Load Balancers (NLBs) in each Region. Deploy AWS WAF on the NLBs. Create an Amazon CloudFront distribution with an origin that uses Amazon Route 53 latency-based routing to route requests to the NLBs."},{"letter":"C","text":"Put the EC2 instances behind Application Load Balancers (ALBs) in each Region. Deploy AWS WAF on the ALBs. Create an accelerator using AWS Global Accelerator and register the ALBs as endpoints."},{"letter":"D","text":"Put the EC2 instances behind Network Load Balancers (NLBs) in each Region. Deploy AWS WAF on the NLBs. Create an accelerator using AWS Global Accelerator and register the NLBs as endpoints."}],"answer":["C"],"question":"A company has users all around the world accessing its HTTP-based application deployed on Amazon EC2 instances in multiple AWS Regions. The company wants to improve the availability and performance of the application. The company also wants to protect the application against common web exploits that may affect availability, compromise security, or consume excessive resources. Static IP addresses are required.\nWhat should a solutions architect recommend to accomplish this?"},{"id":267,"options":[{"letter":"A","text":"Deploy AWS Transfer for SFTP and an Amazon S3 bucket for storage. Modify the application to pull the batch files from Amazon S3 to an Amazon EC2 instance for processing. Use an EC2 instance in an Auto Scaling group with a scheduled scaling policy to run the batch operation."},{"letter":"B","text":"Deploy AWS Transfer for SFTP and an Amazon Elastic File System (Amazon EFS) file system for storage. Use an Amazon EC2 instance in an Auto Scaling group with a scheduled scaling policy to run the batch operation."},{"letter":"C","text":"Deploy an Amazon EC2 instance that runs Linux and an SFTP service. Use an Amazon Elastic Block Store (Amazon EBS) volume for storage. Use an Auto Scaling group with the minimum number of instances and desired number of instances set to 1."},{"letter":"D","text":"Deploy an Amazon EC2 instance that runs Linux and an SFTP service. Use an Amazon Elastic File System (Amazon EFS) file system for storage. Use an Auto Scaling group with the minimum number of instances and desired number of instances set to 1."}],"answer":["B"],"question":"A company has a nightly batch processing routine that analyzes report files that an on-premises file system receives daily through SFTP. The company wants to move the solution to the AWS Cloud. The solution must be highly available and resilient. The solution also must minimize operational effort.\nWhich solution meets these requirements?"},{"id":268,"options":[{"letter":"A","text":"Use AWS Lambda for the compute layers in the architecture."},{"letter":"B","text":"Use Amazon EC2 instances for the compute layers in the architecture."},{"letter":"C","text":"Use Amazon Simple Notification Service (Amazon SNS) as the messaging component between the compute layers."},{"letter":"D","text":"Use Amazon Simple Queue Service (Amazon SQS) FIFO queues as the messaging component between the compute layers."},{"letter":"E","text":"Use containers that are based on Amazon Elastic Kubernetes Service (Amazon EKS) for the compute layers in the architecture."}],"answer":["A","D"],"question":"A company has a multi-tier payment processing application that is based on virtual machines (VMs). The communication between the tiers occurs asynchronously through a third-party middleware solution that guarantees exactly-once delivery.\nThe company needs a solution that requires the least amount of infrastructure management. The solution must guarantee exactly-once delivery for application messaging.\nWhich combination of actions will meet these requirements? (Choose two.)"},{"id":269,"options":[{"letter":"A","text":"Attach the AdministratorAccess resource-based policy to the IAM user group. Place each of the five designated employee IAM users in the IAM user group."},{"letter":"B","text":"Attach the SystemAdministrator identity-based policy to the IAM user group. Place each of the five designated employee IAM users in the IAM user group."},{"letter":"C","text":"Attach the AdministratorAccess identity-based policy to the IAM user group. Place each of the five designated employee IAM users in the IAM user group."},{"letter":"D","text":"Attach the SystemAdministrator resource-based policy to the IAM user group. Place each of the five designated employee IAM users in the IAM user group."}],"answer":["C"],"question":"A solutions architect is designing an AWS Identity and Access Management (IAM) authorization model for a company's AWS account. The company has designated five specific employees to have full access to AWS services and resources in the AWS account.\nThe solutions architect has created an IAM user for each of the five designated employees and has created an IAM user group.\nWhich solution will meet these requirements?"},{"id":270,"options":[{"letter":"A","text":"Use AWS Resource Access Manager (AWS RAM) to share access to the AWS accounts with the users in the existing IdP."},{"letter":"B","text":"Configure AWS IAM Identity Center (AWS Single Sign-On). Connect IAM Identity Center to the existing IdP. Provision users and groups from the existing IdP."},{"letter":"C","text":"Create IAM users for the employees in the required AWS accounts. Connect IAM users to the existing IdP. Configure federated authentication for the IAM users."},{"letter":"D","text":"Set up AWS account root users with user email addresses and passwords that are synchronized from the existing IdP."}],"answer":["B"],"question":"A company sets up an organization in AWS Organizations that contains 10 AWS accounts. A solutions architect must design a solution to provide access to the accounts for several thousand employees. The company has an existing identity provider (IdP). The company wants to use the existing IdP for authentication to AWS.\nWhich solution will meet these requirements?"},{"id":271,"options":[{"letter":"A","text":"Modify the network ACL for the EC2 instances in the target groups behind the ALB to deny the malicious IP address."},{"letter":"B","text":"Modify the configuration of AWS WAF to add an IP match condition to block the malicious IP address."},{"letter":"C","text":"Modify the security groups for the EC2 instances in the target groups behind the ALB to deny the malicious IP address."},{"letter":"D","text":"Modify the network ACL on the CloudFront distribution to add a deny rule for the malicious IP address."}],"answer":["B"],"question":"A company’s website is used to sell products to the public. The site runs on Amazon EC2 instances in an Auto Scaling group behind an Application Load Balancer (ALB). There is also an Amazon CloudFront distribution, and AWS WAF is being used to protect against SQL injection attacks. The ALB is the origin for the CloudFront distribution. A recent review of security logs revealed an external malicious IP that needs to be blocked from accessing the website.\nWhat should a solutions architect do to protect the application?"},{"id":272,"options":[{"letter":"A","text":"Create a new IAM user in the monitoring account. Create cross-account IAM policies in each AWS account. Attach the IAM policies to the new IAM user."},{"letter":"B","text":"Configure a new IAM user in the monitoring account. In each AWS account, configure an IAM policy to have access to query and visualize the CloudWatch data in the account. Attach the new IAM policy to the new IAM user."},{"letter":"C","text":"Set up service control policies (SCPs) to provide access to CloudWatch in the monitoring account under the Organizations root organizational unit (OU)."},{"letter":"D","text":"Enable CloudWatch cross-account observability for the monitoring account. Deploy an AWS CloudFormation template provided by the monitoring account in each AWS account to share the data with the monitoring account."}],"answer":["D"],"question":"A company uses an organization in AWS Organizations to manage AWS accounts that contain applications. The company sets up a dedicated monitoring member account in the organization. The company wants to query and visualize observability data across the accounts by using Amazon CloudWatch.\nWhich solution will meet these requirements?"},{"id":273,"options":[{"letter":"A","text":"Run the EC2 instances in a cluster placement group."},{"letter":"B","text":"Attach multiple elastic network interfaces to each EC2 instance."},{"letter":"C","text":"Use Amazon Elastic Block Store (Amazon EBS) optimized instance types."},{"letter":"D","text":"Enable and configure enhanced networking on each EC2 instance."},{"letter":"E","text":"Group the EC2 instances in separate accounts."}],"answer":["A","D"],"question":"A company is deploying an application that processes streaming data in near-real time. The company plans to use Amazon EC2 instances for the workload. The network architecture must be configurable to provide the lowest possible latency between nodes.\nWhich combination of network solutions will meet these requirements? (Choose two.)"},{"id":274,"options":[{"letter":"A","text":"Create IAM users for daily administrative tasks. Enable multi-factor authentication on the root user."},{"letter":"B","text":"Provide the root user credentials to the most senior solutions architect. Have the solutions architect use the root user for daily administration tasks."},{"letter":"C","text":"Create IAM users for daily administrative tasks. Disable the root user."},{"letter":"D","text":"Generate an access key for the root user. Use the access key for daily administration tasks instead of the AWS Management Console."}],"answer":["A"],"question":"A company has established a new AWS account. The account is newly provisioned and no changes have been made to the default settings. The company is concerned about the security of the AWS account root user.\nWhat should be done to secure the root user?"},{"id":275,"options":[{"letter":"A","text":"A Network Load Balancer with an associated Elastic IP address."},{"letter":"B","text":"An Application Load Balancer with an associated Elastic IP address."},{"letter":"C","text":"An EC2 instance with a public IP address running as a proxy in front of the load balancer."},{"letter":"D","text":"An A record in an Amazon Route 53 hosted zone pointing to an Elastic IP address."}],"answer":["A"],"question":"A company is designing a new web service that will run on Amazon EC2 instances behind an Elastic Load Balancing (ELB) load balancer. However, many of the web service clients can only reach IP addresses authorized on their firewalls.\nWhat should a solutions architect recommend to meet the clients’ needs?"},{"id":276,"options":[{"letter":"A","text":"Provide self-signed certificates. Use the certificates in all connections to the RDS instance."},{"letter":"B","text":"Download AWS-provided root certificates. Provide the certificates in all connections to the RDS instance."},{"letter":"C","text":"Enable IAM database authentication on the database."},{"letter":"D","text":"Take a snapshot of the RDS instance. Restore the snapshot to a new instance with encryption enabled."}],"answer":["B"],"question":"To meet security requirements, a company needs to encrypt all of its application data in transit while communicating with an Amazon RDS MySQL DB instance. A recent security audit revealed that encryption at rest is enabled using AWS Key Management Service (AWS KMS), but data in transit is not enabled.\nWhat should a solutions architect do to satisfy the security requirements?"},{"id":277,"options":[{"letter":"A","text":"Use AWS AppConfig to store and manage the application configuration. Use AWS Secrets Manager to store and retrieve the credentials."},{"letter":"B","text":"Use AWS AppConfig to store and manage the application configuration. Use Amazon RDS to store and retrieve the credentials."},{"letter":"C","text":"Use AWS Lambda to store and manage the application configuration. Use AWS Systems Manager Parameter Store to store and retrieve the credentials."},{"letter":"D","text":"Use an encrypted application configuration file. Store the file in Amazon S3 for the application configuration. Create another S3 file to store and retrieve the credentials."}],"answer":["A"],"question":"A company is building an application on AWS that connects to an Amazon RDS database. The company wants to manage the application configuration and to securely store and retrieve credentials for the database and other services.\nWhich solution will meet these requirements with the LEAST administrative overhead?"},{"id":278,"options":[{"letter":"A","text":"Create an Amazon Route 53 Resolver inbound endpoint in the VPC. Specify the IP addresses that the provider's DNS will forward DNS queries to. Configure the provider's DNS to forward DNS queries for the domain to the IP addresses that are specified in the inbound endpoint."},{"letter":"B","text":"Create a Simple AD directory in AWS. Enable zone transfer between the DNS provider and AWS Directory Service for Microsoft Active Directory for the domain records."},{"letter":"C","text":"Create an Amazon Route 53 private hosted zone for the domain name. Import the zone file containing the domain records hosted by the previous provider."},{"letter":"D","text":"Create an Amazon Route 53 public hosted zone for the domain name. Import the zone file containing the domain records hosted by the previous provider."}],"answer":["D"],"question":"The DNS provider that hosts a company's domain name records is experiencing outages that cause service disruption for a website running on AWS. The company needs to migrate to a more resilient managed DNS service and wants the service to run on AWS.\nWhat should a solutions architect do to rapidly migrate the DNS hosting service?"},{"id":279,"options":[{"letter":"A","text":"Use S3 Storage Lens metrics to identify unencrypted S3 buckets. Configure the S3 default encryption feature to use a server-side encryption with AWS KMS keys (SSE-KMS)."},{"letter":"B","text":"Create a list of unencrypted objects by filtering an Amazon S3 Inventory report. Configure an S3 Batch Operations job to encrypt the objects from the list with a server-side encryption with a customer-provided key (SSE-C). Configure the S3 default encryption feature to use a server-side encryption with a customer-provided key (SSE-C)."},{"letter":"C","text":"Create a list of unencrypted objects by filtering the AWS usage report for Amazon S3. Configure an AWS Batch job to encrypt the objects from the list with a server-side encryption with AWS KMS keys (SSE-KMS). Configure the S3 default encryption feature to use a server-side encryption with AWS KMS keys (SSE-KMS)."},{"letter":"D","text":"Create a list of unencrypted objects by filtering the AWS usage report for Amazon S3. Configure the S3 default encryption feature to use a server-side encryption with a customer-provided key (SSE-C)."}],"answer":["B"],"question":"A company migrated millions of archival files to Amazon S3. A solutions architect needs to implement a solution that will encrypt all the archival data by using a customer-provided key. The solution must encrypt existing unencrypted objects and future objects.\nWhich solution will meet these requirements?"},{"id":280,"options":[{"letter":"A","text":"Send the requests from the API Gateway REST API to Amazon Managed Streaming for Apache Kafka (Amazon MSK). Configure Amazon MSK to publish the messages to the target Lambda functions."},{"letter":"B","text":"Send the requests from the API Gateway REST API to multiple Amazon Simple Queue Service (Amazon SQS) queues. Configure the target Lambda functions to poll the different SQS queues."},{"letter":"C","text":"Send the requests from the API Gateway REST API to Amazon EventBridge. Configure EventBridge to invoke the target Lambda functions."},{"letter":"D","text":"Send the requests from the API Gateway REST API to an Amazon Simple Notification Service (Amazon SNS) topic. Subscribe Amazon Simple Queue Service (Amazon SQS) queues to the SNS topic. Configure the target Lambda functions to poll the different SQS queues."}],"answer":["C"],"question":"A company is building a new application that uses serverless architecture. The architecture will consist of an Amazon API Gateway REST API and AWS Lambda functions to manage incoming requests.\nThe company wants to add a service that can send messages received from the API Gateway REST API to multiple target Lambda functions for processing. The service must offer message filtering that gives the target Lambda functions the ability to receive only the messages the functions need.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":281,"options":[{"letter":"A","text":"Write a script that uses the PutObject API operation every day to copy the entire contents of the buckets to another S3 bucket in us-west-2. Use this S3 bucket for log analysis."},{"letter":"B","text":"Use S3 Same-Region Replication to replicate logs from the S3 buckets to another S3 bucket in us-west-2. Use this S3 bucket for log analysis."},{"letter":"C","text":"Create an S3 Lifecycle policy that copies the objects from one of the application S3 buckets to the centralized S3 bucket."},{"letter":"D","text":"Write AWS Lambda functions in these accounts that are triggered every time logs are delivered to the S3 buckets (s3:ObjectCreated:* event). Copy the logs to another S3 bucket in us-west-2. Use this S3 bucket for log analysis."}],"answer":["B"],"question":"A company has multiple AWS accounts with applications deployed in the us-west-2 Region. Application logs are stored within Amazon S3 buckets in each account. The company wants to build a centralized log analysis solution that uses a single S3 bucket. Logs must not leave us-west-2, and the company wants to incur minimal operational overhead.\nWhich solution meets these requirements and is MOST cost-effective?"},{"id":282,"options":[{"letter":"A","text":"Publish the Aurora general logs to a log group in Amazon CloudWatch Logs. Export the log data to a central Amazon S3 bucket."},{"letter":"B","text":"Enable the Amazon RDS Protection feature in Amazon GuardDuty for the member accounts of the organization."},{"letter":"C","text":"Publish all the Aurora PostgreSQL database events in AWS CloudTrail to a central Amazon S3 bucket."},{"letter":"D","text":"Attach service control policies (SCPs) to the root of the organization to identity the failed login attempts."}],"answer":["B"],"question":"An ecommerce company runs applications in AWS accounts that are part of an organization in AWS Organizations. The applications run on Amazon Aurora PostgreSQL databases across all the accounts. The company needs to prevent malicious activity and must identify abnormal failed and incomplete login attempts to the databases.\nWhich solution will meet these requirements in the MOST operationally efficient way?"},{"id":283,"options":[{"letter":"A","text":"Use AWS WAF to protect the application. Use RDS parameter groups to configure the security settings."},{"letter":"B","text":"Use different database accounts in the application code for different functions. Avoid granting excessive privileges to the database users."},{"letter":"C","text":"Use security groups and network ACLs to secure the database and application servers."},{"letter":"D","text":"Use AWS Network Firewall to protect the application and the database."}],"answer":["A"],"question":"A company has deployed its application on Amazon EC2 instances with an Amazon RDS database. The company used the principle of least privilege to configure the database access credentials. The company's security team wants to protect the application and the database from SQL injection and other web-based attacks.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":284,"options":[{"letter":"A","text":"Add an additional read replica to the DB cluster."},{"letter":"B","text":"Implement an Amazon ElastiCache for Redis cluster between the application and the DB cluster."},{"letter":"C","text":"Modify the DB cluster to have multiple writer instances."},{"letter":"D","text":"Configure Aurora Auto Scaling for the Aurora read replicas."}],"answer":["B"],"question":"A package delivery company has an application that uses Amazon EC2 instances and an Amazon Aurora MySQL DB cluster. As the application becomes more popular, EC2 instance usage increases only slightly. DB cluster usage increases at a much faster rate.\nThe company adds a read replica, which reduces the DB cluster usage for a short period of time. However, the load continues to increase. The operations that cause the increase in DB cluster usage are all repeated read statements that are related to delivery details. The company needs to alleviate the effect of repeated reads on the DB cluster.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":285,"options":[{"letter":"A","text":"Set up a simple scaling policy. Increase the cooldown period based on the EC2 instance startup time."},{"letter":"B","text":"Enable predictive scaling to forecast and scale. Configure dynamic scaling with target tracking."},{"letter":"C","text":"Implement dynamic scaling with step scaling based on average CPU utilization from the EC2 instances."},{"letter":"D","text":"Create an automated scheduled scaling action based on the traffic patterns of the web application."}],"answer":["B"],"question":"A company runs a three-tier web application in a VPC across multiple Availability Zones. Amazon EC2 instances run in an Auto Scaling group for the applicatio
