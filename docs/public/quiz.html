a bucket policy granting access to the Lambda functions based on their function ARNs."},{"letter":"B","text":"Grant full S3 bucket access to all Lambda functions through a shared IAM role."},{"letter":"C","text":"Configure the Lambda functions to run within a VPC. Configure a bucket policy to grant access based on the Lambda functions' VPC endpoint IP addresses."},{"letter":"D","text":"Create individual IAM roles for each Lambda function. Grant the IAM roles access to the S3 bucket. Assign each IAM role as the Lambda execution role for its corresponding Lambda function."}],"answer":["D"],"question":"A company is building an application on AWS. The application uses multiple AWS Lambda functions to retrieve sensitive data from a single Amazon S3 bucket for processing. The company must ensure that only authorized Lambda functions can access the data. The solution must comply with the principle of least privilege.\nWhich solution will meet these requirements?"},{"id":108,"options":[{"letter":"A","text":"Use S3 Inventory to list all objects. Use the AWS CLI to create a script that runs on an Amazon EC2 instance that deletes objects from the inventory list."},{"letter":"B","text":"Use AWS Batch to delete objects older than 3 years except for the data that must be retained."},{"letter":"C","text":"Enable S3 Inventory. Create an AWS Lambda function to filter and delete objects. Invoke the Lambda function with S3 Batch Operations to delete objects by using the inventory reports."},{"letter":"D","text":"Provision an AWS Glue crawler to query objects older than 3 years. Save the manifest file of old objects. Create a script to delete objects in the manifest."}],"answer":["C"],"question":"A company has stored millions of objects across multiple prefixes in an Amazon S3 bucket by using the Amazon S3 Glacier Deep Archive storage class. The company needs to delete all data older than 3 years except for a subset of data that must be retained. The company has identified the data that must be retained and wants to implement a serverless solution.\nWhich solution will meet these requirements?"},{"id":109,"options":[{"letter":"A","text":"Configure S3 Storage Lens to invoke an AWS Lambda function each time a user uploads a new photo to the application. Configure the Lambda function to generate a thumbnail and to upload the thumbnail to a second S3 bucket."},{"letter":"B","text":"Configure an Amazon EventBridge scheduled rule to invoke a script every minute on a memory-optimized Amazon EC2 instance that is always on. Configure the script to generate thumbnails for the photos that do not have thumbnails. Configure the script to upload the thumbnails to the second S3 bucket."},{"letter":"C","text":"Configure an S3 event notification to invoke an AWS Lambda function each time a user uploads a new photo to the application. Configure the Lambda function to generate a thumbnail and to upload the thumbnail to the second S3 bucket."},{"letter":"D","text":"Configure an Amazon EventBridge scheduled rule to invoke a script every minute on a long-running Amazon EMR cluster. Configure the script to generate thumbnails for the photos that do not have thumbnails. Configure the script to upload the thumbnails to the second S3 bucket."}],"answer":["C"],"question":"A company runs an application that stores and shares photos. Users upload the photos to an Amazon S3 bucket. Every day, users upload approximately 150 photos. The company wants to design a solution that creates a thumbnail of each new photo and stores the thumbnail in a second S3 bucket.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":110,"options":[{"letter":"A","text":"Create an AWS Lambda function to fetch EC2 logs from Amazon CloudWatch Logs. Use Amazon CloudWatch metrics to perform further analysis."},{"letter":"B","text":"Send Amazon CloudWatch logs to Amazon Redshift. Use Amazon QuickSight to perform further analysis."},{"letter":"C","text":"Send EC2 logs to Amazon S3. Use Amazon Redshift to fetch logs from the S3 bucket to process raw data for further analysis with Amazon QuickSight."},{"letter":"D","text":"Enable detailed monitoring on all EC2 instances. Use Amazon CloudWatch metrics to perform further analysis."}],"answer":["D"],"question":"A company hosts its multi-tier, public web application in the AWS Cloud. The web application runs on Amazon EC2 instances, and its database runs on Amazon RDS. The company is anticipating a large increase in sales during an upcoming holiday weekend. A solutions architect needs to build a solution to analyze the performance of the web application with a granularity of no more than 2 minutes.\nWhat should the solutions architect do to meet this requirement?"},{"id":111,"options":[{"letter":"A","text":"Activate Multi-AZ DB instance deployment for RDS for PostgreSQL. Configure the reports to be generated from the standby database."},{"letter":"B","text":"Create a read replica in us-east-1. Configure the reports to be generated from the read replica."},{"letter":"C","text":"Use AWS Data Migration Service (AWS DMS) to logically replicate data to a new database. Configure the reports to be generated from the new database."},{"letter":"D","text":"Create a cross-Region read replica. Configure the reports to be generated from the read replica."}],"answer":["B"],"question":"A company uses Amazon RDS for PostgreSQL to run its applications in the us-east-1 Region. The company also uses machine learning (ML) models to forecast annual revenue based on near real-time reports. The reports are generated by using the same RDS for PostgreSQL database. The database performance slows during business hours. The company needs to improve database performance.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":112,"options":[{"letter":"A","text":"Create a bastion host in a public subnet. Set up the bastion host security group to allow access from only the external engineers’ IP address ranges. Ensure that all instances have a security group that allows SSH access from the bastion host. Provide each external support engineer an SSH key pair to log in to the application instances. Provide local account IAM user credentials to the engineers for console access."},{"letter":"B","text":"Confirm that AWS Systems Manager Agent (SSM Agent) is installed on all instances. Assign an instance profile with the necessary policy to connect to Systems Manager. Use AWS IAM Identity Center to provide the external support engineers console access. Use Systems Manager Session Manager to assign the required permissions."},{"letter":"C","text":"Confirm that AWS Systems Manager Agent (SSM Agent) is installed on all instances. Assign an instance profile with the necessary policy to connect to Systems Manager. Use Systems Manager Session Manager to provide local IAM user credentials in each AWS account to the external support engineers for console access."},{"letter":"D","text":"Confirm that all instances have a security group that allows SSH access only from the external support engineers’ source IP address ranges. Provide local IAM user credentials in each AWS account to the external support engineers for console access. Provide each external support engineer an SSH key pair to log in to the application instances."}],"answer":["B"],"question":"A company has applications that run in an organization in AWS Organizations. The company outsources operational support of the applications. The company needs to provide access for the external support engineers without compromising security.\nThe external support engineers need access to the AWS Management Console. The external support engineers also need operating system access to the company’s fleet of Amazon EC2 instances that run Amazon Linux in private subnets.\nWhich solution will meet these requirements MOST securely?"},{"id":113,"options":[{"letter":"A","text":"Create a gateway VPC endpoint for Amazon S3. Configure the CloudFormation stack to use the S3 object URL."},{"letter":"B","text":"Create an Amazon API Gateway REST API that has the S3 bucket as the target. Configure the CloudFormation stack to use the API Gateway URL."},{"letter":"C","text":"Allow public access to the template object in the S3 bucket. Block the public access after the test environment is created."},{"letter":"D","text":"Create a presigned URL for the template object. Configure the CloudFormation stack to use the presigned URL."}],"answer":["D"],"question":"A company wants to use an AWS CloudFormation stack for its application in a test environment. The company stores the CloudFormation template in an Amazon S3 bucket that blocks public access. The company wants to grant CloudFormation access to the template in the S3 bucket based on specific user requests to create the test environment. The solution must follow security best practices.\nWhich solution will meet these requirements?"},{"id":114,"options":[{"letter":"A","text":"Copy the EBS snapshots to another AWS Region after completing the snapshots daily."},{"letter":"B","text":"Copy EBS snapshots to Amazon S3 Standard-Infrequent Access (S3 Standard-IA)."},{"letter":"C","text":"Change the IAM policy of the user to deny EBS snapshot deletion."},{"letter":"D","text":"Create a 7-day EBS snapshot retention rule in Recycle Bin and apply the rule for all snapshots."}],"answer":["D"],"question":"A company runs a self-managed Microsoft SQL Server on Amazon EC2 instances and Amazon Elastic Block Store (Amazon EBS). Daily snapshots are taken of the EBS volumes.\nRecently, all the company’s EBS snapshots were accidentally deleted while running a snapshot cleaning script that deletes all expired EBS snapshots. A solutions architect needs to update the architecture to prevent data loss without retaining EBS snapshots indefinitely.\nWhich solution will meet these requirements with the LEAST development effort?"},{"id":115,"options":[{"letter":"A","text":"Configure two Application Load Balancers in each Region. The first will route to the EC2 endpoints, and the second will route to the on-premises endpoints."},{"letter":"B","text":"Create an Amazon CloudFront distribution with an origin that uses Amazon Route 53 latency-based routing to route requests to the load balancers."},{"letter":"C","text":"Configure a Network Load Balancer in each Region to address the EC2 endpoints. Configure an Application Load Balancer in each Region that routes to the on-premises endpoints."},{"letter":"D","text":"Configure a Network Load Balancer in each Region to address the EC2 endpoints. Configure a Network Load Balancer in each Region that routes to the on-premises endpoints."},{"letter":"E","text":"Create an accelerator using AWS Global Accelerator. Add the load balancers as endpoints."}],"answer":["D","E"],"question":"A company wants to improve the availability and performance of its hybrid application. The application consists of a stateful TCP-based workload hosted on Amazon EC2 instances in different AWS Regions and a stateless UDP-based workload hosted on premises.\nWhich combination of actions should a solutions architect take to improve availability and performance? (Choose two.)"},{"id":116,"options":[{"letter":"A","text":"Use S3 Event Notifications to write a message with image details to an Amazon Simple Queue Service (Amazon SQS) queue. Configure an AWS Lambda function to read the messages from the queue and to process the images."},{"letter":"B","text":"Use S3 Event Notifications to write a message with image details to an Amazon Simple Queue Service (Amazon SQS) queue. Configure an EC2 Reserved Instance to read the messages from the queue and to process the images."},{"letter":"C","text":"Use S3 Event Notifications to publish a message with image details to an Amazon Simple Notification Service (Amazon SNS) topic. Configure a container instance in Amazon Elastic Container Service (Amazon ECS) to subscribe to the topic and to process the images."},{"letter":"D","text":"Use S3 Event Notifications to publish a message with image details to an Amazon Simple Notification Service (Amazon SNS) topic. Configure an AWS Elastic Beanstalk application to subscribe to the topic and to process the images."}],"answer":["A"],"question":"A company has an application that customers use to upload images to an Amazon S3 bucket. Each night, the company launches an Amazon EC2 Spot Fleet that processes all the images that the company received that day. The processing for each image takes 2 minutes and requires 512 MB of memory.\nA solutions architect needs to change the application to process the images when the images are uploaded.\nWhich change will meet these requirements MOST cost-effectively?"},{"id":117,"options":[{"letter":"A","text":"Replicate the objects in the S3 bucket to new S3 buckets for each application. Create dedicated S3 access points for each application."},{"letter":"B","text":"Replicate the objects in the S3 bucket to new S3 buckets for each application. Create replication rules by prefix."},{"letter":"C","text":"Create an S3 Batch Operations job to set the ACL permissions for each object in the S3 bucket."},{"letter":"D","text":"Create dedicated S3 access points and access point policies for each application."}],"answer":["D"],"question":"A company manages a data lake in an Amazon S3 bucket that numerous applications access. The S3 bucket contains a unique prefix for each application. The company wants to restrict each application to its specific prefix and to have granular control of the objects under each prefix.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":118,"options":[{"letter":"A","text":"Use a local machine to create a certificate that is signed by the third-party CA. Import the certificate into AWS Certificate Manager (ACM). Create an HTTP API in Amazon API Gateway with a custom domain. Configure the custom domain to use the certificate."},{"letter":"B","text":"Create a certificate in AWS Certificate Manager (ACM) that is signed by the third-party CA. Create an HTTP API in Amazon API Gateway with a custom domain. Configure the custom domain to use the certificate."},{"letter":"C","text":"Create a certificate in AWS Certificate Manager (ACM) that is signed by the third-party CA. Create an AWS Lambda function with a Lambda function URL. Configure the Lambda function URL to use the certificate."},{"letter":"D","text":"Use AWS Certificate Manager (ACM) to create a certificate that is signed by the third-party CA. Import the certificate into AWS Certificate Manager (ACM). Create an AWS Lambda function with a Lambda function URL. Configure the Lambda function URL to use the certificate."}],"answer":["A"],"question":"A company is creating a REST API. The company has strict requirements for the use of TLS. The company requires TLSv1.3 on the API endpoints. The company also requires a specific public third-party certificate authority (CA) to sign the TLS certificate.\nWhich solution will meet these requirements?"},{"id":119,"options":[{"letter":"A","text":"Migrate the databases to Amazon EC2 instances. Use an AWS Key Management Service (AWS KMS) AWS managed key for encryption."},{"letter":"B","text":"Migrate the databases to a Multi-AZ Amazon RDS for SQL Server DB instance. Use an AWS Key Management Service (AWS KMS) AWS managed key for encryption."},{"letter":"C","text":"Migrate the databases to an Amazon DynamoDB table. Use Amazon CloudWatch Logs to ensure data security."},{"letter":"D","text":"Migrate the data to an Amazon S3 bucket. Use Amazon Macie to ensure data security."}],"answer":["B"],"question":"A company is migrating its workloads to AWS. The company has sensitive and critical data in on-premises relational databases that run on SQL Server instances.\nThe company wants to use the AWS Cloud to increase security and reduce operational overhead for the databases.\nWhich solution will meet these requirements?"},{" rvices VPC through the peering connection."},{"letter":"D","text":"Deploy an AWS Direct Connect connection between the application VPCs and the shared services VPAdd routes from the application VPCs in their subnets to the shared services VPC and the applications VPCs. Add routes from the shared services VPC subnets to the applications VPCs."}],"answer":["B"],"question":"A company is migrating five on-premises applications to VPCs in the AWS Cloud. Each application is currently deployed in isolated virtual networks on premises and should be deployed similarly in the AWS Cloud. The applications need to reach a shared services VPC. All the applications must be able to communicate with each other.\nIf the migration is successful, the company will repeat the migration process for more than 100 applications.\nWhich solution will meet these requirements with the LEAST administrative overhead?"},{"id":122,"options":[{"letter":"A","text":"Create an Auto Scaling group that uses automatic scaling."},{"letter":"B","text":"Create an Auto Scaling group that uses manual scaling."},{"letter":"C","text":"Create an Auto Scaling group that uses scheduled scaling."},{"letter":"D","text":"Create a reminder in Amazon EventBridge to scale the instances."}],"answer":["C"],"question":"A company has a large workload that runs every Friday evening. The workload runs on Amazon EC2 instances that are in two Availability Zones in the us-east-1 Region. Normally, the company must run no more than two instances at all times. However, the company wants to scale up to six instances each Friday to handle a regularly repeating increased workload.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":123,"options":[{"letter":"A","text":"Configure an Auto Scaling group of Amazon EC2 Spot Instances that run Amazon Linux. Configure a crontab entry on the instances to run the analysis."},{"letter":"B","text":"Configure the job to run in an AWS Lambda function. Create a scheduled rule in Amazon EventBridge to invoke the Lambda function."},{"letter":"C","text":"Configure an AWS DataSync task to run the job. Configure a cron expression to run the task on a schedule."},{"letter":"D","text":"Create a container for the job. Schedule the job to run as an AWS Fargate task on an Amazon Elastic Container Service (Amazon ECS) cluster by using Amazon EventBridge Scheduler."}],"answer":["D"],"question":"A company runs a critical data analysis job each week before the first day of the work week. The job requires at least 1 hour to complete the analysis. The job is stateful and cannot tolerate interruptions. The company needs a solution to run the job on AWS.\nWhich solution will meet these requirements?"},{"id":124,"options":[{"letter":"A","text":"Create a new Aurora cluster in us-west-1 that has Cross-Region Replication."},{"letter":"B","text":"Create a new Aurora cluster in us-west-1. Use AWS Database Migration Service (AWS DMS) to sync both clusters."},{"letter":"C","text":"Convert the Aurora cluster to an Aurora global database. Configure managed failover."},{"letter":"D","text":"Create an Aurora read replica in us-west-1 similar in size to the production application's Aurora MySQL cluster writer instance."}],"answer":["C"],"question":"A company is designing its production application's disaster recovery (DR) strategy. The application is backed by a MySQL database on an Amazon Aurora cluster in the us-east-1 Region. The company has chosen the us-west-1 Region as its DR Region.\nThe company's target recovery point objective (RPO) is 5 minutes and the target recovery time objective (RTO) is 20 minutes. The company wants to minimize configuration changes.\nWhich solution will meet these requirements with the MOST operational efficiency?"},{"id":125,"options":[{"letter":"A","text":"Create an AWS Storage Gateway Volume Gateway. Create a file share that uses the required client protocol. Connect the application server to the file share."},{"letter":"B","text":"Create an AWS Storage Gateway Tape Gateway. Configure tapes to use Amazon S3. Connect the application server to the Tape Gateway."},{"letter":"C","text":"Create an Amazon EC2 Windows instance. Install and configure a Windows file share role on the instance. Connect the application server to the file share."},{"letter":"D","text":"Create an Amazon FSx for Windows File Server file system. Connect the application server to the file system."}],"answer":["D"],"question":"A company is implementing a shared storage solution for a media application that the company hosts on AWS. The company needs the ability to use SMB clients to access stored data.\nWhich solution will meet these requirements with the LEAST administrative overhead?"},{"id":126,"options":[{"letter":"A","text":"Move the website to AWS Amplify. Configure EC2 instances to cache the website."},{"letter":"B","text":"Move the website to an Amazon S3 bucket. Configure an Amazon CloudFront distribution for the S3 bucket."},{"letter":"C","text":"Move the website to an Amazon S3 bucket. Configure an Amazon ElastiCache cluster for the S3 bucket."},{"letter":"D","text":"Move the website to AWS Amplify. Configure an ALB to resolve to the Amplify website."}],"answer":["B"],"question":"A company hosts a website on Amazon EC2 instances behind an Application Load Balancer (ALB). The website serves static content. Website traffic is increasing. The company wants to minimize the website hosting costs.\nWhich solution will meet these requirements?"},{"id":127,"options":[{"letter":"A","text":"Use AWS Control Tower to deploy accounts. Create a networking account that has a VPC with private subnets and public subnets. Use AWS Resource Access Manager (AWS RAM) to share the subnets with the workload accounts."},{"letter":"B","text":"Use AWS Organizations to deploy accounts. Create a networking account that has a VPC with private subnets and public subnets. Use AWS Resource Access Manager (AWS RAM) to share the subnets with the workload accounts."},{"letter":"C","text":"Use AWS Control Tower to deploy accounts. Deploy a VPC in each workload account. Configure each VPC to route through an inspection VPC by using a transit gateway attachment."},{"letter":"D","text":"Use AWS Organizations to deploy accounts. Deploy a VPC in each workload account. Configure each VPC to route through an inspection VPC by using a transit gateway attachment."}],"answer":["A"],"question":"A company wants to isolate its workloads by creating an AWS account for each workload. The company needs a solution that centrally manages networking components for the workloads. The solution also must create accounts with automatic security controls (guardrails).\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":128,"options":[{"letter":"A","text":"AWS Storage Gateway with Amazon ElastiCache"},{"letter":"B","text":"Amazon Elastic Block Store (Amazon EBS) volumes with Amazon CloudFront"},{"letter":"C","text":"Amazon S3 Glacier with Amazon ElastiCache"},{"letter":"D","text":"Amazon S3 with Amazon CloudFront"}],"answer":["D"],"question":"A solutions architect is designing the storage architecture for a new web application used for storing and viewing engineering drawings. All application components will be deployed on the AWS infrastructure.\nThe application design must support caching to minimize the amount of time that users wait for the engineering drawings to load. The application must be able to store petabytes of data.\nWhich combination of storage and caching should the solutions architect use?"},{"id":129,"options":[{"letter":"A","text":"Use native MySQL tools to migrate the database to Amazon RDS for MySQL. Configure storage scaling."},{"letter":"B","text":"Migrate the database to Amazon Redshift by using the mysqldump utility. Turn on Auto Scaling for the Amazon Redshift cluster."},{"letter":"C","text":"Use AWS Database Migration Service (AWS DMS) to migrate the database to Amazon Aurora. Turn on Aurora Auto Scaling."},{"letter":"D","text":"Use AWS Database Migration Service (AWS DMS) to migrate the database to Amazon DynamoDB. Configure an Auto Scaling policy."}],"answer":["C"],"question":"A company has an on-premises MySQL database that handles transactional data. The company is migrating the database to the AWS Cloud. The migrated database must maintain compatibility with the company's applications that use the database. The migrated database also must scale automatically during periods of increased demand.\nWhich migration solution will meet these requirements?"},{"id":130,"options":[{"letter":"A","text":"Create an S3 Lifecycle policy to move the files to S3 Standard-Infrequent Access (S3 Standard-IA) 30 days after object creation. Move the files to S3 Glacier Flexible Retrieval 4 years after object creation."},{"letter":"B","text":"Create an S3 Lifecycle policy to move the files to S3 Standard-Infrequent Access (S3 Standard-IA) 30 days after object creation. Delete the files 4 years after object creation."},{"letter":"C","text":"Create an S3 Lifecycle policy to move the files to S3 Glacier Instant Retrieval 30 days after object creation. Delete the files 4 years after object creation."},{"letter":"D","text":"Create an S3 Lifecycle policy to move the files to S3 One Zone-Infrequent Access (S3 One Zone-IA) 30 days after object creation. Delete the files 4 years after object creation."}],"answer":["B"],"question":"A company needs to optimize its Amazon S3 storage costs for an application that generates many files that cannot be recreated. Each file is approximately 5 MB and is stored in Amazon S3 Standard storage.\nThe company must store the files for 4 years before the files can be deleted. The files must be immediately accessible. The files are frequently accessed in the first 30 days of object creation, but they are rarely accessed after the first 30 days.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":131,"options":[{"letter":"A","text":"Set up an AWS CloudTrail event that has a rule to identify all S3 buckets that are not versioning-enabled across Regions."},{"letter":"B","text":"Use Amazon S3 Storage Lens to identify all S3 buckets that are not versioning-enabled across Regions."},{"letter":"C","text":"Enable IAM Access Analyzer for S3 to identify all S3 buckets that are not versioning-enabled across Regions."},{"letter":"D","text":"Create an S3 Multi-Region Access Point to identify all S3 buckets that are not versioning-enabled across Regions."}],"answer":["B"],"question":"A global company runs its workloads on AWS. The company's application uses Amazon S3 buckets across AWS Regions for sensitive data storage and analysis. The company stores millions of objects in multiple S3 buckets daily. The company wants to identify all S3 buckets that are not versioning-enabled.\nWhich solution will meet these requirements?"},{"id":132,"options":[{"letter":"A","text":"Use a data stream in Amazon Kinesis Data Streams in on-demand mode to capture the clickstream data. Use AWS Lambda to process the data in real time."},{"letter":"B","text":"Use Amazon Managed Service for Apache Flink (previously known as Amazon Kinesis Data Analytics) to capture the clickstream data. Use AWS Lambda to process the data in real time."},{"letter":"C","text":"Use Amazon Kinesis Data Firehose to capture the clickstream data. Use AWS Glue to process the data in real time."},{"letter":"D","text":"Use Amazon Kinesis Video Streams to capture the clickstream data. Use AWS Glue to process the data in real time."}],"answer":["A"],"question":"An ecommerce company wants to collect user clickstream data from the company's website for real-time analysis. The website experiences fluctuating traffic patterns throughout the day. The company needs a scalable solution that can adapt to varying levels of traffic.\nWhich solution will meet these requirements?"},{"id":133,"options":[{"letter":"A","text":"Configure AWS Systems Manager to create encrypted copies of the EBS volumes. Reconfigure the EC2 instances to use the encrypted volumes."},{"letter":"B","text":"Configure the EC2 account attributes to always encrypt new EBS volumes."},{"letter":"C","text":"Create a customer managed key in AWS Key Management Service (AWS KMS). Configure AWS Migration Hub to use the key when the company migrates workloads."},{"letter":"D","text":"Use AWS Config. Configure the encrypted-volumes identifier. Apply the default AWS Key Management Service (AWS KMS) key."}],"answer":["B"],"question":"A company plans to rehost an application to Amazon EC2 instances that use Amazon Elastic Block Store (Amazon EBS) as the attached storage.\nA solutions architect must design a solution to ensure that all newly created Amazon EBS volumes are encrypted by default. The solution must also prevent the creation of unencrypted EBS volumes.\nWhich solution will meet these requirements?"},{"id":134,"options":[{"letter":"A","text":"Use Amazon RDS Proxy to connect the applications to Aurora PostgreSQL."},{"letter":"B","text":"Enable Babelfish on Aurora PostgreSQL to run the SQL queries from the applications."},{"letter":"C","text":"Use AWS Database Migration Service (AWS DMS) to rewrite the SQL queries in the applications."},{"letter":"D","text":"Use the AWS Schema Conversion Tool (AWS SCT) to rewrite the SQL queries in the applications."},{"letter":"E","text":"Migrate the database schema and data by using the AWS Schema Conversion Tool (AWS SCT) and AWS Database Migration Service (AWS DMS)."}],"answer":["B","E"],"question":"A company uses a Microsoft SQL Server database. The company's applications are connected to the database. The company wants to migrate to an Amazon Aurora PostgreSQL database with minimal changes to the application code.\nWhich combination of steps will meet these requirements? (Choose two.)"},{"id":135,"options":[{"letter":"A","text":"Purchase an EC2 Instance Savings Plan for Amazon EC2 and Fargate."},{"letter":"B","text":"Purchase a Compute Savings Plan for Lambda, Fargate, and Amazon EC2."},{"letter":"C","text":"Purchase a SageMaker Savings Plan."},{"letter":"D","text":"Purchase a Compute Savings Plan for Amazon EC2, Lambda, and SageMaker."},{"letter":"E","text":"Purchase an EC2 Instance Savings Plan for Amazon EC2 and SageMaker."}],"answer":["B","C"],"question":"A company has released a new version of its production application. The company's workload uses Amazon EC2, AWS Lambda, AWS Fargate, and Amazon SageMaker.\nThe company wants to cost optimize the workload now that usage is at a steady state. The company wants to cover the most services with the fewest savings plans.\nWhich combination of savings plans will meet these requirements? (Choose two.)"},{"id":136,"options":[{"letter":"A","text":"Configure the security group for the web tier to allow outbound HTTPS traffic to 0.0.0.0/0."},{"letter":"B","text":"Configure the security group for the application tier to allow outbound HTTPS traffic and Microsoft SQL Server traffic to the security group for the web tier."},{"letter":"C","text":"Configure the security group for the application tier to allow inbound HTTPS traffic from the security group for the web tier."},{"letter":"D","text":"Configure the security group for the database tier to allow inbound Microsoft SQL Server traffic from the security group for the application tier."},{"letter":"E","text":"Configure the security group for the web tier to allow inbound HTTPS traffic from the security group for the ALB."},{"letter":"F","text":"Configure the security group for the database tier to allow outbound HTTPS traffic and Microsoft SQL Server traffic to the security group for the web tier."}],"answer":["C","D","E"],"question":"A solutions architect is designing a three-tier web application. The architecture consists of an internet-facing Application Load Balancer (ALB) and a web tier that is hosted on Amazon EC2 instances in private subnets. The application tier with the business logic runs on EC2 instances in private subnets. The database tier consists of Microsoft SQL Server that runs on EC2 instances in private subnets. Security is a high priority for the company.\nWhich combination of security group configurations should the solutions architect use? (Choose three.)"},{"id":137,"options":[{"letter":"A","text":"Use AWS Service Catalog to allow developers to launch resources within a limited cost range. Create AWS Lambda functions in each AWS account to stop running resources at the end of each work day. Configure the Lambda functions to resume the resources at the start of each work day."},{"letter":"B","text":"Use AWS Cost Explorer to monitor and report on costs for each developer account. Configure Cost Explorer to send a daily report to each developer to monitor their spending. Use AWS Cost Anomaly Detection to detect anomalous spending and provide alerts."},{"letter":"C","text":"Use AWS Budgets to establish budgets for each developer account. Set up budget alerts for actual and forecast values to notify developers when they exceed or expect to exceed their assigned budget. Use AWS Budgets actions to apply a DenyAll policy to the developer's IAM role to prevent additional resources from being launched when the assigned budget is reached."},{"letter":"D","text":"Instruct each developer to tag all their resources with a tag that has a key of CostCenter and a value of the developer's name. Use the required-tags AWS Config managed rule to check for the tag. Create an AWS Lambda function to terminate resources that do not have the tag. Configure AWS Cost Explorer to send a daily report to each developer to monitor their spending."}],"answer":["C"],"question":"A company has deployed a multi-account strategy on AWS by using AWS Control Tower. The company has provided individual AWS accounts to each of its developers. The company wants to implement controls to limit AWS resource costs that the developers incur.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":138,"options":[{"letter":"A","text":"Purchase a Compute Savings Plan. Keep the Lambda functions in the Lambda service VPC."},{"letter":"B","text":"Purchase a Compute Savings Plan. Connect the Lambda functions to the private subnets that contain the EC2 instances."},{"letter":"C","text":"Purchase an EC2 Instance Savings Plan. Connect the Lambda functions to new public subnets in the same VPC where the EC2 instances run."},{"letter":"D","text":"Purchase an EC2 Instance Savings Plan. Connect the Lambda functions to the private subnets that contain the EC2 instances."}],"answer":["B"],"question":"A company runs its application by using Amazon EC2 instances and AWS Lambda functions. The EC2 instances run in private subnets of a VPC. The Lambda functions need direct network access to the EC2 instances for the application to work.\nThe application will run for 1 year. The number of Lambda functions that the application uses will increase during the 1-year period. The company must minimize costs on all application resources.\nWhich solution will meet these requirements?"},{"id":139,"options":[{"letter":"A","text":"Add a Cache-Control max-age directive of 24 hours to the objects in Amazon S3. On deployment, create a CloudFront invalidation to clear any changed files from edge caches."},{"letter":"B","text":"Set the CloudFront default TTL to 2 minutes."},{"letter":"C","text":"Set a default TTL of 2 minutes on the S3 bucket."},{"letter":"D","text":"Add a Cache-Control private directive to the objects in Amazon S3."},{"letter":"E","text":"Create an AWS Lambda@Edge function to add an Expires header to HTTP responses. Configure the function to run on viewer response."}],"answer":["A","B"],"question":"A company is hosting a high-traffic static website on Amazon S3 with an Amazon CloudFront distribution that has a default TTL of 0 seconds. The company wants to implement caching to improve performance for the website. However, the company also wants to ensure that stale content is not served for more than a few minutes after a deployment.\nWhich combination of caching methods should a solutions architect implement to meet these requirements? (Choose two.)"},{"id":140,"options":[{"letter":"A","text":"Share an Amazon QuickSight dashboard that includes the requested table visual. Configure QuickSight to use AWS DataSync to query the new report."},{"letter":"B","text":"Share an Amazon QuickSight dashboard that includes the requested table visual. Configure QuickSight to use Amazon Athena to query the new report."},{"letter":"C","text":"Share an Amazon CloudWatch dashboard that includes the requested table visual. Configure CloudWatch to use Amazon Athena to query the new report."},{"letter":"D","text":"Share an Amazon CloudWatch dashboard that includes the requested table visual. Configure CloudWatch to use AWS DataSync to query the new report."}],"answer":["B"],"question":"A company that uses AWS Organizations runs 150 applications across 30 different AWS accounts. The company used AWS Cost and Usage Report to create a new report in the management account. The report is delivered to an Amazon S3 bucket that is replicated to a bucket in the data collection account.\nThe company’s senior leadership wants to view a custom dashboard that provides NAT gateway costs each day starting at the beginning of the current month.\nWhich solution will meet these requirements?"},{"id":141,"options":[{"letter":"A","text":"Configure an AWS Lambda function to retry the ticket purchases until the processing is complete."},{"letter":"B","text":"Update the application to send the purchase requests to an Amazon Simple Queue Service (Amazon SQS) queue. Configure an Auto Scaling group of new EC2 instances that read from the SQS queue."},{"letter":"C","text":"Configure the application to use an Amazon ElastiCache cluster in front of the Aurora PostgreSQL DB cluster."},{"letter":"D","text":"Configure an Auto Scaling group of new EC2 instances to retry the purchases until the processing is complete. Update the applications to connect to the DB cluster by using Amazon RDS Proxy."},{"letter":"E","text":"Configure an Amazon AP! Gateway REST API with a usage plan."}],"answer":["B","C"],"question":"A company runs an ecommerce application on AWS. Amazon EC2 instances process purchases and store the purchase details in an Amazon Aurora PostgreSQL DB cluster.\nCustomers are experiencing application timeouts during times of peak usage. A solutions architect needs to rearchitect the application so that the application can scale to meet peak usage demands.\nWhich combination of actions will meet these requirements MOST cost-effectively? (Choose two.)"},{"id":142,"options":[{"letter":"A","text":"Configure AWS WAF."},{"letter":"B","text":"Set up API Gateway with an Amazon CloudFront distribution. Configure AWS WAF in CloudFront."},{"letter":"C","text":"Configure AWS Shield."},{"letter":"D","text":"Set up API Gateway with an Amazon CloudFront distribution. Configure AWS Shield in CloudFront."}],"answer":["A"],"question":"A company uses Amazon API Gateway to manage its REST APIs that third-party service providers access. The company must protect the REST APIs from SQL injection and cross-site scripting attacks.\nWhat is the MOST operationally efficient solution that meets these requirements?"},{"id":143,"options":[{"letter":"A","text":"Migrate the website from Amazon S3 to Amazon EC2 instances that run Windows Server. Use Internet Information Services (IIS) for Windows Server to host the webpage. Use client-side scripting to build the contact form. Integrate the form with Amazon WorkMail."},{"letter":"B","text":"Host the dynamic contact form in Amazon Elastic Container Service (Amazon ECS). Set up Amazon Simple Email Service (Amazon SES) to connect to a third-party email provider."},{"letter":"C","text":"Create an Amazon API Gateway endpoint that returns the contact form from an AWS Lambda function. Configure another Lambda function on the API Gateway to publish a message to an Amazon Simple Notification Service (Amazon SNS) topic."},{"letter":"D","text":"Host the website by using AWS Amplify Hosting for static content and dynamic content. Use server-side scripting to build the contact form. Configure Amazon Simple Queue Service (Amazon SQS) to deliver the message to the company."}],"answer":["C"],"question":"A company uses Amazon S3 to host its static website. The company wants to add a contact form to the webpage. The contact form will have dynamic server-side components for users to input their name, email address, phone number, and user message.\nThe company expects fewer than 100 site visits each month. The contact form must notify the company by email when a customer fills out the form.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":144,"options":[{"letter":"A","text":"Configure a Network Load Balancer in front of the EC2 instances."},{"letter":"B","text":"Configure new EC2 instances in a different Availability Zone. Use Amazon Route 53 to route traffic to all instances."},{"letter":"C","text":"Create an Auto Scaling group for the EC2 instances. Configure the Auto Scaling group to use multiple Availability Zones. Configure the Auto Scaling group to run application health checks on the instances."},{"letter":"D","text":"Create an Amazon CloudWatch alarm. Configure the alarm to restart EC2 instances that transition to a stopped state."},{"letter":"E","text":"Configure a Network Load Balancer for TCP traffic to the instances. Configure an Application Load Balancer for HTTP and HTTPS traffic to the instances."}],"answer":["A","C"],"question":"A company hosts an application on Amazon EC2 instances that run in a single Availability Zone. The application is accessible by using the transport layer of the Open Systems Interconnection (OSI) model. The company needs the application architecture to have high availability.\nWhich combination of steps will meet these requirements MOST cost-effectively? (Choose two.)"},{"id":145,"options":[{"letter":"A","text":"Deploy an S3 gateway endpoint to access the S3 buckets."},{"letter":"B","text":"Deploy AWS Storage Gateway to access the S3 buckets."},{"letter":"C","text":"Deploy an S3 interface endpoint to access the S3 buckets."},{"letter":"D","text":"Deploy a NAT gateway to access the S3 buckets."}],"answer":["A"],"question":"A company runs an application on Amazon EC2 instances in a private subnet. The application needs to store and retrieve data in Amazon S3 buckets. According to regulatory requirements, the data must not travel across the public internet.\nWhat should a solutions architect do to meet these requirements MOST cost-effectively?"},{"id":146,"options":[{"letter":"A","text":"Create an Auto Scaling group and an ELB in the DR Region. Configure the DynamoDB table as a global table. Create an Amazon CloudWatch alarm with an evaluation period of 10 minutes to invoke an AWS Lambda function that updates Amazon Route 53 to point to the DR Region's ELB."},{"letter":"B","text":"Create an AWS CloudFormation template to create EC2 instances and an ELB to be launched when necessary. Configure the DynamoDB table as a global table. Configure DNS failover to point to the new DR Region's ELB."},{"letter":"C","text":"Create an AWS CloudFormation template to create EC2 instances, ELBs, and DynamoDB tables to be launched when necessary. Configure DNS failover to point to the new DR Region's ELB."},{"letter":"D","text":"Create an Auto Scaling group and an ELB in the DR Region. Configure the DynamoDB table as a global table. Configure DNS failover to point to the new DR Region's ELB."}],"answer":["D"],"question":"A company hosts its application in the AWS Cloud. The application runs on Amazon EC2 instances in an Auto Scaling group behind an Elastic Load Balancing (ELB) load balancer. The application connects to an Amazon DynamoDB table.\nFor disaster recovery (DR) purposes, the company wants to ensure that the application is available from another AWS Region with minimal downtime.\nWhich solution will meet these requirements with the LEAST downtime?"},{"id":147,"options":[{"letter":"A","text":"Set up Amazon GuardDuty in the account to monitor all EC2 instances. Deploy AWS Config to automate patch installations on the EC2 instances."},{"letter":"B","text":"Set up AWS Systems Manager Patch Manager to manage all the EC2 instances. Deploy Amazon Inspector, and configure monthly reports."},{"letter":"C","text":"Set up AWS Systems Manager Patch Manager to manage all the EC2 instances. Configure AWS Security Hub to produce monthly reports."},{"letter":"D","text":"Set up AWS Shield Advanced, and configure monthly reports. Deploy AWS Config to automate patch installations on the EC2 instances."}],"answer":["B"],"question":"A company has migrated a fleet of hundreds of on-premises virtual machines (VMs) to Amazon EC2 instances. The instances run a diverse fleet of Windows Server versions along with several Linux distributions. The company wants a solution that will automate inventory and updates of the operating systems. The company also needs a summary of common vulnerabilities of each instance for regular monthly reviews.\nWhat should a solutions architect recommend to meet these requirements?"},{"id":148,"options":[{"letter":"A","text":"Define a resource in AWS Resource Access Manager that prevents the launch of large EC2 instances."},{"letter":"B","text":"Create an organization in AWS Organizations in the management account with the default policy. Create a service control policy (SCP) that denies the launch of large EC2 instances, and apply it to the AWS accounts."},{"letter":"C","text":"Create an IAM role in each account that denies the launch of large EC2 instances. Grant the developers IAM group access to the role."},{"letter":"D","text":"Update the IAM policies to deny the launch of large EC2 instances. Apply the policies to all users."}],"answer":["B"],"question":"A development team uses multiple AWS accounts for its development, staging, and production environments. Team members have been launching large Amazon EC2 instances that are underutilized. A solutions architect must prevent large instances from being launched in all accounts.\nHow can the solutions architect meet this requirement with the LEAST operational overhead?"},{"id":149,"options":[{"letter":"A","text":"Configure AWS Directory Service for Microsoft Active Directory for authentication. Implement AWS Lambda for authorization. Use an Application Load Balancer to serve the web application globally."},{"letter":"B","text":"Configure AWS Directory Service for Microsoft Active Directory for authentication. Implement Lambda@Edge for authorization. Use AWS Elastic Beanstalk to serve the web application globally."},{"letter":"C","text":"Configure Amazon Cognito for authentication. Implement Lambda@Edge for authorization. Configure Amazon CloudFront to serve the web application globally."},{"letter":"D","text":"Configure Amazon Cognito for authentication. Implement AWS Lambda for authorization. Use Amazon S3 Transfer Acceleration to serve the web application globally."}],"answer":["C"],"question":"A company wants to restrict access to the content of its web application. The company needs to protect the content by using authorization techniques that are available on AWS. The company also wants to implement a serverless architecture for authorization and authentication that has low login latency.\nThe solution must integrate with the web application and serve web content globally. The application currently has a small user base, but the company expects the application's user base to increase.\nWhich solution will meet these requirements?"},{"id":150,"options":[{"letter":"A","text":"Create two policy documents by using the AWS Management Console in each account. Assign the policy to developers who need access."},{"letter":"B","text":"Create an IAM role in the Development account. Grant the IAM role access to the Production account. Allow developers to assume the role."},{"letter":"C","text":"Create an IAM role in the Production account. Define a trust policy that specifies the Development account. Allow developers to assume the role."},{"letter":"D","text":"Create an IAM group in the Production account. Add the group as a principal in a trust policy that specifies the Production account. Add developers to the group."}],"answer":["C"],"question":"A company has two AWS accounts: Production and Development. The company needs to push code changes in the Development account to the Production account. In the alpha phase, only two senior developers on the development team need access to the Production account. In the beta phase, more developers will need access to perform testing.\nWhich solution will meet these requirements?"},{"id":151,"options":[{"letter":"A","text":"Create a flow by using Amazon AppFlow. Send the orders to the flow. Configure an AWS Lambda function as the target to process the orders."},{"letter":"B","text":"Configure AWS X-Ray in the application to track the order requests. Configure the application to process the orders by pulling the orders from Amazon CloudWatch."},{"letter":"C","text":"Create an Amazon Simple Notification Service (Amazon SNS) standard topic. Publish all the orders to the SNS standard topic. Configure the application as a notification target."},{"letter":"D","text":"Create an Amazon Simple Queue Service (Amazon SQS) FIFO queue. Put all the orders in the SQS queue. Configure an AWS Lambda function as the target to process the orders."}],"answer":["D"],"question":"A company wants to enhance its ecommerce order-processing application that is deployed on AWS. The application must process each order exactly once without affecting the customer experience during unpredictable traffic surges.\nWhich solution will meet these requirements?"},{"id":152,"options":[{"letter":"A","text":"Deploy an AWS Storage Gateway on premises in Amazon S3 File Gateway mode."},{"letter":"B","text":"Deploy an AWS Storage Gateway on premises in Amazon FSx File Gateway made."},{"letter":"C","text":"Set up an AWS Glue crawler to create a table based on the data that is in Amazon S3."},{"letter":"D","text":"Setup Amazon Athena to query the data that is in Amazon S3. Provide access to analysts."},{"letter":"E","text":"Set up an Amazon Redshift cluster to query the data that is in Amazon S3. Provide access to analysts."},{"letter":"F","text":"Set up an Amazon EMR cluster with EMR File System (EMRFS) to query the data that is in Amazon S3. Provide access to analysts."}],"answer":["A","C","D"],"question":"A research company uses on-premises devices to generate data for analysis. The company wants to use the AWS Cloud to analyze the data. The devices generate .csv files and support writing the data to an SMB file share. Company analysts must be able to use SQL commands to query the data. The analysts will run queries periodically throughout the day.\nWhich combination of steps will meet these requirements MOST cost-effectively? (Choose three.)"},{"id":153,"options":[{"letter":"A","text":"Use Amazon CloudWatch metrics reporting to determine EBS volume recommendations for optimization."},{"letter":"B","text":"Use AWS Systems Manager reporting to determine EBS volume recommendations for optimization."},{"letter":"C","text":"Use AWS Compute Optimizer to generate EBS volume recommendations for optimization."},{"letter":"D","text":"Use Amazon Inspector reporting to generate EBS volume recommendations for optimization."}],"answer":["C"],"question":"A company runs its production workload on Amazon EC2 instances with Amazon Elastic Block Store (Amazon EBS) volumes. A solutions architect needs to analyze the current EBS volume cost and to recommend optimizations. The recommendations need to include estimated monthly saving opportunities.\nWhich solution will meet these requirements?"},{"id":154,"options":[{"letter":"A","text":"Create an AWS Direct Connect connection between the VPC and an S3 regional endpoint."},{"letter":"B","text":"Create a gateway VPC endpoint for Amazon S3. Create a route in the VPC route table to the endpoint."},{"letter":"C","text":"Deploy the S3 bucket inside the VPCreate a route in the VPC route table to the bucket."},{"letter":"D","text":"Create an internal Network Load Balancer that has the S3 bucket as the target."}],"answer":["B"],"question":"A company runs a web application on multiple Amazon EC2 instances in a VPC. The application needs to write sensitive data to an Amazon S3 bucket. The data cannot be sent over the public internet.\nWhich solution will meet these requirements?"},{"id":155,"options":[{"letter":"A","text":"Use the high performance computing (HPC) optimized instance family for the application. Use the memory optimized instance family for the database."},{"letter":"B","text":"Use the memory optimized instance family for both the application and the database."},{"letter":"C","text":"Use the storage optimized instance family for both the application and the database."},{"letter":"D","text":"Use the compute optimized instance family for the application. Use the memory optimized instance family for the database."}],"answer":["B"],"question":"A company's SAP application has a backend SQL Server database in an on-premises environment. The company wants to migrate its on-premises application and database server to AWS. The company needs an instance type that meets the high demands of its SAP database. On-premises performance data shows that both the SAP application and the database have high memory utilization.\nWhich solution will meet these requirements?"},{"id":156,"options":[{"letter":"A","text":"Create a second Aurora DB cluster. Configure a copy job to replicate the users’ data to the new database. Update the application to use the second database to read the data."},{"letter":"B","text":"Create an Amazon DynamoDB Accelerator (DAX) cluster in front of the existing Aurora DB cluster. Update the application to use the DAX cluster for read-only queries. Write data directly to the Aurora DB cluster."},{"letter":"C","text":"Create an Amazon Redshift cluster. Copy the users' data to the Redshift cluster. Update the application to connect to the Redshift cluster and to perform read-only queries on the Redshift cluster."},{"letter":"D","text":"Create an Aurora read replica in the existing Aurora DB cluster. Update the application to use the replica endpoint for read-only queries and to use the cluster endpoint for write queries."}],"answer":["D"],"question":"A company that runs its application on AWS uses an Amazon Aurora DB cluster as its database. During peak usage hours when multiple users access and read the data, the monitoring system shows degradation of database performance for the write queries. The company wants to increase the scalability of the application to meet peak usage demands.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":157,"options":[{"letter":"A","text":"Write an AWS Lambda function to create an RDS snapshot every day."},{"letter":"B","text":"Modify the RDS database to have a retention period of 30 days for automated backups."},{"letter":"C","text":"Use AWS Systems Manager Maintenance Windows to modify the RDS backup retention period."},{"letter":"D","text":"Create a manual snapshot every day by using the AWS CLI. Modify the RDS backup retention period."}],"answer":["B"],"question":"A company uses Amazon RDS with default backup settings for its database tier. The company needs to make a daily backup of the database to meet regulatory requirements. The company must retain the backups for 30 days.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":158,"options":[{"letter":"A","text":"Configure the S3 bucket to use client-side encryption with an Amazon S3 managed encryption key. Configure the application to use the S3 bucket to store the archival files."},{"letter":"B","text":"Configure the S3 bucket to use server-side encryption with AWS KMS keys (SSE-KMS). Configure the application to use the S3 bucket to store the archival files."},{"letter":"C","text":"Configure the application to use client-side encryption with a key stored in AWS Key Management Service (AWS KMS). Configure the application to store the archival files in the S3 bucket."},{"letter":"D","text":"Configure the S3 bucket to use dual-layer server-side encryption with AWS KMS keys (SSE-KMS). Configure the application to use the S3 bucket to store the archival files."}],"answer":["C"],"question":"A company runs an application in the AWS Cloud that generates sensitive archival data files. The company wants to rearchitect the application's data storage. The company wants to encrypt the data files and to ensure that third parties do not have access to the data before the data is encrypted and sent to AWS. The company has already created an Amazon S3 bucket.\nWhich solution will meet these requirements?"},{"id":159,"options":[{"letter":"A","text":"Provision an Amazon Elastic File System (Amazon EFS) file system in General Purpose performance mode. Monitor Amazon CloudWatch for IOPS bottlenecks. Change to Provisioned Throughput performance mode if necessary."},{"letter":"B","text":"Provision an Amazon DocumentDB (with MongoDB compatibility) instance with a memory optimized instance type. Monitor Amazon CloudWatch for performance-related issues. Change the instance class if necessary."},{"letter":"C","text":"Provision an Amazon RDS for MySQL DB instance with General Purpose SSD storage. Place an Amazon ElastiCache cluster in front of the DB instance. Configure the application to query ElastiCache instead."},{"letter":"D","text":"Provision an Amazon RDS for MySQL DB instance with Provisioned IOPS SSD storage. Monitor write operation metrics by using Amazon CloudWatch. Adjust the provisioned IOPS if necessary."}],"answer":["D"],"question":"A company wants to relocate its on-premises MySQL database to AWS. The database accepts regular imports from a client-facing application, which causes a high volume of write operations. The company is concerned that the amount of traffic might be causing performance issues within the application.\nHow should a solutions architect design the architecture on AWS?"},{"id":160,"options":[{"letter":"A","text":"Create a single NAT gateway in a public subnet. In the route tables for the private subnets, add a default route that points to the NAT gateway."},{"letter":"B","text":"Create one NAT gateway for each Availability Zone in public subnets. In each of the route tables for the private subnets, add a default route that points to the NAT gateway in the same Availability Zone."},{"letter":"C","text":"Create a gateway endpoint for Amazon S3 in the VPC. In the route tables for the private subnets, add an entry for the gateway endpoint."},{"letter":"D","text":"Create an AWS PrivateLink interface endpoint for Amazon S3 in the VPIn the route tables for the private subnets, add an entry for the interface endpoint."}],"answer":["C"],"question":"A solutions architect is creating an application. The application will run on Amazon EC2 instances in private subnets across multiple Availability Zones in a VPC. The EC2 instances will frequently access large files that contain confidential information. These files are stored in Amazon S3 buckets for processing. The solutions architect must optimize the network architecture to minimize data transfer costs.\nWhat should the solutions architect do to meet these requirements?"},{"id":161,"options":[{"letter":"A","text":"Review the Trusted Advisor checks for compute optimization. Crosscheck the results by using AWS Compute Optimizer."},{"letter":"B","text":"Review the Trusted Advisor checks for Amazon RDS Idle DB Instances."},{"lette te assets that are stored in the EFS file system."},{"letter":"C","text":"Copy the website assets to an Amazon S3 bucket. Ensure that each EC2 instance downloads the website assets from the S3 bucket to the attached Amazon Elastic Block Store (Amazon EBS) volume. Run the S3 sync command once each hour to keep files up to date."},{"letter":"D","text":"Restore an Amazon Elastic Block Store (Amazon EBS) snapshot with the website assets. Attach the EBS snapshot as a secondary EBS volume when a new EC2 instance is launched. Configure the website hosting application to reference the website assets that are stored in the secondary EBS volume."}],"answer":["B"],"question":"A company is building a web application that serves a content management system. The content management system runs on Amazon EC2 instances behind an Application Load Balancer (ALB). The EC2 instances run in an Auto Scaling group across multiple Availability Zones. Users are constantly adding and updating files, blogs, and other website assets in the content management system.\nA solutions architect must implement a solution in which all the EC2 instances share up-to-date website content with the least possible lag time.\nWhich solution meets these requirements?"},{"id":169,"options":[{"letter":"A","text":"Give the developers the ability to launch separate Amazon Aurora instances. Set up a process to shut down Aurora instances at the end of the workday and to start Aurora instances at the beginning of the next workday."},{"letter":"B","text":"Monitor AWS Trusted Advisor checks for idle Amazon RDS databases. Create a process to terminate identified idle RDS databases."},{"letter":"C","text":"Develop an AWS Service Catalog product that enforces size restrictions for launching Amazon Aurora instances. Give the developers access to launch the product when they need a development database."},{"letter":"D","text":"Create an Amazon Aurora Serverless cluster. Develop an AWS Service Catalog product to launch databases in the cluster with the default capacity settings. Grant the developers access to the product."}],"answer":["D"],"question":"A large company wants to provide its globally located developers separate, limited size, managed PostgreSQL databases for development purposes. The databases will be low volume. The developers need the databases only when they are actively working.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":170,"options":[{"letter":"A","text":"Use Amazon Neptune to store the data. Use SPARQL to query the data to identify security risks."},{"letter":"B","text":"Use Amazon RDS to store the data. Use SQL to query the data to identify security risks."},{"letter":"C","text":"Use Amazon DynamoDB to store the data. Use PartiQL to query the data to identify security risks."},{"letter":"D","text":"Use Amazon Redshift to store the data. Use SQL to query the data to identify security risks."}],"answer":["A"],"question":"A company wants to build a map of its IT infrastructure to identify and enforce policies on resources that pose security risks. The company's security team must be able to query data in the IT infrastructure map and quickly identify security risks.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":171,"options":[{"letter":"A","text":"Use AWS Systems Manager State Manager to manage the configuration and monitoring of backup tasks."},{"letter":"B","text":"Use AWS Backup to configure and monitor all backups for the services in use."},{"letter":"C","text":"Use AWS Config to set lifecycle management to take snapshots of all data sources on a schedule."},{"letter":"D","text":"Use third-party backup software with an AWS Storage Gateway tape gateway virtual tape library."}],"answer":["B"],"question":"A large international university has deployed all of its compute services in the AWS Cloud. These services include Amazon EC2, Amazon RDS, and Amazon DynamoDB. The university currently relies on many custom scripts to back up its infrastructure. However, the university wants to centralize management and automate data backups as much as possible by using AWS native options.\nWhich solution will meet these requirements?"},{"id":172,"options":[{"letter":"A","text":"Migrate the database to Amazon RDS for PostgreSQL by using AWS Database Migration Service (AWS DMS). Rewrite the application code to remove the dependency on third-party features."},{"letter":"B","text":"Migrate the database to Amazon DynamoDB by using AWS Database Migration Service (AWS DMS). Customize the new database settings to support the third-party features."},{"letter":"C","text":"Migrate the database to Amazon RDS Custom for Oracle by using native tools. Customize the new database settings to support the third-party features."},{"letter":"D","text":"Migrate the database to Amazon RDS for Oracle by using native tools. Replace the third-party features with AWS Lambda."}],"answer":["C"],"question":"A company runs its application on Oracle Database Enterprise Edition. The company needs to migrate the application and the database to AWS. The company can use the Bring Your Own License (BYOL) model while migrating to AWS. The application uses third-party database features that require privileged access.\nA solutions architect must design a solution for the database migration.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":173,"options":[{"letter":"A","text":"Store the password in AWS Key Management Service (AWS KMS). Enable automatic rotation on the AWS KMS key."},{"letter":"B","text":"Store the password in AWS Systems Manager Parameter Store. Write an AWS Lambda function that rotates the password."},{"letter":"C","text":"Store the password in AWS Systems Manager Parameter Store. Enable automatic rotation on the parameter."},{"letter":"D","text":"Store the password in AWS Secrets Manager. Enable automatic rotation on the secret."}],"answer":["D"],"question":"A co ata that is in Amazon S3."},{"letter":"B","text":"Configure AWS Security Hub for all Regions. Create an AWS Config rule to analyze the data that is in Amazon S3."},{"letter":"C","text":"Configure Amazon GuardDuty to analyze the data that is in Amazon S3."},{"letter":"D","text":"Configure Amazon Inspector to analyze the data that is in Amazon S3."}],"answer":["A"],"question":"A solutions architect needs to review a company's Amazon S3 buckets to discover personally identifiable information (PII). The company stores the PII data in the us-east-1 Region and us-west-2 Region.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":180,"options":[{"letter":"A","text":"Amazon CloudFront"},{"letter":"B","text":"AWS Global Accelerator"},{"letter":"C","text":"AWS Client VPN"},{"letter":"D","text":"Amazon EC2 instances and AWS Elastic IP addresses"}],"answer":["B"],"question":"A news company that has reporters all over the world is hosting its broadcast system on AWS. The reporters send live broadcasts to the broadcast system. The reporters use software on their phones to send live streams through the Real Time Messaging Protocol (RTMP).\nA solutions architect must design a solution that gives the reporters the ability to send the highest quality streams. The solution must provide accelerated TCP connections back to the broadcast system.\nWhat should the solutions architect use to meet these requirements?"},{"id":181,"options":[{"letter":"A","text":"Replace the EC2 NAT instance with an AWS managed NAT gateway."},{"letter":"B","text":"Increase the size of the EC2 NAT instance in the VPC to a network optimized instance type."},{"letter":"C","text":"Provision a transit gateway. Place transit gateway attachments in the private subnets where the Lambda function is running."},{"letter":"D","text":"Provision a gateway endpoint for Amazon S3 in the VPC. Update the route tables of the subnets accordingly."}],"answer":["D"],"question":"A company runs a
