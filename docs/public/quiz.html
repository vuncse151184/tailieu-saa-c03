n tier.\nThe company needs to make an automated scaling plan that will analyze each resource's daily and weekly historical workload trends. The configuration must scale resources appropriately according to both the forecast and live changes in utilization.\nWhich scaling strategy should a solutions architect recommend to meet these requirements?"},{"id":286,"options":[{"letter":"A","text":"Enable point-in-time recovery on the DynamoDB tables."},{"letter":"B","text":"Configure deletion protection on the DynamoDB tables."},{"letter":"C","text":"Configure a trail in AWS CloudTrail. Create an Amazon EventBridge rule for delete actions. Create an AWS Lambda function to automatically restore deleted DynamoDB tables."},{"letter":"D","text":"Create a backup and restore plan for the DynamoDB tables. Recover the DynamoDB tables manually."}],"answer":["B"],"question":"A company stores critical data in Amazon DynamoDB tables in the company's AWS account. An IT administrator accidentally deleted a DynamoDB table. The deletion caused a significant loss of data and disrupted the company's operations. The company wants to prevent this type of disruption in the future.\nWhich solution will meet this requirement with the LEAST operational overhead?"},{"id":287,"options":[{"letter":"A","text":"Switch from multipart uploads to Amazon S3 Transfer Acceleration."},{"letter":"B","text":"Configure S3 inventory to prevent objects from being archived too quickly."},{"letter":"C","text":"Configure Amazon CloudFront to reduce the number of objects stored in Amazon S3."},{"letter":"D","text":"Enable an S3 Lifecycle policy that deletes incomplete multipart uploads."}],"answer":["D"],"question":"A company maintains about 300 TB in Amazon S3 Standard storage month after month. The S3 objects are each typically around 50 GB in size and are frequently replaced with multipart uploads by their global application. The number and size of S3 objects remain constant, but the company's S3 storage costs are increasing each month.\nHow should a solutions architect reduce costs in this situation?"},{"id":288,"options":[{"letter":"A","text":"Scale out the nodes by tracking the memory usage."},{"letter":"B","text":"Use the Kubernetes Cluster Autoscaler to manage the number of nodes in the cluster."},{"letter":"C","text":"Use an Amazon EC2 Auto Scaling group to distribute the workload."},{"letter":"D","text":"Use an AWS Lambda function to resize the EKS cluster automatically."}],"answer":["B"],"question":"A company runs container applications by using Amazon Elastic Kubernetes Service (Amazon EKS) and the Kubernetes Horizontal Pod Autoscaler. The workload is not consistent throughout the day. A solutions architect notices that the number of nodes does not automatically scale out when the existing nodes have reached maximum capacity in the cluster, which causes performance issues.\nWhich solution will resolve this issue with the LEAST administrative overhead?"},{"id":289,"options":[{"letter":"A","text":"Generate and provide S3 signed cookies to premium customers."},{"letter":"B","text":"Generate and provide CloudFront signed URLs to premium customers."},{"letter":"C","text":"Use origin access control (OAC) to limit the access of non-premium customers."},{"letter":"D","text":"Generate and activate field-level encryption to block non-premium customers."}],"answer":["B"],"question":"A media company uses an Amazon CloudFront distribution to deliver content over the internet. The company wants only premium customers to have access to the media streams and file content. The company stores all content in an Amazon S3 bucket. The company also delivers content on demand to customers for a specific purpose, such as movie rentals or music downloads.\nWhich solution will meet these requirements?"},{"id":290,"options":[{"letter":"A","text":"Create a transit gateway, and associate the Direct Connect connection with a new transit VIF. Turn on the transit gateway's route propagation feature."},{"letter":"B","text":"Create a Direct Connect gateway. Recreate the private VIFs to use the new gateway. Associate each VPC by creating new virtual private gateways."},{"letter":"C","text":"Create a transit VPConnect the Direct Connect connection to the transit VPCreate a peering connection between all other VPCs in the Region. Update the route tables."},{"letter":"D","text":"Create AWS Site-to-Site VPN connections from on premises to each VPC. Ensure that both VPN tunnels are UP for each connection. Turn on the route propagation feature."}],"answer":["A"],"question":"A company has an AWS Direct Connect connection from its on-premises location to an AWS account. The AWS account has 30 different VPCs in the same AWS Region. The VPCs use private virtual interfaces (VIFs). Each VPC has a CIDR block that does not overlap with other networks under the company's control.\nThe company wants to centrally manage the networking architecture while still allowing each VPC to communicate with all other VPCs and on-premises networks.\nWhich solution will meet these requirements with the LEAST amount of operational overhead?"},{"id":291,"options":[{"letter":"A","text":"Use an AWS Lambda function that runs custom developed code."},{"letter":"B","text":"Use Amazon Elastic Kubernetes Service (Amazon EKS). Launch Auto Scaling groups of self-managed EC2 instances."},{"letter":"C","text":"Use a Spot Fleet with auto scaling of EC2 instances that run the most recent Amazon Linux operating system."},{"letter":"D","text":"Use an AWS Elastic Beanstalk web server environment that has high availability configured."}],"answer":["A"],"question":"A company wants to rearchitect a large-scale web application to a serverless microservices architecture. The application uses Amazon EC2 instances and is written in Python.\nThe company selected one component of the web application to test as a microservice. The component supports hundreds of requests each second. The company wants to create and test the microservice on an AWS solution that supports Python. The solution must also scale automatically and require minimal infrastructure and minimal operational support.\nWhich solution will meet these requirements?"},{"id":292,"options":[{"letter":"A","text":"Run the application on AWS Elastic Beanstalk as a single application environment with an all-at-once deployment strategy."},{"letter":"B","text":"Run the application on Amazon Elastic Container Service (Amazon ECS) as microservices with service auto scaling."},{"letter":"C","text":"Run the application on Amazon EC2 Spot Instances as microservices with a Spot Fleet default allocation strategy."},{"letter":"D","text":"Run the application on AWS Lambda as a single function with maximum provisioned concurrency."}],"answer":["B"],"question":"A manufacturing company runs its report generation application on AWS. The application generates each report in about 20 minutes. The application is built as a monolith that runs on a single Amazon EC2 instance. The application requires frequent updates to its tightly coupled modules. The application becomes complex to maintain as the company adds new features.\nEach time the company patches a software module, the application experiences downtime. Report generation must restart from the beginning after any interruptions. The company wants to redesign the application so that the application can be flexible, scalable, and gradually improved. The company wants to minimize application downtime.\nWhich solution will meet these requirements?"},{"id":293,"options":[{"letter":"A","text":"Create an Amazon Elastic File System (Amazon EFS) volume that uses EFS Intelligent-Tiering. Use AWS DataSync to migrate the data to the EFS volume."},{"letter":"B","text":"Create an Amazon FSx for ONTAP instance. Create an FSx for ONTAP file system with a root volume that uses the auto tiering policy. Migrate the data to the FSx for ONTAP volume."},{"letter":"C","text":"Create an Amazon S3 bucket that uses S3 Intelligent-Tiering. Migrate the data to the S3 bucket by using an AWS Storage Gateway Amazon S3 File Gateway."},{"letter":"D","text":"Create an Amazon FSx for OpenZFS file system. Migrate the data to the new volume."}],"answer":["B"],"question":"A company is migrating a large amount of data from on-premises storage to AWS. Windows, Mac, and Linux based Amazon EC2 instances in the same AWS Region will access the data by using SMB and NFS storage protocols. The company will access a portion of the data routinely. The company will access the remaining data infrequently.\nThe company needs to design a solution to host the data.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":294,"options":[{"letter":"A","text":"Use an AWS Snowball device to migrate the data to an Amazon S3 bucket. Create an Amazon EMR cluster to process the data."},{"letter":"B","text":"Use AWS Site-to-Site VPN to access the on-premises Hadoop Distributed File System (HDFS) data and application. Use an Amazon EMR cluster to process the data."},{"letter":"C","text":"Use AWS DataSync to connect to the on-premises Hadoop Distributed File System (HDFS) cluster. Create an Amazon EMR cluster to process the data."},{"letter":"D","text":"Migrate the Apache Hadoop application and the Apache Spark application to Amazon EMR clusters on AWS Outposts. Use the EMR clusters to process the data."}],"answer":["D"],"question":"A company’s applications use Apache Hadoop and Apache Spark to process data on premises. The existing infrastructure is not scalable and is complex to manage.\nA solutions architect must design a scalable solution that reduces operational complexity. The solution must keep the data processing on premises.\nWhich solution will meet these requirements?"},{"id":295,"options":[{"letter":"A","text":"Deploy a Network Load Balancer (NLB) that uses private subnets. Configure an NLB listener for HTTPS communication over the internet."},{"letter":"B","text":"Configure public subnets in the existing VPC. Deploy an MSK cluster in the public subnets. Update the MSK cluster security settings to enable mutual TLS authentication."},{"letter":"C","text":"Deploy an Application Load Balancer (ALB) that uses private subnets. Configure an ALB security group inbound rule to allow inbound traffic from the VPC CIDR block for HTTPS protocol."},{"letter":"D","text":"Create a new VPC that has public subnets. Deploy an MSK cluster in the public subnets. Update the MSK cluster security settings to enable mutual TLS authentication."}],"answer":["B"],"question":"A company runs a real-time data ingestion solution on AWS. The solution consists of the most recent version of Amazon Managed Streaming for Apache Kafka (Amazon MSK). The solution is deployed in a VPC in private subnets across three Availability Zones.\nA solutions architect needs to redesign the data ingestion solution to be publicly available over the internet. The data in transit must also be encrypted.\nWhich solution will meet these requirements with the MOST operational efficiency?"},{"id":296,"options":[{"letter":"A","text":"Create a Savings Plans alert subscription. Enable all notification options. Enter an email address to receive notifications."},{"letter":"B","text":"Create an AWS Budgets report for the Savings Plans budget. Set the frequency to daily."},{"letter":"C","text":"Create a Lambda function that runs a coverage report against the Savings Plans. Use Amazon Simple Email Service (Amazon SES) to email the report to the appropriate email message recipients."},{"letter":"D","text":"Create a daily budget for the Savings Plans by using AWS Budgets. Configure the budget with a coverage threshold to send notifications to the appropriate email message recipients."}],"answer":["D"],"question":"A company uses Amazon EC2, AWS Fargate, and AWS Lambda to run multiple workloads in the company's AWS account. The company wants to fully make use of its Compute Savings Plans. The company wants to receive notification when coverage of the Compute Savings Plans drops.\nWhich solution will meet these requirements with the MOST operational efficiency?"},{"id":297,"options":[{"letter":"A","text":"Store the photos in the Amazon S3 Intelligent-Tiering storage class. Store the photo metadata and its S3 location in DynamoDB."},{"letter":"B","text":"Store the photos in the Amazon S3 Glacier storage class. Set up an S3 Lifecycle policy to move photos older than 30 days to the S3 Glacier Deep Archive storage class. Store the photo metadata and its S3 location in Amazon OpenSearch Service."},{"letter":"C","text":"Store the photos in Amazon DynamoDB. Turn on DynamoDB Accelerator (DAX) to cache frequently viewed items."},{"letter":"D","text":"Store the photos in the Amazon S3 Standard storage class. Set up an S3 Lifecycle policy to move photos older than 30 days to the S3 Standard-Infrequent Access (S3 Standard-IA) storage class. Use the object tags to keep track of metadata."}],"answer":["A"],"question":"A company is running a photo hosting service in the us-east-1 Region. The service enables users across multiple countries to upload and view photos. Some photos are heavily viewed for months, and others are viewed for less than a week. The application allows uploads of up to 20 MB for each photo. The service uses the photo metadata to determine which photos to display to each user.\nWhich solution provides the appropriate user access MOST cost-effectively?"},{"id":298,"options":[{"letter":"A","text":"Create an Amazon ElastiCache for Redis cache. Replicate data from the Aurora cluster to Redis by using AWS Database Migration Service (AWS DMS) with a write-around approach."},{"letter":"B","text":"Add additional reader instances to the Aurora cluster. Create an Amazon RDS Proxy target group for the Aurora cluster."},{"letter":"C","text":"Modify the Aurora cluster and activate the zero-downtime restart (ZDR) feature. Use Database Activity Streams on the cluster to track the cluster status."},{"letter":"D","text":"Create an Amazon EventBridge rule that has the Aurora cluster as a source. Create an AWS Lambda function to log the state change events of the Aurora cluster. Add the Lambda function as a target for the EventBridge rule. Add additional reader nodes to fail over to."}],"answer":["B"],"question":"An ecommerce company runs its application on AWS. The application uses an Amazon Aurora PostgreSQL cluster in Multi-AZ mode for the underlying database. During a recent promotional campaign, the application experienced heavy read load and write load. Users experienced timeout issues when they attempted to access the application.\nA solutions architect needs to make the application architecture more scalable and highly available.\nWhich solution will meet these requirements with the LEAST downtime?"},{"id":299,"options":[{"letter":"A","text":"Set up S3 bucket policies to allow access from a VPC endpoint."},{"letter":"B","text":"Set up an IAM policy to grant read-write access to the S3 bucket."},{"letter":"C","text":"Set up a NAT gateway to access resources outside the private subnet."},{"letter":"D","text":"Set up an access key ID and a secret access key to access the S3 bucket."}],"answer":["A"],"question":"A company’s website hosted on Amazon EC2 instances processes classified data stored in Amazon S3. Due to security concerns, the company requires a private and secure connection between its EC2 resources and Amazon S3.\nWhich solution meets these requirements?"},{"id":300,"options":[{"letter":"A","text":"Attach the SCP to the three nonproduction Organizations member accounts."},{"letter":"B","text":"Attach the SCP to the root OU for the organization."},{"letter":"C","text":"Attach the SCP to the Organizations management account."},{"letter":"D","text":"Create an OU for the required accounts. Attach the SCP to the OU. Move the nonproduction member accounts into the new OU."},{"letter":"E","text":"Create an OU for the production account. Attach the SCP to the OU. Move the production member account into the new OU."}],"answer":["A","D"],"question":"A company has an organization in AWS Organizations. The company runs Amazon EC2 instances across four AWS accounts in the root organizational unit (OU). There are three nonproduction accounts and one production account. The company wants to prohibit users from launching EC2 instances of a certain size in the nonproduction accounts. The company has created a service control policy (SCP) to deny access to launch instances that use the prohibited types.\nWhich solutions to deploy the SCP will meet these requirements? (Choose two.)"},{"id":301,"options":[{"letter":"A","text":"Create private NAT gateways in public subnets in the same VPCs as the EC2 instances."},{"letter":"B","text":"Create public NAT gateways in public subnets in the same VPCs as the EC2 instances."},{"letter":"C","text":"Create private NAT gateways in the same private subnets as the EC2 instances."},{"letter":"D","text":"Create public NAT gateways in the same private subnets as the EC2 instances."}],"answer":["B"],"question":"A company wants to use NAT gateways in its AWS environment. The company's Amazon EC2 instances in private subnets must be able to connect to the public internet through the NAT gateways.\nWhich solution will meet these requirements?"},{"id":302,"options":[{"letter":"A","text":"Create a table in Amazon Athena for AWS CloudTrail logs. Create a query for the relevant information."},{"letter":"B","text":"Enable ALB access logging to Amazon S3. Open each file in a text editor, and search each line for the relevant information."},{"letter":"C","text":"Use Amazon EMR on a dedicated Amazon EC2 instance to directly query the ALB to acquire traffic access log information."},{"letter":"D","text":"Enable ALB access logging to Amazon S3. Create a table in Amazon Athena, and query the logs."}],"answer":["D"],"question":"A company is using an Application Load Balancer (ALB) to present its application to the internet. The company finds abnormal traffic access patterns across the application. A solutions architect needs to improve visibility into the infrastructure to help the company understand these abnormalities better.\nWhat is the MOST operationally efficient solution that meets these requirements?"},{"id":303,"options":[{"letter":"A","text":"Add functionality to the script to identify the instance that has the fewest active connections. Configure the script to read from that instance to report the total new entries."},{"letter":"B","text":"Create a read replica of the database. Configure the script to query only the read replica to report the total new entries."},{"letter":"C","text":"Use Amazon ElastiCache to cache the common queries that the script runs against the database."},{"letter":"D","text":"Instruct the development team to manually export the new entries for the day in the database at the end of each day."}],"answer":["B"],"question":"A company hosts a database that runs on an Amazon RDS instance that is deployed to multiple Availability Zones. The company periodically runs a script against the database to report new entries that are added to the database. The script that runs against the database negatively affects the performance of a critical application. The company needs to improve application performance with minimal costs.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":304,"options":[{"letter":"A","text":"Promote the Aurora PostgreSQL read replica to a standalone Aurora PostgreSQL DB cluster when the replica lag is zero."},{"letter":"B","text":"Define an AWS Database Migration Service (AWS DMS) task with change data capture (CDC) to migrate the data."},{"letter":"C","text":"Configure an Aurora MySQL read replica for the RDS for MySQL DB instance."},{"letter":"D","text":"Use AWS Database Migration Service (AWS DMS) Schema Conversion to create an Aurora PostgreSQL read replica on the RDS for MySQL DB instance."},{"letter":"E","text":"Use AWS Database Migration Service (AWS DMS) Schema Conversion to transform the database objects."}],"answer":["B","E"],"question":"A company runs a three-tier application in a VPC. The database tier uses an Amazon RDS for MySQL DB instance.\nThe company plans to migrate the RDS for MySQL DB instance to an Amazon Aurora PostgreSQL DB cluster. The company needs a solution that replicates the data changes that happen during the migration to the new database.\nWhich combination of steps will meet these requirements? (Choose two.)"},{"id":305,"options":[{"letter":"A","text":"Configure a Network Load Balancer with the required protocol and ports for the internet traffic. Specify the EC2 instances as the targets."},{"letter":"B","text":"Launch an identical set of game servers on EC2 instances in separate AWS Regions. Route internet traffic to both sets of EC2 instances."},{"letter":"C","text":"Configure an Application Load Balancer with the required protocol and ports for the internet traffic. Specify the EC2 instances as the targets."},{"letter":"D","text":"Configure a Gateway Load Balancer for the internet traffic. Specify the EC2 instances as the targets."}],"answer":["A"],"question":"An online video game company must maintain ultra-low latency for its game servers. The game servers run on Amazon EC2 instances. The company needs a solution that can handle millions of UDP internet traffic requests each second.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":306,"options":[{"letter":"A","text":"Set up an AWS Direct Connect connection between the on-premises data center and a VPC, and copy the data to Amazon S3."},{"letter":"B","text":"Set up an SFTP sync using AWS Transfer for SFTP to sync data from on premises to Amazon S3."},{"letter":"C","text":"Set up an AWS DataSync agent on the on-premises servers, and sync the data to Amazon S3."},{"letter":"D","text":"Set up AWS Glue to copy the data from the on-premises servers to Amazon S3."}],"answer":["C"],"question":"A company has NFS servers in an on-premises data center that need to periodically back up small amounts of data to Amazon S3.\nWhich solution meets these requirements and is MOST cost-effective?"},{"id":307,"options":[{"letter":"A","text":"Create an Amazon S3 bucket. Import the data into the S3 bucket. Configure an AWS Storage Gateway file gateway to use the S3 bucket. Access the file gateway from the HPC cluster instances."},{"letter":"B","text":"Create an Amazon S3 bucket and an Amazon Elastic File System (Amazon EFS) file system. Import the data into the S3 bucket. Copy the data from the S3 bucket to the EFS file system. Access the EFS file system from the HPC cluster instances."},{"letter":"C","text":"Create an Amazon FSx for Lustre file system. Import the data directly into the FSx for Lustre file system. Access the FSx for Lustre file system from the HPC cluster instances."},{"letter":"D","text":"Create an Amazon S3 bucket. Import the data into the S3 bucket. Configure an Amazon FSx for Lustre file system, and integrate it with the S3 bucket. Access the FSx for Lustre file system from the HPC cluster instances."}],"answer":["D"],"question":"A company copies 200 TB of data from a recent ocean survey onto AWS Snowball Edge Storage Optimized devices. The company has a high performance computing (HPC) cluster that is hosted on AWS to look for oil and gas deposits. A solutions architect must provide the cluster with consistent sub-millisecond latency and high-throughput access to the data on the Snowball Edge Storage Optimized devices. The company is sending the devices back to AWS.\nWhich solution will meet these requirements?"},{"id":308,"options":[{"letter":"A","text":"Create an Amazon CloudFront distribution for the application, and set the ALB as the origin. Enable an AWS WAF web ACL on the distribution, and configure rules to block traffic from unknown sources"},{"letter":"B","text":"Subscribe to AWS Shield Advanced. Engage the AWS DDoS Response Team (DRT) to integrate mitigating controls into the service."},{"letter":"C","text":"Subscribe to Amazon Inspector. Engage the AWS DDoS Response Team (DRT) to integrate mitigating controls into the service."},{"letter":"D","text":"Enable an AWS WAF web ACL on the ALB, and configure rules to block traffic from unknown sources."}],"answer":["B"],"question":"A city has deployed a web application running on Amazon EC2 instances behind an Application Load Balancer (ALB). The application's users have reported sporadic performance, which appears to be related to DDoS attacks originating from random IP addresses. The city needs a solution that requires minimal configuration changes and provides an audit trail for the DDoS sources.\nWhich solution meets these requirements?"},{"id":309,"options":[{"letter":"A","text":"Configure Amazon CloudFront to handle the traffic and route requests to the application in each Region"},{"letter":"B","text":"Configure Amazon Route 53 to use a geolocation routing policy to distribute the traffic."},{"letter":"C","text":"Create internal Network Load Balancers in front of the application in each Region."},{"letter":"D","text":"Create external Application Load Balancers in front of the application in each Region."},{"letter":"E","text":"Create an AWS Global Accelerator accelerator to route traffic to the load balancers in each Region."}],"answer":["C","E"],"question":"A gaming company wants to launch a new internet-facing application in multiple AWS Regions. The application will use the TCP and UDP protocols for communication. The company needs to provide high availability and minimum latency for global users.\nWhich combination of actions should a solutions architect take to meet these requirements? (Choose two.)"},{"id":310,"options":[{"letter":"A","text":"Use Amazon Elastic Container Service (Amazon ECS) with an Amazon EC2 launch type. Create an Amazon Elastic File System (Amazon EFS) volume. Add the EFS volume as a persistent storage volume mounted in the containers."},{"letter":"B","text":"Use Amazon Elastic Container Service (Amazon ECS) with an AWS Fargate launch type. Create an Amazon S3 bucket. Map the S3 bucket as a persistent storage volume mounted in the containers."},{"letter":"C","text":"Use Amazon Elastic Container Service (Amazon ECS) with an AWS Fargate launch type. Create an Amazon Elastic File System (Amazon EFS) volume. Add the EFS volume as a persistent storage volume mounted in the containers."},{"letter":"D","text":"Use Amazon Elastic Kubernetes Service (Amazon EKS) with self-managed nodes. Create an Amazon Elastic Block Store (Amazon EBS) volume attached to an Amazon EC2 instance. Use the EBS volume as a persistent volume mounted in the containers."}],"answer":["C"],"question":"A company has an application that uses Docker containers in its local data center. The application runs on a container host that stores persistent data in a volume on the host. The container instances use the stored persistent data.\nThe company wants to move the application to a fully managed service because the company does not want to manage any servers or storage infrastructure.\nWhich solution will meet these requirements?"},{"id":311,"options":[{"letter":"A","text":"Create an Amazon Elastic Block Store (Amazon EBS) volume. Register the volume in a StorageClass object on an EKS cluster. Use the same volume for all containers."},{"letter":"B","text":"Create an Amazon Elastic File System (Amazon EFS) file system. Register the file system in a StorageClass object on an EKS cluster. Use the same file system for all containers."},{"letter":"C","text":"Create Amazon Elastic Block Store (Amazon EBS) volumes in the same Availability Zones where EKS worker nodes are placed. Register the volumes in a StorageClass object on an EKS cluster. Use EBS Multi-Attach to share the data between containers."},{"letter":"D","text":"Create Amazon Elastic File System (Amazon EFS) file systems in the same Availability Zones where EKS worker nodes are placed. Register the file systems in a StorageClass object on an EKS cluster. Create an AWS Lambda function to synchronize the data between file systems."}],"answer":["B"],"question":"A company is deploying a new application to Amazon Elastic Kubernetes Service (Amazon EKS) with an AWS Fargate cluster. The application needs a storage solution for data persistence. The solution must be highly available and fault tolerant. The solution also must be shared between multiple application containers.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":312,"options":[{"letter":"A","text":"Attach the EC2 instance to an Auto Scaling group in a private subnet. Ensure that the DNS record for the website resolves to the Auto Scaling group identifier."},{"letter":"B","text":"Ensure that the security group that is attached to the EC2 instance allows HTTP traffic on port 80 and HTTPS traffic on port 443. Ensure that the DNS record for the website resolves to the public IP address of the EC2 instance."},{"letter":"C","text":"Provision an internet-facing Application Load Balancer (ALB) in a public subnet. Add the EC2 instance to the target group that is associated with the ALB. Ensure that the DNS record for the website resolves to the ALB."},{"letter":"D","text":"Launch a NAT gateway in a private subnet. Update the route table for the private subnets to add a default route to the NAT gateway. Attach a public Elastic IP address to the NAT gateway."}],"answer":["C"],"question":"A solutions architect creates a VPC that includes two public subnets and two private subnets. A corporate security mandate requires the solutions architect to launch all Amazon EC2 instances in a private subnet. However, when the solutions architect launches an EC2 instance that runs a web server on ports 80 and 443 in a private subnet, no external internet traffic can connect to the server.\nWhat should the solutions architect do to resolve this issue?"},{"id":313,"options":[{"letter":"A","text":"Provision an AWS Certificate Manager (ACM) certificate for each customer. Encrypt the data client-side. In the private certificate policy, deny access to the certificate for all principals except an IAM role that the customer provides."},{"letter":"B","text":"Provision a separate AWS Key Management Service (AWS KMS) key for each customer. Encrypt the data server-side. In the S3 bucket policy, deny decryption of data for all principals except an IAM role that the customer provides."},{"letter":"C","text":"Provision a separate AWS Key Management Service (AWS KMS) key for each customer. Encrypt the data server-side. In each KMS key policy, deny decryption of data for all principals except an IAM role that the customer provides."},{"letter":"D","text":"Provision an AWS Certificate Manager (ACM) certificate for each customer. Encrypt the data client-side. In the public certificate policy, deny access to the certificate for all principals except an IAM role that the customer provides."}],"answer":["C"],"question":"A company needs to provide customers with secure access to its data. The company processes customer data and stores the results in an Amazon S3 bucket.\nAll the data is subject to strong regulations and security requirements. The data must be encrypted at rest. Each customer must be able to access only their data from their AWS account. Company employees must not be able to access the data.\nWhich solution will meet these requirements?"},{"id":314,"options":[{"letter":"A","text":"Configure AWS CloudTrail to review the API calls. Build an Amazon QuickSight dashboard to observe the microservice interactions."},{"letter":"B","text":"Configure Amazon CloudWatch Container Insights to collect metrics from the EKS clusters. Configure AWS X-Ray to trace the requests between the microservices."},{"letter":"C","text":"Configure the application to use Amazon ElastiCache to reduce the number of requests that are sent to the microservices."},{"letter":"D","text":"Use AWS Trusted Advisor to understand the performance of the application."}],"answer":["B"],"question":"A company is building a microservices-based application that will be deployed on Amazon Elastic Kubernetes Service (Amazon EKS). The microservices will interact with each other. The company wants to ensure that the application is observable to identify performance issues in the future.\nWhich solution will meet these requirements?"},{"id":315,"options":[{"letter":"A","text":"Set the Auto Scaling group's minimum capacity to four. Deploy two On-Demand Instances in one Availability Zone and two Spot Instances in a second Availability Zone."},{"letter":"B","text":"Set the Auto Scaling group's minimum capacity to two. Deploy four Spot Instances in one Availability Zone."},{"letter":"C","text":"Set the Auto Scaling group's minimum capacity to four. Deploy two On-Demand Instances in one Availability Zone and two On-Demand Instances in a second Availability Zone."},{"letter":"D","text":"Set the Auto Scaling group's minimum capacity to two. Deploy one On-Demand Instance in one Availability Zone and one On-Demand Instance in a second Availability Zone."}],"answer":["C"],"question":"A company runs a stateful production application on Amazon EC2 instances. The application requires at least two EC2 instances to always be running.\nA solutions architect needs to design a highly available and fault-tolerant architecture for the application. The solutions architect creates an Auto Scaling group of EC2 instances.\nWhich set of additional steps should the solutions architect take to meet these requirements?"},{"id":316,"options":[{"letter":"A","text":"Host the application on an Amazon EC2 instance. Use an Amazon Elastic Block Store (Amazon EBS) GP3 volume to run the application."},{"letter":"B","text":"Configure an Auto Scaling group with an Amazon EC2 instance. Use an Amazon FSx for OpenZFS file system to run the application."},{"letter":"C","text":"Host the application on an Amazon EC2 instance. Use an Amazon Elastic Block Store (Amazon EBS) GP2 volume to run the application."},{"letter":"D","text":"Configure an Auto Scaling group with an Amazon EC2 instance. Use an Amazon FSx for Lustre file system to run the application."}],"answer":["A"],"question":"A company uses locally attached storage to run a latency-sensitive application on premises. The company is using a lift and shift method to move the application to the AWS Cloud. The company does not want to change the application architecture.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":317,"options":[{"letter":"A","text":"Turn off automatic backups. Create weekly manual snapshots of the database."},{"letter":"B","text":"Create a custom AWS Lambda function to start and stop the database based on minimum CPU utilization."},{"letter":"C","text":"Purchase All Upfront reserved DB instances."},{"letter":"D","text":"Use the Instance Scheduler on AWS to configure start and stop schedules."}],"answer":["D"],"question":"A company runs an application that uses Amazon RDS for PostgreSQL. The application receives traffic only on weekdays during business hours. The company wants to optimize costs and reduce operational overhead based on this usage.\nWhich solution will meet these requirements?"},{"id":318,"options":[{"letter":"A","text":"Use Amazon ElastiCache for Redis."},{"letter":"B","text":"Migrate the database to Amazon RDS."},{"letter":"C","text":"Migrate the database to Amazon Redshift."},{"letter":"D","text":"Use DynamoDB Accelerator (DAX)."}],"answer":["D"],"question":"A company deployed a serverless application that uses Amazon DynamoDB as a database layer. The application has experienced a large increase in users. The company wants to improve database response time from milliseconds to microseconds and to cache requests to the database.\nWhich solutio AWS Region. The application needs to store data in a PostgreSQL database engine. The company wants the data in the database to be highly available. The company also needs increased capacity for read workloads.\nWhich solution will meet these requirements with the MOST operational efficiency?"},{"id":322,"options":[{"letter":"A","text":"Migrate the existing RDS for MySQL database to an Amazon Elastic Container Service (Amazon ECS) cluster that uses MySQL container images to run tasks."},{"letter":"B","text":"Migrate the existing RDS for MySQL database to an Amazon EC2 instance that runs MySQL. Purchase an instance reservation for the EC2 instance."},{"letter":"C","text":"Migrate the existing RDS for MySQL database to an Aurora MySQL database cluster."},{"letter":"D","text":"Migrate the existing RDS for MySQL database to an Aurora Serverless v2 MySQL database cluster."}],"answer":["D"],"question":"A financial services company launched a new application that uses an Amazon RDS for MySQL database. The company uses the application to track stock market trends. The company needs to operate the application for only 2 hours at the end of each week. The company needs to optimize the cost of running the database.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":323,"options":[{"letter":"A","text":"Increase the timeout of the Lambda functions."},{"letter":"B","text":"Increase the memory of the Lambda functions."},{"letter":"C","text":"Configure Lambda provisioned concurrency."},{"letter":"D","text":"Configure Lambda SnapStart."}],"answer":["D"],"question":"A company wants to use an event-driven programming model with AWS Lambda. The company wants to reduce startup latency for Lambda functions that run on Java 11. The company does not have strict latency requirements for the applications. The company wants to reduce cold starts and outlier latencies when a function scales up.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id": ner Service (Amazon ECS) cluster with an Amazon EC2 launch type and an Auto Scaling group with at least one EC2 instance. Create an Amazon EventBridge scheduled event that launches an ECS task on the cluster to run the job."},{"letter":"D","text":"Create an AWS Lambda function that has an Amazon EventBridge notification. Schedule the EventBridge event to run once a day."}],"answer":["A"],"question":"An ecommerce company needs to run a scheduled daily job to aggregate and filter sales records for analytics. The company stores the sales records in an Amazon S3 bucket. Each object can be up to 10 GB in size. Based on the number of sales events, the job can take up to an hour to complete. The CPU and memory usage of the job are constant and are known in advance.\nA solutions architect needs to minimize the amount of operational effort that is needed for the job to run.\nWhich solution meets these requirements?"},{"id":327,"options":[{"letter":"A","text":"Replace the ALB with a Network Load Balancer. Migrate the embedded NoSQL database to Amazon DynamoDB by using AWS Database Migration Service (AWS DMS)."},{"letter":"B","text":"Modify the Auto Scaling group to use EC2 instances across three Availability Zones. Migrate the embedded NoSQL database to Amazon DynamoDB by using AWS Database Migration Service (AWS DMS)."},{"letter":"C","text":"Replace the ALB with a Network Load Balancer. Maintain the embedded NoSQL database with its replication service on the EC2 instances."},{"letter":"D","text":"Modify the Auto Scaling group to use EC2 instances across three Availability Zones. Maintain the embedded NoSQL database with its replication service on the EC2 instances."}],"answer":["B"],"question":"A company has a web application that includes an embedded NoSQL database. The application runs on Amazon EC2 instances behind an Application Load Balancer (ALB). The instances run in an Amazon EC2 Auto Scaling group in a single Availability Zone.\nA recent increase in traffic requires the application to be highly available and for the database to be eventually consistent.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":328,"options":[{"letter":"A","text":"Create a CNAME record with a failover policy."},{"letter":"B","text":"Create an A record with a geolocation policy."},{"letter":"C","text":"Create a CNAME record with a geoproximity policy."},{"letter":"D","text":"Create an A record with a latency policy."}],"answer":["D"],"question":"A company is deploying an application in three AWS Regions using an Application Load Balancer. Amazon Route 53 will be used to distribute traffic between these Regions.\nWhich Route 53 configuration should a solutions architect use to provide the MOST high-performing experience?"},{"id":329,"options":[{"letter":"A","text":"Create a shared Amazon Elastic Block Store (Amazon EBS) volume. Mount the EBS volume on the individual EC2 instances."},{"letter":"B","text":"Create an Amazon S3 bucket to store the web content. Set the metadata for the Cache-Control header to no-cache. Use Amazon CloudFront to deliver the content."},{"letter":"C","text":"Use AWS Storage Gateway Volume Gateway Internet Small Computer Systems Interface (iSCSI) block storage that is mounted to the individual EC2 instances."},{"letter":"D","text":"Create an Amazon Elastic File System (Amazon EFS) file system. Mount the EFS file system on the individual EC2 instances."},{"letter":"E","text":"Use AWS DataSync to perform continuous synchronization of data between EC2 hosts in the Auto Scaling group."}],"answer":["B","D"],"question":"A solutions architect is designing a shared storage solution for a web application that is deployed across multiple Availability Zones. The web application runs on Amazon EC2 instances that are in an Auto Scaling group. The company plans to make frequent changes to the content. The solution must have strong consistency in returning the new content as soon as the changes occur.\nWhich solutions meet these requirements? (Choose two.)"},{"id":330,"options":[{"letter":"A","text":"Use the S3 bucket access point instead of accessing the S3 bucket directly."},{"letter":"B","text":"Upload the files into multiple S3 buckets."},{"letter":"C","text":"Use S3 multipart uploads."},{"letter":"D","text":"Fetch multiple byte-ranges of an object in parallel."},{"letter":"E","text":"Add a random prefix to each object when uploading the files."}],"answer":["C","D"],"question":"A company regularly uploads GB-sized files to Amazon S3. After the company uploads the files, the company uses a fleet of Amazon EC2 Spot Instances to transcode the file format. The company needs to scale throughput when the company uploads data from the on-premises data center to Amazon S3 and when the company downloads data from Amazon S3 to the EC2 instances.\nWhich solutions will meet these requirements? (Choose two.)"},{"id":331,"options":[{"letter":"A","text":"Write API calls to describe the EBS volumes and to confirm the EBS volumes are encrypted. Use Amazon EventBridge to schedule an AWS Lambda function to run the API calls."},{"letter":"B","text":"Create an AWS Identity and Access Management (IAM) policy that requires the use of tags on EBS volumes. Use AWS Cost Explorer to display resources that are not properly tagged. Encrypt the untagged resources manually."},{"letter":"C","text":"Create an AWS Config rule for Amazon EBS to evaluate if a volume is encrypted and to flag the volume if it is not encrypted."},{"letter":"D","text":"Write API calls to describe the EBS volumes and to confirm the EBS volumes are encrypted. Run the API calls on an AWS Fargate task."}],"answer":["C"],"question":"A company wants to standardize its Amazon Elastic Block Store (Amazon EBS) volume encryption strategy. The company also wants to minimize the cost and configuration effort required to operate the volume encryption check.\nWhich solution will meet these requirements?"},{"id":332,"options":[{"letter":"A","text":"Create individual users in IAM Identity Center. Create new developer and administrator groups in IAM Identity Center. Create new permission sets that include the appropriate IAM policies for each group. Assign the new groups to the appropriate accounts. Assign the new permission sets to the new groups. When new users are hired, add them to the appropriate group."},{"letter":"B","text":"Create individual users in IAM Identity Center. Create new permission sets that include the appropriate IAM policies for each user. Assign the users to the appropriate accounts. Grant additional IAM permissions to the users from within specific accounts. When new users are hired, add them to IAM Identity Center and assign them to the accounts."},{"letter":"C","text":"Create individual users in IAM Identity Center for each account. Create separate developer and administrator groups in IAM Identity Center. Assign the users to the appropriate groups. Attach AWS managed IAM policies to each user as needed for fine-grained permissions."},{"letter":"D","text":"Create individual users in IAM Identity Center for each account. Create separate developer and administrator groups in IAM Identity Center. Assign the users to the appropriate groups. Create a custom IAM policy for each group to set fine-grained permissions."}],"answer":["A"],"question":"A company manages AWS accounts in AWS Organizations. AWS IAM Identity Center (AWS Single Sign-On) and AWS Control Tower are configured for the accounts. The company wants to manage multiple user permissions across all the accounts.\nThe permissions will be used by multiple users and must be split between the developer and administrator teams. Each team requires different permissions. The company wants a solution that includes new users that are hired on both teams.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":333,"options":[{"letter":"A","text":"Set up an IPsec VPN from the on-premises location to AWS. Use the s3 cp command in the AWS CLI to move the data directly to an S3 bucket"},{"letter":"B","text":"Use AWS DataSync to migrate the data from the on-premises location to an S3 bucket"},{"letter":"C","text":"Use the s3 sync command in the AWS CLI to move the data directly to an S3 bucket"},{"letter":"D","text":"Use AWS Snowball to move the data to an S3 bucket"}],"answer":["B"],"question":"A company wants to migrate 100 GB of historical data from an on-premises location to an Amazon S3 bucket. The company has a 100 megabits per second (Mbps) internet connection on premises. The company needs to encrypt the data in transit to the S3 bucket. The company will store new data directly in Amazon S3.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":334,"options":[{"letter":"A","text":"AWS Config"},{"letter":"B","text":"AWS CloudTrail"},{"letter":"C","text":"Amazon Inspector"},{"letter":"D","text":"Amazon GuardDuty"}],"answer":["B"],"question":"An IAM user made several configuration changes to AWS resources in their company's account during a production deployment last week. A solutions architect learned that a couple of security group rules are not configured as desired. The solutions architect wants to confirm which IAM user was responsible for making changes.\nWhich service should the solutions architect use to find the desired information?"},{"id":335,"options":[{"letter":"A","text":"Point the client driver at an RDS custom endpoint. Deploy the Lambda functions outside a VPC."},{"letter":"B","text":"Point the client driver at an RDS proxy endpoint. Deploy the Lambda functions inside a VPC."},{"letter":"C","text":"Point the client driver at an RDS proxy endpoint. Deploy the Lambda functions outside a VPC."},{"letter":"D","text":"Point the client driver at an RDS custom endpoint. Deploy the Lambda functions inside a VPC."}],"answer":["B"],"question":"A company’s ecommerce website has unpredictable traffic and uses AWS Lambda functions to directly access a private Amazon RDS for PostgreSQL DB instance. The company wants to maintain predictable database performance and ensure that the Lambda invocations do not overload the database with too many connections.\nWhat should a solutions architect do to meet these requirements?"},{"id":336,"options":[{"letter":"A","text":"Deploy the applications in AWS Wavelength Zones by extending the company’s VPC from eu-central-1 to the chosen Wavelength Zone."},{"letter":"B","text":"Deploy the applications in AWS Local Zones by extending the company's VPC from eu-central-1 to the chosen Local Zone."},{"letter":"C","text":"Deploy the applications in eu-central-1. Extend the company’s VPC from eu-central-1 to the regional edge caches in Amazon CloudFront."},{"letter":"D","text":"Deploy the applications in eu-central-1. Extend the company’s VPC from eu-central-1 to an edge location in Amazon CloudFront."}],"answer":["B"],"question":"A company wants to migrate its web applications from on premises to AWS. The company is located close to the eu-central-1 Region. Because of regulations, the company cannot launch some of its applications in eu-central-1. The company wants to achieve single-digit millisecond latency.\nWhich solution will meet these requirements?"},{"id":337,"options":[{"letter":"A","text":"Migrate the database to an Amazon DynamoDB table."},{"letter":"B","text":"Migrate the web tier to Amazon EC2 instances in an Auto Scaling group behind an Application Load Balancer."},{"letter":"C","text":"Migrate the database to Amazon EC2 instances in an Auto Scaling group behind a Network Load Balancer."},{"letter":"D","text":"Migrate the database to an Amazon RDS Multi-AZ deployment."},{"letter":"E","text":"Migrate the web tier to an AWS Lambda function."}],"answer":["B","D"],"question":"A company is migrating its multi-tier on-premises application to AWS. The application consists of a single-node MySQL database and a multi-node web tier. The company must minimize changes to the application during the migration. The company wants to improve application resiliency after the migration.\nWhich combination of steps will meet these requirements? (Choose two.)"},{"id":338,"options":[{"letter":"A","text":"Use an IAM policy that allows users to create only encrypted Amazon Elastic Block Store (Amazon EBS) volumes. Use AWS Config and AWS Systems Manager to automate the detection and remediation of unencrypted EBS volumes."},{"letter":"B","text":"Use AWS Key Management Service (AWS KMS) to manage access to encrypted Amazon Elastic Block Store (Amazon EBS) volumes. Use AWS Lambda and Amazon EventBridge to automate the detection and remediation of unencrypted EBS volumes."},{"letter":"C","text":"Use Amazon Macie to detect unencrypted Amazon Elastic Block Store (Amazon EBS) volumes. Use AWS Systems Manager Automation rules to automatically encrypt existing and new EBS volumes."},{"letter":"D","text":"Use Amazon inspector to detect unencrypted Amazon Elastic Block Store (Amazon EBS) volumes. Use AWS Systems Manager Automation rules to automatically encrypt existing and new EBS volumes."}],"answer":["A"],"question":"A company needs a solution to enforce data encryption at rest on Amazon EC2 instances. The solution must automatically identify noncompliant resources and enforce compliance policies on findings.\nWhich solution will meet these requirements with the LEAST administrative overhead?"},{"id":339,"options":[{"letter":"A","text":"Use an AWS owned key to encrypt the EBS volumes."},{"letter":"B","text":"Create a customer managed key. Use the key to encrypt the EBS volumes."},{"letter":"C","text":"Use an AWS managed key to encrypt the EBS volumes. Use the key to configure automatic key rotation."},{"letter":"D","text":"Create an external KMS key with imported key material. Use the key to encrypt the EBS volumes."}],"answer":["B"],"question":"A company uses Amazon EC2 instances and stores data on Amazon Elastic Block Store (Amazon EBS) volumes. The company must ensure that all data is encrypted at rest by using AWS Key Management Service (AWS KMS). The company must be able to control rotation of the encryption keys.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":340,"options":[{"letter":"A","text":"The request to terminate the EC2 instance does not originate from the CIDR blocks 192.0.2.0/24 or 203.0.113.0/24."},{"letter":"B","text":"The \"Action\" field does not grant the actions that are required to terminate the EC2 instance."},{"letter":"C","text":"The principal has not been specified in the policy statement."},{"letter":"D","text":"The EC2 instance has a resource-based policy with a Deny statement."}],"answer":["A"],"question":"A company uses Amazon EC2 instances to host its internal systems. As part of a deployment operation, an administrator tries to use the AWS CLI to terminate an EC2 instance. However, the administrator receives a 403 (Access Denied) error message.\nThe administrator is using an IAM role that has the following IAM policy attached:\n{\n\"Version\": \"2012-10-17\",\n\"Statement\": [\n{\n\"Effect\": \"Allow\",\n\"Action\": [\"ec2:TerminateInstances\"],\n\"Resource\": [\"*\"]\n},\n{\n\"Effect\": \"Deny\",\n\"Action\": [\"ec2:TerminateInstances\"],\n\"Condition\": {\n\"NotIpAddress\": {\n\"aws:SourceIp\": [\n\"192.0.2.0/24\",\n\"203.0.113.0/24\"\n]\n}\n},\n\"Resource\": [\"*\"]\n}\n]\n}\nWhat is the cause of the unsuccessful request?"},{"id":341,"options":[{"letter":"A","text":"Create an Amazon EMR cluster with Apache Spark installed. Write a Spark application to transform the data. Use EMR File System (EMRFS) to write files to the transformed data bucket."},{"letter":"B","text":"Create an AWS Glue crawler to discover the data. Create an AWS Glue extract, transform, and load (ETL) job to transform the data. Specify the transformed data bucket in the output step."},{"letter":"C","text":"Use AWS Batch to create a job definition with Bash syntax to transform the data and output the data to the transformed data bucket. Use the job definition to submit a job. Specify an array job as the job type."},{"letter":"D","text":"Create an AWS Lambda function to transform the data and output the data to the transformed data bucket. Configure an event notification for the S3 bucket. Specify the Lambda function as the destination for the event notification."}],"answer":["B"],"question":"A company's reporting system delivers hundreds of .csv files to an Amazon S3 bucket each day. The company must convert these files to Apache Parquet format and must store the files in a transformed data bucket.\nWhich solution will meet these requirements with the LEAST development effort?"},{"id":342,"options":[{"letter":"A","text":"Add an Amazon ElastiCache for Redis cache to the application stack. Update the application to point to the Redis cache endpoint instead of DynamoDB."},{"letter":"B","text":"Add DynamoDB read replicas to handle the increased read load. Update the application to point to the read endpoint for the read replicas."},{"letter":"C","text":"Configure Amazon DynamoDB Accelerator (DAX) for the new messages table. Update the code to use the DAX endpoint."},{"letter":"D","text":"Double the number of read capacity units for the new messages table in DynamoDB. Continue to use the existing DynamoDB endpoint."}],"answer":["C"],"question":"A company has a mobile chat application with a data store based in Amazon DynamoDB. Users would like new messages to be read with as little latency as possible. A solutions architect needs to design an optimal solution that requires minimal application changes.\nWhich method should the solutions architect select?"},{"id":343,"options":[{"letter":"A","text":"Ensure that the customers create an IAM role in their account with read-only EC2 and CloudWatch permissions and a trust policy to the company's account."},{"letter":"B","text":"Create a serverless API that implements a token vending machine to provide temporary AWS credentials for a role with read-only EC2 and CloudWatch permissions."},{"letter":"C","text":"Ensure that the customers create an IAM user in their account with read-only EC2 and CloudWatch permissions. Encrypt and store customer access and secret keys in a secrets management system."},{"letter":"D","text":"Ensure that the customers create an Amazon Cognito user in their account to use an IAM role with read-only EC2 and CloudWatch permissions. Encrypt and store the Amazon Cognito user and password in a secrets management system."}],"answer":["A"],"question":"A company runs an infrastructure monitoring service. The company is building a new feature that will enable the service to monitor data in customer AWS accounts. The new feature will call AWS APIs in customer accounts to describe Amazon EC2 instances and read Amazon CloudWatch metrics.\nWhat should the company do to obtain access to customer accounts in the MOST secure way?"},{"id":344,"options":[{"letter":"A","text":"Create a trail in AWS CloudTrail. Configure VPC Flow Logs to send the log data to the trail. Use Amazon Kinesis Data Streams to stream the logs from the trail to OpenSearch Service."},{"letter":"B","text":"Create a log group in Amazon CloudWatch Logs. Configure VPC Flow Logs to send the log data to the log group. Use Amazon Kinesis Data Firehose to stream the logs from the log group to OpenSearch Service."},{"letter":"C","text":"Create a log group in Amazon CloudWatch Logs. Configure VPC Flow Logs to send the log data to the log group. Use Amazon Kinesis Data Streams to stream the logs from the log group to OpenSearch Service."},{"letter":"D","text":"Create a trail in AWS CloudTrail. Configure VPC Flow Logs to send the log data to the trail. Use Amazon Kinesis Data Firehose to stream the logs from the trail to OpenSearch Service."}],"answer":["B"],"question":"A company's application uses Network Load Balancers, Auto Scaling groups, Amazon EC2 instances, and databases that are deployed in an Amazon VPC. The company wants to capture information about traffic to and from the network interfaces in near real time in its Amazon VPC. The company wants to send the information to Amazon OpenSearch Service for analysis.\nWhich solution will meet these requirements?"},{"id":345,"options":[{"letter":"A","text":"Create an IAM role that has permission to delete snapshots. Attach the role to a new EC2 instance. Use the AWS CLI from the new EC2 instance to delete snapshots."},{"letter":"B","text":"Lock the EBS snapshots to prevent deletion."},{"letter":"C","text":"Create an IAM policy that denies snapshot deletion. Attach the policy to the storage administrator user."},{"letter":"D","text":"Add tags to the snapshots. Create retention rules in Recycle Bin for EBS snapshots that have the tags."}],"answer":["B"],"question":"A company uses Amazon EC2 instances and Amazon Elastic Block Store (Amazon EBS) volumes to run an application. The company creates one snapshot of each EBS volume every day to meet compliance requirements. The company wants to implement an architecture that prevents the accidental deletion of EBS volume snapshots. The solution must not change the administrative rights of the storage administrator user.\nWhich solution will meet these requirements with the LEAST administrative effort?"},{"id":346,"options":[{"letter":"A","text":"Turn on auto scaling for the DB instance."},{"letter":"B","text":"Create a read replica for the DB instance. Configure the application to send read traffic to the read replica."},{"letter":"C","text":"Configure the Auto Scaling group subnets to ensure that the EC2 instances are provisioned in the same Availability Zone as the DB instance."},{"letter":"D","text":"Create an Amazon ElastiCache cluster. Configure the application to cache query results in the ElastiCache cluster."},{"letter":"E","text":"Convert the DB instance to a Multi-AZ DB instance deployment. Configure the application to send read traffic to the standby DB instance."}],"answer":["B","D"],"question":"A company runs a web application on Amazon EC2 instances in an Auto Scaling group. The application uses a database that runs on an Amazon RDS for PostgreSQL DB instance. The application performs slowly when traffic increases. The database experiences a heavy read load during periods of high traffic.\nWhich actions should a solutions architect take to resolve these performance issues? (Choose two.)"},{"id":347,"options":[{"letter":"A","text":"Use AWS DataSync to copy data that is older than 7 days from the SMB file server to AWS."},{"letter":"B","text":"Create an Amazon S3 File Gateway to increase the company's storage space. Create an S3 Lifecycle policy to transition the data to S3 Glacier Deep Archive after 7 days."},{"letter":"C","text":"Configure access to Amazon S3 for each user. Create an S3 Lifecycle policy to transition the data to S3 Glacier Flexible Retrieval after 7 days."},{"letter":"D","text":"Create an Amazon FSx File Gateway to increase the company's storage space. Create an Amazon S3 Lifecycle policy to transition the data after 7 days."}],"answer":["B"],"question":"A company runs an SMB file server in its data center. The file server stores large files that the company frequently accesses for up to 7 days after the file creation date. After 7 days, the company needs to be able to access the files with a maximum retrieval time of 24 hours.\nWhich solution will meet these requirements?"},{"id":348,"options":[{"letter":"A","text":"Create external tables in a Hive metastore. Configure Spark jobs in Amazon EMR to query the data."},{"letter":"B","text":"Create external tables in a Spark catalog. Configure jobs in AWS Glue to query the data."},{"letter":"C","text":"Configure an AWS Glue crawler to crawl the data. Configure Amazon Managed Service for Apache Flink to use SQL to query the data."},{"letter":"D","text":"Configure an AWS Glue crawler to crawl the data. Configure Amazon Athena to query the data."}],"answer":["D"],"question":"A marketing company receives a large amount of new clickstream data in Amazon S3 from a marketing campaign. The company needs to analyze the clickstream data in Amazon S3 quickly. Then the company needs to determine whether to process the data further in the data pipeline.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":349,"options":[{"letter":"A","text":"Use an AWS Budgets template to create a zero spend budget."},{"letter":"B","text":"Create an AWS Cost Anomaly Detection monitor in the AWS Billing and Cost Management console."},{"letter":"C","text":"Use Amazon CloudWatch to monitor costs and to identify unusual spending."},{"letter":"D","text":"Create AWS Pricing Calculator estimates for the current running workload pricing details."}],"answer":["B"],"question":"A company runs its applications on Amazon EC2 instances. The company performs periodic financial assessments of its AWS costs. The company recently identified unusual spending.\nThe company needs a solution to prevent unusual spending. The solution must monitor costs and notify responsible stakeholders in the event of unusual spending.\nWhich solution will meet these requirements?"},{"id":350,"options":[{"letter":"A","text":"Use AWS Service Catalog to create accounts in Organizations. Use an AWS CloudTrail organization trail to identify the changes to the OU hierarchy."},{"letter":"B","text":"Provision the AWS accounts by using AWS Control Tower. Use AWS Config aggregated rules to identify the changes to the OU hierarchy."},{"letter":"C","text":"Use AWS CloudFormation templates to create accounts in Organizations. Use the drift detection operation on a stack to identify the changes to the OU hierarchy."},{"letter":"D","text":"Provision the AWS accounts by using AWS Control Tower. Use account drift notifications to identify the changes to the OU hierarchy."}],"answer":["D"],"question":"A company's solutions architect is designing an AWS multi-account solution that uses AWS Organizations. The solutions architect has organized the company's accounts into organizational units (OUs).\nThe solutions architect needs a solution that will identify any changes to the OU hierarchy. The solution also needs to notify the company's operations team of any changes.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":351,"options":[{"letter":"A","text":"Integrate AWS Systems Manager Parameter Store with Amazon RDS for PostgreSQL to automate password rotation."},{"letter":"B","text":"Use Amazon EventBridge to schedule a custom AWS Lambda function to rotate the password every 30 days."},{"letter":"C","text":"Integrate AWS Secrets Manager with Amazon RDS for PostgreSQL to automate password rotation."},{"letter":"D","text":"Use the modify-db-instance command in the AWS CLI to change the password."}],"answer":["C"],"question":"A company runs its databases on Amazon RDS for PostgreSQL. The company wants a secure solution to manage the master user password by rotating the password every 30 days.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":352,"options":[{"letter":"A","text":"Set up a VPC peering connection between the VPCs. Update the route tables of each VPC to use the VPC peering connection for inter-VPC communication."},{"letter":"B","text":"Implement AWS Transit Gateway to connect the VPCs. Update the route tables of each VPC to use the transit gateway for inter-VPC communication."},{"letter":"C","text":"Implement an AWS Site-to-Site VPN tunnel between the VPCs. Update the route tables of each VPC to use the VPN tunnel for inter-VPC communication."},{"letter":"D","text":"Set up a 1 GB AWS Direct Connect connection between the VPCs. Update the route tables of each VPC to use the Direct Connect connection for inter-VPC communication."}],"answer":["A"],"question":"A company has two VPCs that are located in the us-west-2 Region within the same AWS account. The company needs to allow network traffic between these VPCs. Approximately 500 GB of data transfer will occur between the VPCs each month.\nWhat is the MOST cost-effective solution to connect these VPCs?"},{"id":353,"options":[{"letter":"A","text":"Use an AWS Key Management Service (AWS KMS) key to access the data securely from the Region and the on-premises location."},{"letter":"B","text":"Create a gateway in AWS Transit Gateway to access Amazon S3 securely from the Region and the on-premises location."},{"letter":"C","text":"Create gateway endpoints for Amazon S3. Use the gateway endpoints to securely access the data from the Region and the on-premises location."},{"letter":"D","text":"Create interface endpoints for Amazon S3. Use the interface endpoints to securely access the data from the Region and the on-premises location."}],"answer":["D"],"question":"A company is moving its data and applications to AWS during a multiyear migration project. The company wants to securely access data on Amazon S3 from the company's AWS Region and from the company's on-premises location. The data must not traverse the internet. The company has established an AWS Direct Connect connection between its Region and its on-premises location.\nWhich solution will meet these requirements?"},{"id":354,"options":[{"letter":"A","text":"Migrate the database to Amazon DynamoDB, and enable DynamoDB auto scaling."},{"letter":"B","text":"Migrate the database to an Amazon RDS for MySQL Multi-AZ DB instance."},{"letter":"C","text":"Use AWS DataSync to synchronize the database data across multiple EC2 instances."},{"letter":"D","text":"Provision an internet gateway in each Availability Zone in use."},{"letter":"E","text":"Create an Application Load Balancer to distribute traffic to an Auto Scaling group of EC2 instances that are distributed across two Availability Zones."}],"answer":["B","E"],"question":"A startup company is hosting a website for its customers on an Amazon EC2 instance. The website consists of a stateless Python application and a MySQL database. The website serves only a small amount of traffic. The company is concerned about the reliability of the instance and needs to migrate to a highly available architecture. The company cannot modify the application code.\nWhich combination of actions should a solutions architect take to achieve high availability for the website? (Choose two.)"},{"id":355,"options":[{"letter":"A","text":"Use AWS CloudFormation to set up the infrastructure. Use AWS Service Catalog to track changes."},{"letter":"B","text":"Use AWS Organizations to set up the infrastructure. Use AWS Service Catalog to track changes."},{"letter":"C","text":"Use AWS CloudFormation to set up the infrastructure. Use AWS Config to track changes."},{"letter":"D","text":"Use AWS Organizations to set up the infrastructure. Use AWS Config to track changes."}],"answer":["C"],"question":"A company has customers located across the world. The company wants to use automation to secure its systems and network infrastructure. The company's security team must be able to track and audit all incremental changes to the infrastructure.\nWhich solution will meet these requirements?"},{"id":356,"options":[{"letter":"A","text":"Use AWS Systems Manager templates to control which AWS services each department can use."},{"letter":"B","text":"Create organization units (OUs) for each department in AWS Organizations. Attach service control policies (SCPs) to the OUs."},{"letter":"C","text":"Use AWS CloudFormation to automatically provision only the AWS services that each department can use."},{"letter":"D","text":"Set up a list of products in AWS Service Catalog in the AWS accounts to manage and control the usage of specific AWS services."}],"answer":["B"],"question":"A company has separate AWS accounts for its finance, data analytics, and development departments. Because of costs and security concerns, the company wants to control which services each AWS account can use.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":357,"options":[{"letter":"A","text":"Implement an interface VPC endpoint for Amazon SQS. Configure the endpoint to use the public subnets. Attach to the interface endpoint a VPC endpoint policy that allows access from the EC2 instances that are in the private subnets."},{"letter":"B","text":"Implement an interface VPC endpoint for Amazon SQS. Configure the endpoint to use the private subnets. Add to the endpoint a security group that has an inbound access rule that allows traffic from the EC2 instances that are in the private subnets."},{"letter":"C","text":"Implement a gateway endpoint for Amazon SQS. Add a NAT gateway to the private subnets. Attach an IAM role to the EC2 instances that allows access to the SQS queue."},{"letter":"D","text":"Implement an interface VPC endpoint for Amazon SQS. Configure the endpoint to use the public subnets. Attach an Amazon SQS access policy to the interface VPC endpoint that allows requests from only a specified VPC endpoint."}],"answer":["B"],"question":"A company runs an application in a VPC with public and private subnets. The VPC extends across multiple Availability Zones. The application runs on Amazon EC2 instances in private subnets. The application uses an Amazon Simple Queue Service (Amazon SQS) queue.\nA solutions architect needs to design a secure solution to establish a connection between the EC2 instances and the SQS queue.\nWhich solution will meet these requirements?"},{"id":358,"options":[{"letter":"A","text":"Upload files from the user's browser to the application servers. Transfer the files to an Amazon S3 bucket."},{"letter":"B","text":"Provision an Amazon Elastic File System (Amazon EFS) file system. Upload files directly from the user's browser to the file system."},{"letter":"C","text":"Generate Amazon S3 presigned URLs in the application. Upload files directly from the user's browser into an S3 bucket."},{"letter":"D","text":"Provision an AWS Storage Gateway file gateway. Upload files directly from the user's browser to the file gateway."}],"answer":["C"],"question":"A social media company is building a feature for its website. The feature will give users the ability to upload photos. The company expects significant increases in demand during large events and must ensure that the website can handle the upload traffic from users.\nWhich solution meets these requirements with the MOST scalability?"},{"id":359,"options":[{"letter":"A","text":"Back up the RDS database, increase the storage capacity, restore the database, and stop the previous instance"},{"letter":"B","text":"Increase the RDS database instance size"},{"letter":"C","text":"Enable storage autoscaling in RDS"},{"letter":"D","text":"Change the RDS database instance storage type to Provisioned IOPS"}],"answer":["C"],"question":"An application uses an Amazon RDS MySQL DB instance. The RDS database is becoming low on disk space. A solutions architect wants to increase the disk space without downtime.\nWhich solution meets these requirements with the LEAST amount of effort?"},{"id":360,"options":[{"letter":"A","text":"Configure an Application Load Balancer to distribute traffic properly to the instances."},{"letter":"B","text":"Configure a dynamic scaling policy for the Auto Scaling group to launch new instances based on memory utilization."},{"letter":"C","text":"Configure a scheduled scaling policy for the Auto Scaling group to launch new instances before peak hours."},{"letter":"D","text":"Configure a dynamic scaling policy for the Auto Scaling group to launch new instances based on CPU utilization."}],"answer":["C"],"question":"A company hosts an application on Amazon EC2 On-Demand Instances in an Auto Scaling group. Application peak hours occur at the same time each day. Application users report slow application performance at the start of peak hours. The application performs normally 2-3 hours after peak hours begin. The company wants to ensure that the application works properly at the start of peak hours.\nWhich solution will meet these requirements?"},{"id":361,"options":[{"letter":"A","text":"AWS Snowball Edge Storage Optimized"},{"letter":"B","text":"AWS Direct Connect"},{"letter":"C","text":"AWS Storage Gateway"},{"letter":"D","text":"AWS DataSync with a VPC endpoint"}],"answer":["A"],"question":"A company is relocating its data center and wants to securely transfer 50 TB of data to AWS within 2 weeks. The existing data center has a Site-to-Site VPN connection to AWS that is 90% utilized.\nWhich AWS service should a solutions architect use to meet these requirements?"},{"id":362,"options":[{"letter":"A","text":"Attach the EC2 instances to an Amazon FSx for NetApp ONTAP file system."},{"letter":"B","text":"Attach the EC2 instances to an Amazon FSx for Lustre file system."},{"letter":"C","text":"Deploy compute optimized EC2 instances into a partition placement group."},{"letter":"D","text":"Deploy compute optimized EC2 instances into a cluster placement group."},{"letter":"E","text":"Attach the EC2 instances to an Amazon FSx for OpenZFS file system."}],"answer":["A","D"],"question":"A company uses an on-premises network-attached storage (NAS) system to provide file shares to its high performance computing (HPC) workloads. The company wants to migrate its latency-sensitive HPC workloads and its storage to the AWS Cloud. The company must be able to provide NFS and SMB multi-protocol access from the file system.\nWhich solution will meet these requirements with the LEAST latency? (Choose two.)"},{"id":363,"options":[{"letter":"A","text":"Set up a secondary Aurora PostgreSQL cluster in the same AWS Region. During failover, update the application to use the secondary cluster's writer endpoint."},{"letter":"B","text":"Create an Amazon ElastiCache for Memcached cluster to handle the load during failover."},{"letter":"C","text":"Set up an Amazon RDS proxy for the database. Update the application to use the proxy endpoint."},{"letter":"D","text":"Create more Aurora PostgreSQL read replicas in the cluster to handle the load during failover."}],"answer":["C"],"question":"A solutions architect is reviewing the resilience of an application. The solutions architect notices that a database administrator recently failed over the application's Amazon Aurora PostgreSQL database writer instance as part of a scaling exercise. The failover resulted in 3 minutes of downtime for the application.\nWhich solution will reduce the downtime for scaling exercises with the LEAST operational overhead?"},{"id":364,"options":[{"letter":"A","text":"Store images in Amazon Elastic Block Store (Amazon EBS). Use a web server that runs on Amazon EC2."},{"letter":"B","text":"Store images in Amazon S3 Standard-Infrequent Access (S3 Standard-IA). Use S3 Standard-IA to directly deliver images by using a static website."},{"letter":"C","text":"Store images in Amazon Elastic File System (Amazon EFS). Use a web server that runs on Amazon EC2."},{"letter":"D","text":"Store images in Amazon S3 Standard. Use S3 Standard to directly deliver images by using a static website."}],"answer":["B"],"question":"A company runs a website that stores images of historical events. Website users need the ability to search and view images based on the year that the event in the image occurred. On average, users request each image only once or twice a year. The company wants a highly available solution to store and deliver the images to users.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":365,"options":[{"letter":"A","text":"Create a web ACL in AWS WAF. Associate the web ACL with the endpoint"},{"letter":"B","text":"Create a second target group. Add Elastic IP addresses to the EC2 instances."},{"letter":"C","text":"Create a public Network Load Balancer. Specify the application target group."},{"letter":"D","text":"Create a Gateway Load Balancer. Specify the application target group."},{"letter":"E","text":"Create a public Application Load Balancer. Specify the application target group."}],"answer":["A","E"],"question":"A company runs a web application on Amazon EC2 instances in an Auto Scaling group that has a target group. The company designed the application to work with session affinity (sticky sessions) for a better user experience.\nThe application must be available publicly over the internet as an endpoint. A WAF must be applied to the endpoint for additional security. Session affinity (sticky sessions) must be configured on the endpoint.\nWhich combination of steps will meet these requirements? (Choose two.)"},{"id":366,"options":[{"letter":"A","text":"Keep the backend code on the EC2 instance. Create an Amazon ElastiCache for Redis cluster that has Multi-AZ enabled. Configure the ElastiCache for Redis cluster in cluster mode. Copy the frontend resources to Amazon S3. Configure the backend code to reference the EC2 instance."},{"letter":"B","text":"Use AWS Lambda to host the static content and the PHP application. Use an Amazon API Gateway REST API to proxy requests to the Lambda function. Set the API Gateway CORS configuration to respond to the domain name. Configure Amazon ElastiCache for Redis to handle session information."},{"letter":"C","text":"Configure an Amazon CloudFront distribution with an Amazon S3 endpoint to an S3 bucket that is configured to host the static content. Configure an Application Load Balancer that targets an Amazon Elastic Container Service (Amazon ECS) service that runs AWS Fargate tasks for the PHP application. Configure the PHP application to use an Amazon ElastiCache for Redis cluster that runs in multiple Availability Zones."},{"letter":"D","text":"Use AWS Elastic Beanstalk to host the static content and the PHP application. Configure Elastic Beanstalk to deploy its EC2 instance into a public subnet. Assign a public IP address."}],"an
