<header class="sticky top-0 z-10 flex items-center justify-between gap-3 flex-wrap px-6 py-3.5 border-b border-navy-500 bg-navy-800/70 backdrop-blur-md">

<div class="max-w-3xl mx-auto px-5 py-7">

      <label class="flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" id="onlyMulti" class="accent-gold w-4 h-4"> Chỉ câu nhiều đáp án</label>

    <p class="small mt-5">Mẹo: đề thi SAA-C03 thật gồm 65 câu, đạt ~72% (≈47 câu) là qua.</p>

  <!-- QUIZ -->
  <div id="quiz" class="card hidden">
    <div class="flex justify-between items-center mb-2.5 flex-wrap gap-2">

      <span class="text-slate-400 text-sm" id="scoreLbl"></span>

    <p class="text-[13px] font-semibold text-gold-soft mb-3" id="qHint"></p>
    <div id="opts"></div>
    <div class="feedback hidden" id="fb"></div>
    <div class="flex justify-between gap-2.5 mt-4">

        <button class="btn" id="checkBtn" disabled>Kiểm tra</button>
        <button class="btn hidden" id="nextBtn">Câu tiếp →</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">
    <h1 class="text-2xl font-extrabold tracking-tight mb-1.5">Kết quả</h1>

      <button class="btn" id="againBtn">Làm lượt mới</button>
      <button class="btn ghost" id="reviewToggle">Xem lại câu sai</button>

    <div class="mt-5" id="review"></div>
  </div>

</div>

 specific AWS accounts and resources."}],"answer":["D"],"question":"A company needs to give a globally distributed development team secure access to the company's AWS resources in a way that complies with security policies.\nThe company currently uses an on-premises Active Directory for internal authentication. The company uses AWS Organizations to manage multiple AWS accounts that support multiple projects.\nThe company needs a solution to integrate with the existing infrastructure to provide centralized identity management and access control.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":3,"options":[{"letter":"A","text":"Configure Amazon CloudFront with AWS WAF."},{"letter":"B","text":"Configure Application Load Balancers with AWS WAF"},{"letter":"C","text":"Configure Amazon Route 53 with a geoproximity routing policy"},{"letter":"D","text":"Configure Amazon Route 53 with a geolocation policy"}],"answer":["D"],"question":"A company is hosting a website behind multiple Application Load Balancers. The company has different distribution rights for its content around the world. A solutions architect needs to ensure that users are served the correct content without violating distribution rights.\nWhich configuration should the solutions architect choose to meet these requirements?"},{"id":4,"options":[{"letter":"A","text":"Configure an S3 gateway endpoint. Update the VPC route table to use the endpoint."},{"letter":"B","text":"Configure an S3 interface endpoint. Create a security group that allows outbound traffic to Amazon S3."},{"letter":"C","text":"Create a second NAT gateway in the same subnet where the legacy application is deployed. Update the VPC route table to use the second NAT gateway."},{"letter":"D","text":"Configure an S3 bucket policy to allow traffic from the Elastic IP address that is assigned to the NAT gateway."}],"answer":["A"],"question":"A company runs an application in a private subnet behind an Applica ompany. Attach the appropriate policies to each user."}],"answer":["A"],"question":"A company wants to provide users with access to AWS resources. The company has 1,500 users and manages their access to on-premises resources through Active Directory user groups on the corporate network. However, the company does not want users to have to maintain another identity to access the resources. A solutions architect must manage user access to the AWS resources while preserving access to the on-premises resources.\nWhat should the solutions architect do to meet these requirements?"},{"id":8,"options":[{"letter":"A","text":"Use Amazon ElastiCache for Redis in front of the DynamoDB backend tier. Use target utilization as a metric to determine when to scale."},{"letter":"B","text":"Use scheduled scaling for Amazon EC2 Auto Scaling to scale out the processing tier instances for the duration of peak usage times. Use the CPU Utilization metric to determine when to scale."},{"letter":"C","text":"Add an Amazon CloudFront distribution to cache the responses for the web tier. Use HTTP latency as a metric to determine when to scale."},{"letter":"D","text":"Use an Amazon EC2 Auto Scaling target tracking policy to scale out the processing tier instances. Use the ApproximateNumberOfMessages attribute to determine when to scale."}],"answer":["D"],"question":"A company has a three-tier web application that processes orders from customers. The web tier consists of Amazon EC2 instances behind an Application Load Balancer. The processing tier consists of EC2 instances. The company decoupled the web tier and processing tier by using Amazon Simple Queue Service (Amazon SQS). The storage layer uses Amazon DynamoDB.\nAt peak times, some users report order processing delays and halls. The company has noticed that during these delays, the EC2 instances are running at 100% CPU usage, and the SQS queue fills up. The peak times are variable and unpredictable.\nThe company needs to improve the performance of the application.\nWhich solution will meet these requirements?"},{"id":9,"options":[{"letter":"A","text":"Use the existing Amazon Cognito user pool to generate Amazon S3 access tokens for users when they successfully log in."},{"letter":"B","text":"Create a NAT gateway in the VPC where the company hosts the application. Assign a policy to the S3 bucket to deny any request that is not initiated from Amazon Cognito."},{"letter":"C","text":"Attach a policy to the S3 bucket that allows access only from the users' IP addresses."},{"letter":"D","text":"Create an Amazon Cognito identity pool to generate secure Amazon S3 access tokens for users when they successfully log in."},{"letter":"E","text":"Create an Amazon S3 VPC endpoint in the same VPC where the company hosts the application."}],"answer":["D","E"],"question":"A company hosts an application in a private subnet behind an Application Load Balancer. The company has already integrated the application with Amazon Cognito. The company uses an Amazon Cognito user pool to authenticate users.\nThe company needs to modify the application so the authenticated users can securely store their documents in an Amazon S3 bucket via the application.\nWhich combination of steps will securely integrate Amazon S3 with the application? (Choose two.)"},{"id":10,"options":[{"letter":"A","text":"Stop all operations on the VMs. Launch a cutover instance."},{"letter":"B","text":"Complete the initial replication of the VMs. Launch test instances to perform acceptance tests on the VMs."},{"letter":"C","text":"Use AWS Application Migration Service. Install the AWS Replication Agent on the VMs."},{"letter":"D","text":"Use the AWS Schema Conversion Tool (AWS SCT) to collect data about the VMs."},{"letter":"E","text":"Use AWS Database Migration Service (AWS DMS) to migrate the VMs."},{"letter":"F","text":"Use AWS App2Container (A2C) to collect data about the VMs."}],"answer":["A","B","C"],"question":"A company runs multiple workloads on virtual machines (VMs) in an on-premises data center. The company is expanding rapidly. The on-premises data center is not able to scale fast enough to meet business needs. The company wants to migrate the workloads to AWS.\nThe migration is time sensitive. The company wants to use a lift-and-shift strategy for non-critical workloads.\nWhich combination of steps will meet these requirements? (Choose three.)"},{"id":11,"options":[{"letter":"A","text":"Use client-side encryption with AWS KMS customer managed keys."},{"letter":"B","text":"Use server-side encryption with customer-provided keys (SSE-C) stored in AWS KMS."},{"letter":"C","text":"Use an S3 Bucket Key for server-side encryption with AWS KMS keys (SSE-KMS) on the new objects."},{"letter":"D","text":"Use server-side encryption with Amazon S3 managed keys (SSE-S3)."}],"answer":["C"],"question":"A company runs an environment where data is stored in an Amazon S3 bucket. The objects are accessed frequently throughout the day. The company has strict data encryption requirements for data that is stored in the S3 bucket. The company currently uses AWS Key Management Service (AWS KMS) for encryption.\nThe company wants to optimize costs associated with encrypting S3 objects without making additional calls to AWS KMS.\nWhich solution will meet these requirements?"},{"id":12,"options":[{"letter":"A","text":"Create an Amazon Machine Image (AMI) of the web application. Use the AMI to launch a second EC2 On-Demand Instance. Use an Application Load Balancer to distribute the load across the two EC2 instances."},{"letter":"B","text":"Create an Amazon Machine Image (AMI) of the web application. Use the AMI to launch a second EC2 On-Demand Instance. Use Amazon Route 53 weighted routing to distribute the load across the two EC2 instances."},{"letter":"C","text":"Create an Amazon Machine Image (AMI) of the web application. Apply the AMI to a launch template. Create an Auto Scaling group that includes the launch template. Configure the launch template to use a Spot Fleet. Attach an Application Load Balancer to the Auto Scaling group."},{"letter":"D","text":"Create an AWS Lambda function to stop the EC2 instance and change the instance type. Create an Amazon CloudWatch alarm to invoke the Lambda function when CPU utilization is more than 75%."}],"answer":["C"],"question":"A company hosts a website analytics application on a single Amazon EC2 On-Demand Instance. The analytics application is highly resilient and is designed to run in stateless mode.\nThe company notices that the application is showing signs of performance degradation during busy times and is presenting 5xx errors. The company needs to make the application scale seamlessly.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":13,"options":[{"letter":"A","text":"Create one Amazon EMR cluster for each customer. Attach a security configuration to each cluster that uses client-side encryption with a custom client-side root key (CSE-Custom) to encrypt the data."},{"letter":"B","text":"Create one Amazon EMR cluster for each customer. Attach a security configuration to each cluster that uses server-side encryption with AWS KMS keys (SSE-KMS) to encrypt the data."},{"letter":"C","text":"Create one AWS Glue job for each customer. Attach a security configuration to each job that uses server-side encryption with Amazon S3 managed keys (SSE-S3) to encrypt the data."},{"letter":"D","text":"Create one AWS Glue job for each customer. Attach a security configuration to each job that uses client-side encryption with AWS KMS managed keys (CSE-KMS) to encrypt the data."}],"answer":["D"],"question":"A medical company wants to perform transformations on a large amount of clinical trial data that comes from several customers. The company must extract the data from a relational database that contains the customer data. Then the company will transform the data by using a series of complex rules. The company will load the data to lts data to an API that is running on an Amazon EC2 instance. Configure the API to store the survey results as a new record in an Amazon DynamoDB table, call Amazon Comprehend for sentiment analysis, and save the results in a second DynamoDB table. Set the TTL for all records to 365 days in the future."},{"letter":"C","text":"Send the survey results data to an Amazon API Gateway endpoint that is connected to an Amazon Simple Queue Service (Amazon SQS) queue. Configure the SQS queue to invoke an AWS Lambda function that calls Amazon Lex for sentiment analysis and saves the results to an Amazon DynamoDB table. Set the TTL for all records to 365 days in the future."},{"letter":"D","text":"Write the survey results data to an Amazon S3 bucket. Use S3 Event Notifications to invoke an AWS Lambda function to read the data and call Amazon Rekognition for sentiment analysis. Store the sentiment analysis results in a second S3 bucket. Use S3 lifecycle policies on each bucket to expire objects after 365 days."}],"answer":["A"],"question":"A company tracks customer satisfaction by using surveys that the company hosts on its website. The surveys sometimes reach thousands of customers every hour. Survey results are currently sent in email messages to the company so company employees can manually review results and assess customer sentiment.\nThe company wants to automate the customer survey process. Survey results must be available for the previous 12 months.\nWhich solution will meet these requirements in the MOST scalable way?"},{"id":16,"options":[{"letter":"A","text":"Create an AWS Direct Connect connection that has a public virtual interface (VIF) to provide connectivity from each customer's data center to us-east-1. Route customer API requests by using a Direct Connect gateway to the ERP system API."},{"letter":"B","text":"Set up an Amazon CloudFront distribution in front of the API. Configure the CachingOptimized managed cache policy to provide improved cache efficiency."}, n a single AWS Region. Use on-demand capacity mode. Use global tables to replicate data across multiple Regions."},{"letter":"B","text":"Use DynamoDB Accelerator (DAX) to cache frequently accessed data. Deploy tables in a single AWS Region and enable auto scaling. Configure Cross-Region Replication manually to additional Regions."},{"letter":"C","text":"Create DynamoDB tables in multiple AWS Regions. Use on-demand capacity mode. Use DynamoDB Streams for Cross-Region Replication between Regions."},{"letter":"D","text":"Use DynamoDB global tables for automatic multi-Region replication. Deploy tables in multiple AWS Regions. Use provisioned capacity mode. Enable auto scaling."}],"answer":["D"],"question":"An online gaming company is transitioning user data storage to Amazon DynamoDB to support the company's growing user base. The current architecture includes DynamoDB tables that contain user profiles, achievements, and in-game transactions.\nThe company needs to design a robust, continuously available, and resilient DynamoDB architecture to maintain a seamless gaming experience for users.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":19,"options":[{"letter":"A","text":"Use Amazon CloudWatch to monitor the CPUUtilization metric for each instance in both Auto Scaling groups. Configure each Auto Scaling group's minimum capacity to meet its peak workload value."},{"letter":"B","text":"Use Amazon CloudWatch to monitor the CPUUtilization metric for each instance in both Auto Scaling groups. Configure a CloudWatch alarm to invoke an Amazon Simple Notification Service (Amazon SNS) topic to create additional Auto Scaling groups on demand."},{"letter":"C","text":"Provision two Amazon Simple Queue Service (Amazon SQS) queues. Use one SQS queue for order collection. Use the second SQS queue for order fulfillment. Configure the EC2 instances to poll their respective queues. Scale the Auto Scaling groups based on notifications that the queues send."},{"letter":"D","text":"Provision two Amazon Simple Queue Service (Amazon SQS) queues. Use one SQS queue for order collection. Use the second SQS queue for order fulfillment. Configure the EC2 instances to poll their respective queues. Scale the Auto Scaling groups based on the number of messages in each queue."}],"answer":["D"],"question":"A company operates a food delivery service. Because of recent growth, the company's order processing system is experiencing scaling problems during peak traffic hours. The current architecture includes Amazon EC2 instances in an Auto Scaling group that collect orders from an application. A second group of EC2 instances in an Auto Scaling group fulfills the orders.\nThe order collection process occurs quickly, but the order fulfillment process can take longer. Data must not be lost because of a scaling event.\nA solutions architect must ensure that the order collection process and the order fulfillment process can both scale adequately during peak traffic hours.\nWhich solution will meet these requirements?"},{"id":20,"options":[{"letter":"A","text":"Use an AWS Storage Gateway Volume Gateway with stored volumes as iSCSI targets."},{"letter":"B","text":"Use an AWS Storage Gateway Volume Gateway with cached volumes as iSCSI targets."},{"letter":"C","text":"Use an AWS Storage Gateway Tape Gateway. Integrate Tape Gateway with the on-premises applications to store virtual tapes in Amazon S3."},{"letter":"D","text":"Use Amazon S3 File Gateway. Integrate S3 File Gateway with the on-premises applications to store and directly retrieve files by using the SMB file system."}],"answer":["B"],"question":"A company currently stores 5 TB of data in on-premises block storage systems. The company's current storage solution provides limited space for additional data. The company runs applications on premises that must be able to retrieve frequently accessed data with low latency. The company requires a cloud-based storage solution.\nWhich solution will meet these requirements with the MOST operational efficiency?"},{"id":21,"options":[{"letter":"A","text":"Turn on the Multi-AZ configuration for the DB instance. Configure the EC2 instances to throttle the product catalog queries that are sent to the database."},{"letter":"B","text":"Add an additional scaling policy to the Auto Scaling group to launch additional EC2 instances when database response is slow."},{"letter":"C","text":"Implement an Amazon ElastiCache for Redis cluster to cache the product catalog. Use lazy loading to populate the cache."},{"letter":"D","text":"Migrate the product catalog to an Amazon Redshift database. Use the COPY command to load the product catalog tables."}],"answer":["C"],"question":"A company is creating a prototype of an ecommerce website on AWS. The website consists of an Application Load Balancer, an Auto Scaling group of Amazon EC2 instances for web servers, and an Amazon RDS for MySQL DB instance that runs with the Single-AZ configuration.\nThe website is slow to respond during searches of the product catalog. The product catalog is a group of tables in the MySQL database that the company does not update frequently. A solutions architect has determined that the CPU utilization on the DB instance is high when product catalog searches occur.\nWhat should the solutions architect recommend to improve the performance of the website during searches of the product catalog?"},{"id":22,"options":[{"letter":"A","text":"Create a gateway VPC endpoint for the S3 bucket that has the necessary permissions for the VPC. Configure the subnet route table to use the gateway VPC endpoint."},{"letter":"B","text":"Configure an AWS Direct Connect connection between the VPC that has the Amazon EC2 instance and Amazon S3 to provide a dedicated network path."},{"letter":"C","text":"Move the S3 bucket inside the VPC. Configure the subnet route table to access the S3 bucket through private IP addresses."},{"letter":"D","text":"Create an Amazon S3 access point for the Amazon EC2 instance inside the VPC. Configure the web application to upload by using the Amazon S3 access point."}],"answer":["A"],"question":"A company runs its legacy web application on AWS. The web application server runs on an Amazon EC2 instance in the public subnet of a VPC. The web application server collects images from customers and stores the image files in a locally attached Amazon Elastic Block Store (Amazon EBS) volume. The image files are uploaded every night to an Amazon S3 bucket for backup.\nA solutions architect discovers that the image files are being uploaded to Amazon S3 through the public endpoint. The solutions architect needs to ensure that traffic to Amazon S3 does not use the public endpoint.\nWhich solution will meet these requirements?"},{"id":23,"options":[{"letter":"A","text":"Deploy a self-managed database on Amazon EC2 instances by using open source software. Use Spot Instances for cost optimization. Configure automated backups to Amazon S3."},{"letter":"B","text":"Use Amazon Aurora Serverless for the database. Use serverless capacity scaling. Configure automated backups to Amazon S3."},{"letter":"C","text":"Use Amazon RDS. Use on-demand capacity mode for the database with General Purpose SSD storage. Configure automatic backups with a retention period of 7 days."},{"letter":"D","text":"Deploy a self-managed NoSQL database on Amazon EC2 instances. Use Reserved Instances for cost optimization. Configure automated backups directly to Amazon S3 Glacier Flexible Retrieval."}],"answer":["B"],"question":"A company is launching a new application that requires a structured database to store user profiles, application settings, and transactional data. The database must be scalable with application traffic and must offer backups.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":24,"options":[{"letter":"A","text":"Use managed node groups with Karpenter to supply compute capacity. Deploy the application to the new EKS cluster."},{"letter":"B","text":"Use AWS Fargate to supply compute capacity. Create a Fargate profile. Use the Fargate profile to deploy the application."},{"letter":"C","text":"Use a self-managed node to supply compute capacity. Deploy the application to the new EKS cluster."},{"letter":"D","text":"Use managed node groups to supply compute capacity. Deploy the application to the new EKS cluster."}],"answer":["B"],"question":"A company runs an on-premises application on a Kubernetes cluster. The company recently added millions of new customers. The company's existing on-premises infrastructure is unable to handle the large number of new customers. The company needs to migrate the on-premises application to the AWS Cloud.\nThe company will migrate to an Amazon Elastic Kubernetes Service (Amazon EKS) cluster. The company does not want to manage the underlying compute infrastructure for the new architecture on AWS.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":25,"options":[{"letter":"A","text":"Create an Amazon Machine Image (AMI) of the EC2 instance that runs the tasks. Create an Auto Scaling group with the AMI to run multiple copies of the instance."},{"letter":"B","text":"Copy the tasks into AWS Lambda functions. Schedule the Lambda functions by using Amazon EventBridge (Amazon CloudWatch Events)."},{"letter":"C","text":"Convert the EC2 instance to a container. Use AWS App Runner to create the container on demand to run the tasks as jobs."},{"letter":"D","text":"Use AWS Batch to run the tasks as jobs. Schedule the jobs by using Amazon EventBridge (Amazon CloudWatch Events)."}],"answer":["D"],"question":"A company has migrated an application to Amazon EC2 Linux instances. One of these EC2 instances runs several 1-hour tasks on a schedule. These tasks were written by different teams and have no common programming language. The company is concerned about performance and scalability while these tasks run on a single instance. A solutions architect needs to implement a solution to resolve these concerns.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":26,"options":[{"letter":"A","text":"Create a new AWS Key Management Service (AWS KMS) encryption key. Use AWS Secrets Manager to create a new secret that uses the KMS key with the appropriate credentials. Associate the secret with the Aurora DB cluster. Configure a custom rotation period of 14 days."},{"letter":"B","text":"Create two parameters in AWS Systems Manager Parameter Store: one for the user name as a string parameter and one that uses the SecureString type for the password. Select AWS Key Management Service (AWS KMS) encryption for the password parameter, and load these parameters in the application tier. Implement an AWS Lambda function that rotates the password every 14 days."},{"letter":"C","text":"Store a file that contains the credentials in an AWS Key Management Service (AWS KMS) encrypted Amazon S3 bucket that the application uses to load the credentials. Download the file to the application regularly to ensure that the correct credentials are used. Implement an AWS Lambda function that rotates the Aurora credentials every 14 days and uploads these credentials to the file in the S3 bucket."},{"letter":"D","text":"Store a file that contains the credentials in an AWS Key Management Service (AWS KMS) encrypted Amazon Elastic File System (Amazon EFS) file system. Mount the EFS file system in all EC2 instances of the application tier. Restrict the access to the file on the file system so that the application can read the file and that only super users can modify the file. Implement an AWS Lambda function that rotates the key in Aurora every 14 days and writes new credentials into the file."}],"answer":["A"],"question":"A company hosts a multi-tier web application that uses an Amazon Aurora MySQL DB cluster for storage. The application tier is hosted on Amazon EC2 instances. The company's IT security guidelines mandate that the database credentials be encrypted and rotated every 14 days.\nWhat should a solutions architect do to meet this requirement with the LEAST operational effort?"},{"id":27,"options":[{"letter":"A","text":"Place all the EC2 instances in the same Availability Zone."},{"letter":"B","text":"Place all the EC2 instances in private subnets in multiple Availability Zones."},{"letter":"C","text":"Place all the EC2 instances in the same AWS Region."},{"letter":"D","text":"Place all the EC2 instances in an Auto Scaling group."}],"answer":["A"],"question":"A solutions architect is creating an application that will handle batch processing of large amounts of data. The input data will be held in Amazon S3 and the output data will be stored in a different S3 bucket. For processing, the application will transfer the data over the network between multiple Amazon EC2 instances.\nWhat should the solutions architect do to reduce the overall data transfer costs?"},{"id":28,"options":[{"letter":"A","text":"Create a VPC and two public subnets. Create the RDS cluster in the public subnets. Use AWS Site-to-Site VPN with a customer gateway in the company's office."},{"letter":"B","text":"Create a VPC and two public subnets. Create the RDS cluster in the public subnets. Create a cluster user for each developer. Use RDS security groups to allow the users to access the cluster."},{"letter":"C","text":"Create a VPC and two private subnets. Create the RDS cluster in the private subnets. Use AWS Site-to-Site VPN with a customer gateway in the company's office."},{"letter":"D","text":"Create a VPC and two private subnets. Create the RDS cluster in the private subnets. Use RDS security groups to allow the company's office IP ranges to access the cluster."}],"answer":["C"],"question":"A company's software development team needs an Amazon RDS Multi-AZ cluster. The RDS cluster will serve as a backend for a desktop client that is deployed on premises. The desktop client requires direct connectivity to the RDS cluster.\nThe company must give the development team the ability to connect to the cluster by using the client when the team is in the office.\nWhich solution provides the required connectivity MOST securely?"},{"id":29,"options":[{"letter":"A","text":"Create an Amazon S3 bucket to store the data. Configure the application to scan for new data in the bucket for processing."},{"letter":"B","text":"Create an Amazon API Gateway endpoint to handle transmitted location coordinates. Use an AWS Lambda function to process each item concurrently."},{"letter":"C","text":"Create an Amazon Simple Queue Service (Amazon SQS) queue to store the incoming data. Configure the application to poll for new messages for processing."},{"letter":"D","text":"Create an Amazon DynamoDB table to store transmitted location coordinates. Configure the application to query the table for new data for processing. Use TTL to remove data that has been processed."}],"answer":["C"],"question":"A company uses GPS trackers to document the migration patterns of thousands of sea turtles. The trackers check every 5 minutes to see if a turtle has moved more than 100 yards (91.4 meters). If a turtle has moved, its tracker sends the new coordinates to a web application running on three Amazon EC2 instances that are in multiple Availability Zones in one AWS Region.\nRecently, the web application was overwhelmed while processing an unexpected volume of tracker data. Data was lost with no way to replay the events. A solutions architect must prevent this problem from happening again and needs a solution with the least operational overhead.\nWhat should the solutions architect do to meet these requirements?"},{"id":30,"options":[{"letter":"A","text":"Amazon Elastic Block Store (Amazon EBS)"},{"letter":"B","text":"AWS DataSync"},{"letter":"C","text":"Amazon EMR File System (Amazon EMRFS)"},{"letter":"D","text":"Amazon Elastic File System (Amazon EFS)"}],"answer":["D"],"question":"A company is planning to migrate a legacy application to AWS. The application currently uses NFS to communicate to an on-premises storage solution to store application data. The application cannot be modified to use any other communication protocols other than NFS for this purpose.\nWhich storage solution should a solutions architect recommend for use after the migration?"},{"id":31,"options":[{"letter":"A","text":"Configure the RDS backup retention policy to 30 days for automated backups by using AWS Backup. Manually delete manual backups that are older than 30 days."},{"letter":"B","text":"Disable RDS automated backups. Delete automated backups and manual backups that are older than 30 days. Configure the RDS backup retention policy to 30 days for automated backups."},{"letter":"C","text":"Configure the RDS backup retention policy to 30 days for automated backups. Manually delete manual backups that are older than 30 days."},{"letter":"D","text":"Disable RDS automated backups. Delete automated backups and manual backups that are older than 30 days automatically by using AWS CloudFormation. Configure the RDS backup retention policy to 30 days for automated backups."}],"answer":["C"],"question":"A company runs database workloads on AWS that are the backend for the company's customer portals. The company runs a Multi-AZ database cluster on Amazon RDS for PostgreSQL.\nThe company needs to implement a 30-day backup retention policy. The company currently has both automated RDS backups and manual RDS backups. The company wants to maintain both types of existing RDS backups that are less than 30 days old.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":32,"options":[{"letter":"A","text":"In Organizations, create a new tag policy that specifies the data sensitivity tag key and the required values. Enforce the tag values for the EC2 instances. Attach the tag policy to the appropriate OU."},{"letter":"B","text":"In Organizations, create a new service control policy (SCP) that specifies the data sensitivity tag key and the required tag values. Enforce the tag values for the EC2 instances. Attach the SCP to the appropriate OU."},{"letter":"C","text":"Create an AWS Config rule to check if EC2 instances use the data sensitivity tag and the specified values. Configure an AWS Lambda function to delete the resource if a noncompliant resource is found."},{"letter":"D","text":"Create a tag policy to deny running instances when a tag key is not specified. Create another tag policy that prevents identities from deleting tags. Attach the tag policies to the appropriate OU."},{"letter":"E","text":"Create a service control policy (SCP) to deny creating instances when a tag key is not specified. Create another SCP that prevents identities from deleting tags. Attach the SCPs to the appropriate OU."}],"answer":["A","E"],"question":"A company is designing the architecture for a new mobile app that uses the AWS Cloud. The company uses organizational units (OUs) in AWS Organizations to manage its accounts. The company wants to tag Amazon EC2 instances with data sensitivity by using values of sensitive and nonsensitive. IAM identities must not be able to delete a tag or create instances without a tag.\nWhich combination of steps will meet these requirements? (Choose two.)"},{"id":33,"options":[{"letter":"A","text":"Add a Network Load Balancer in front of the EC2 instances."},{"letter":"B","text":"Add an Application Load Balancer in front of the EC2 instances."},{"letter":"C","text":"Configure an Auto Scaling group for the EC2 instances."},{"letter":"D","text":"Add a Gateway Load Balancer in front of the EC2 instances."},{"letter":"E","text":"Manually add more EC2 instances for the application."}],"answer":["A","C"],"question":"A company recently launched a new application for its customers. The application runs on multiple Amazon EC2 instances across two Availability Zones. End users use TCP to communicate with the application.\nThe application must be highly available and must automatically scale as the number of users increases.\nWhich combination of steps will meet these requirements MOST cost-effectively? (Choose two.)"},{"id":34,"options":[{"letter":"A","text":"Provision an EC2 instance that uses NFS server software. Attach a single 500 GB gp2 EBS volume to the instance."},{"letter":"B","text":"Provision an Amazon FSx for Windows File Server file system. Configure the file system as an SMB file store within a single Availability Zone."},{"letter":"C","text":"Provision an EC2 instance with two 250 GB Provisioned IOPS SSD EBS volumes."},{"letter":"D","text":"Provision an Amazon Elastic File System (Amazon EFS) file system. Configure the file system to use General Purpose performance mode."}],"answer":["D"],"question":"A company is testing an application that runs on an Amazon EC2 Linux instance. A single 500 GB Amazon Elastic Block Store (Amazon EBS) General Purpose SSO (gp2) volume is attached to the EC2 instance.\nThe company will deploy the application on multiple EC2 instances in an Auto Scaling group. All instances require access to the data that is stored in the EBS volume. The company needs a highly available and resilient solution that does not introduce significant changes to the application's code.\nWhich solution will meet these requirements?"},{"id":35,"options":[{"letter":"A","text":"Amazon S3 Standard"},{"letter":"B","text":"Amazon S3 One Zone-Infrequent Access (S3 One Zone-IA)"},{"letter":"C","text":"Amazon S3 Intelligent-Tiering"},{"letter":"D","text":"Amazon S3 Glacier Deep Archive"}],"answer":["C"],"question":"A company stores user data in AWS. The data is used continuously with peak usage during business hours. Access patterns vary, with some data not being used for months at a time. A solutions architect must choose a cost-effective solution that maintains the highest level of durability while maintaining high availability.\nWhich storage solution meets these requirements?"},{"id":36,"options":[{"letter":"A","text":"Create an Amazon CloudFront distribution. Configure the existing ALB as the origin."},{"letter":"B","text":"Use Amazon Route 53 to serve traffic to the ALB and EC2 instances based on the geographic location of each customer."},{"letter":"C","text":"Create an Amazon S3 bucket with public read access enabled. Migrate the web application to the S3 bucket. Configure the S3 bucket for website hosting."},{"letter":"D","text":"Use AWS Direct Connect to directly serve content from the web application to the location of each customer."}],"answer":["A"],"question":"A company hosts its main public web application in one AWS Region across multiple Availability Zones. The application uses an Amazon EC2 Auto Scaling group and an Application Load Balancer (ALB).\nA web development team needs a cost-optimized compute solution to improve the company’s ability to serve dynamic content globally to millions of customers.\nWhich solution will meet these requirements?"},{"id":37,"options":[{"letter":"A","text":"Configure AWS Transit Gateway between the accounts. Assign DX to the transit gateway and route network traffic to the on-premises servers."},{"letter":"B","text":"Create a DX connection in each new account. Route the network traffic to the on-premises servers."},{"letter":"C","text":"Configure VPC endpoints in the DX VPC for all required services. Route the network traffic to the on-premises servers."},{"letter":"D","text":"Create a VPN connection between each new account and the DX VPRoute the network traffic to the on-premises servers."}],"answer":["A"],"question":"A company hosts its core network services, including directory services and DNS, in its on-premises data center. The data center is connected to the AWS Cloud using AWS Direct Connect (DX). Additional AWS accounts are planned that will require quick, cost-effective, and consistent access to these network services.\nWhat should a solutions architect implement to meet these requirements with the LEAST amount of operational overhead?"},{"id":38,"options":[{"letter":"A","text":"Create an S3 bucket policy that permits access to the bucket from the public IP address range of the company’s on-premises data center."},{"letter":"B","text":"Use IAM Roles Anywhere to obtain security credentials in IAM Identity Center that grant access to the S3 bucket. Configure the virtual machines to assume the role by using the AWS CLI."},{"letter":"C","text":"Create an IAM user and policy that grants access to the bucket. Store the access key and secret key for the IAM user in AWS Secrets Manager. Configure the application to retrieve the access key and secret key at startup."},{"letter":"D","text":"Install the AWS CLI on the virtual machine. Configure the AWS CLI with access keys from an IAM user that has access to the bucket."}],"answer":["B"],"question":"A company has an Amazon S3 bucket that contains sensitive data files. The company has an application that runs on virtual machines in an on-premises data center. The company currently uses AWS IAM Identity Center.\nThe application requires temporary access to files in the S3 bucket. The company wants to grant the application secure access to the files in the S3 bucket.\nWhich solution will meet these requirements?"},{"id":39,"options":[{"letter":"A","text":"Create individual IAM users for each member in all the teams with role-based permissions. Assign the IAM roles with predefined policies for RDS and S3 access to each user based on user needs. Implement IAM Access Analyzer for periodic credential evaluation."},{"letter":"B","text":"Use AWS Organizations to create separate accounts for each team. Implement cross-account IAM roles with least privilege. Grant specific permission for RDS and S3 access based on team roles and responsibilities."},{"letter":"C","text":"Enable IAM Identity Center with an Identity Center directory. Create and configure permission sets with granular access to Amazon RDS and Amazon S3. Assign all the teams to groups that have specific access with the permission sets."},{"letter":"D","text":"Use IAM roles with least privilege to grant all the teams access. Assign IAM roles to each team with customized IAM policies defining specific permission for Amazon RDS and S3 object access based on team responsibilities."}],"answer":["C"],"question":"A company is building a cloud-based application on AWS that will handle sensitive customer data. The application uses Amazon RDS for the database, Amazon S3 for object storage, and S3 Event Notifications that invoke AWS Lambda for serverless processing.\nThe company uses AWS IAM Identity Center to manage user credentials. The development, testing, and operations teams need secure access to Amazon RDS and Amazon S3 while ensuring the confidentiality of sensitive customer data. The solution must comply with the principle of least privilege.\nWhich solution meets these requirements with the LEAST operational overhead?"},{"id":40,"options":[{"letter":"A","text":"Create a gateway endpoint for Amazon S3 that is attached to the VPC. Update the IAM instance profile policy to provide access to only the specific buckets that the application needs."},{"letter":"B","text":"Create a NAT gateway in a public subnet with a security group that allows access to only Amazon S3. Update the route tables to use the NAT Gateway."},{"letter":"C","text":"Create a NAT Gateway in a public subnet. Update route tables to use the NAT Gateway. Assign bucket policies for all buckets with a Deny action and the following condition key: { \"StringNotEquals\" : { \"s3:ResourceAccount\" : [ \"CompanyAWSAccountNumber\" ] } }"},{"letter":"D","text":"Create a gateway endpoint for Amazon S3 that is attached to the VPC. Update the IAM instance profile policy with a Deny action and the following condition key: { \"StringNotEquals\" : { \"s3:ResourceAccount\" : [ \"CompanyAWSAccountNumber\" ] } }"}],"answer":["D"],"question":"A company hosts its application on several Amazon EC2 instances inside a VPC. The company creates a dedicated Amazon S3 bucket for each customer to store their relevant information in Amazon S3.\nThe company wants to ensure that the application running on EC2 instances can securely access only the S3 buckets that belong to the company’s AWS account.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":41,"options":[{"letter":"A","text":"Deploy the database on Amazon RDS. Use Provisioned IOPS SSD storage to ensure consistent performance for read and write operations."},{"letter":"B","text":"Deploy the database on Amazon Aurora Serverless to automatically scale the database capacity based on actual usage to accommodate the workload."},{"letter":"C","text":"Deploy the database on Amazon RDS. Use magnetic storage and use read replicas to accommodate the workload."},{"letter":"D","text":"Deploy the database on Amazon DynamoDB. Use on-demand capacity mode to automatically scale throughput to accommodate the workload."}],"answer":["B"],"question":"A company is developing a new application that uses a relational database to store user data and application configurations. The company expects the application to have steady user growth. The company expects the database usage to be variable and read-heavy, with occasional writes.\nThe company wants to cost-optimize the database solution. The company wants to use an AWS managed database solution that will provide the necessary performance.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":42,"options":[{"letter":"A","text":"Create Amazon RDS automated backups. Set the retention period to 90 days."},{"letter":"B","text":"Use the Amazon Aurora Clone feature for Oracle to create a point-in-time restore. Delete clones that are older than 90 days."},{"letter":"C","text":"Create an Amazon RDS manual snapshot every day. Delete manual snapshots that are older than 90 days."},{"letter":"D","text":"Create a backup plan that has a retention period of 90 days by using AWS Backup for Amazon RDS with Point In Time Recovery enabled."}],"answer":["D"],"question":"A company is migrating its on-premises Oracle database to an Amazon RDS for Oracle database. The company needs to retain data for 90 days to meet regulatory requirements. The company must also be able to restore the database to a specific point in time for up to 14 days.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":43,"options":[{"letter":"A","text":"Configure encryption at rest for Amazon RDS for MySQL by using AWS KMS managed keys. Configure IPsec tunnels for encryption in transit."},{"letter":"B","text":"Implement third-party application-level data encryption before storing data in Amazon RDS for MySQL. Configure AWS Certificate Manager (ACM) SSL/TLS certificates for encryption in transit."},{"letter":"C","text":"Configure encryption at rest for Amazon RDS for MySQL by using AWS KMS managed keys. Configure AWS Certificate Manager (ACM) SSL/TLS certificates for encryption in transit."},{"letter":"D","text":"Configure encryption at rest for Amazon RDS for MySQL by using AWS KMS managed keys. Configure a VPN connection to enable private connectivity to encrypt data in transit."}],"answer":["C"],"question":"A financial services company plans to launch a new application on AWS to handle sensitive financial transactions. The company will deploy the application on Amazon EC2 instances behind an Application Load Balancer. The company will use Amazon RDS for MySQL as the database. The company’s security policies mandate that data must be encrypted at rest and in transit.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":44,"options":[{"letter":"A","text":"Geocation routing policy"},{"letter":"B","text":"Latency routing policy"},{"letter":"C","text":"Multivalue routing policy"},{"letter":"D","text":"Simple routing policy"}],"answer":["C"],"question":"A company hosts its web application on AWS using seven Amazon EC2 instances. The company requires that the IP addresses of all healthy EC2 instances be returned in response to DNS queries.\nWhich policy should be used to meet this requirement?"},{"id":45,"options":[{"letter":"A","text":"Configure Amazon Athena to read the encrypted files. Run SQL queries on the data directly in Amazon S3."},{"letter":"B","text":"Configure Amazon Redshift to read the encrypted files. Use Redshift Spectrum and Redshift query editor v2 to run SQL queries on the data directly in Amazon S3."},{"letter":"C","text":"Use Amazon S3 Select to run SQL queries on the data directly in Amazon S3."},{"letter":"D","text":"Configure Amazon EMR Serverless to read the encrypted files. Use Apache SparkSQL to run SQL queries on the data directly in Amazon S3."}],"answer":["A"],"question":"A weather forecasting company collects temperature readings from various sensors on a continuous basis. An existing data ingestion process collects the readings and aggregates the readings into larger Apache Parquet files. Then the process encrypts the files by using client-side encryption with KMS managed keys (CSE-KMS). Finally, the process writes the files to an Amazon S3 bucket with separate prefixes for each calendar day.\nThe company wants to run occasional SQL queries on the data to take sample moving averages for a specific calendar day.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":46,"options":[{"letter":"A","text":"Configure Amazon S3 to allow uploads from CloudFront origin access control (OAC)."},{"letter":"B","text":"Configure Amazon S3 to allow uploads from CloudFront. Configure S3 Transfer Acceleration."},{"letter":"C","text":"Configure Amazon S3 to allow uploads from CloudFront. Configure an Amazon S3 website endpoint."},{"letter":"D","text":"Use AWS Certificate Manager (ACM) to create a public certificate in eu-west-1. Use the certificate in CloudFront."},{"letter":"E","text":"Use AWS Certificate Manager (ACM) to create a public certificate in the us-east-1 Region. Use the certificate in CloudFront."}],"answer":["A","E"],"question":"A company hosts an application on AWS. The application gives users the ability to upload photos and store the photos in an Amazon S3 bucket. The company wants to use Amazon CloudFront and a custom domain name to upload the photo files to the S3 bucket in the eu-west-1 Region.\nWhich solution will meet these requirements? (Choose two.)"},{"id":47,"options":[{"letter":"A","text":"Allow all outbound traffic to 0.0.0.0/0 for port 443."},{"letter":"B","text":"Allow HTTPS outbound traffic to the web application instances for port 443."},{"letter":"C","text":"Allow HTTPS inbound traffic from the web application instances for port 443."},{"letter":"D","text":"Allow HTTPS inbound traffic from 0.0.0.0/0 for port 443."},{"letter":"E","text":"Allow HTTPS inbound traffic from the web application instances for the health check on port 8443."},{"letter":"F","text":"Allow HTTPS outbound traffic to the web application instances for the health check on port 8443."}],"answer":["B","D","F"],"question":"A company is designing a web application with an internet-facing Application Load Balancer (ALB).\nThe company needs the ALB to receive HTTPS web traffic from the public internet. The ALB must send only HTTPS traffic to the web application servers hosted on the Amazon EC2 instances on port 443. The ALB must perform a health check of the web application servers over HTTPS on port 8443.\nWhich combination of configurations of the security group that is associated with the ALB will meet these requirements? (Choose three.)"},{"id":48,"options":[{"letter":"A","text":"Create a second S3 bucket in us-east-1. Configure S3 event notifications on object creation and update events to invoke an AWS Lambda function to copy photos from the existing S3 bucket to the second S3 bucket."},{"letter":"B","text":"Create a second S3 bucket in us-east-1 across multiple Availability Zones. Create an S3 Lifecycle rule to save photos into the second S3 bucket."},{"letter":"C","text":"Create a cross-origin resource sharing (CORS) configuration of the existing S3 bucket. Specify us-east-1 in the CORS rule's AllowedOrigin element."},{"letter":"D","text":"Create a second S3 bucket in us-east-1. Use S3 Cross-Region Replication to copy photos from the existing S3 bucket to the second S3 bucket."}],"answer":["D"],"question":"An online photo-sharing company stores its photos in an Amazon S3 bucket that exists in the us-west-1 Region. The company needs to store a copy of all new photos in the us-east-1 Region.\nWhich solution will meet this requirement with the LEAST operational effort?"},{"id":49,"options":[{"letter":"A","text":"Provisioned IOPS SSD Amazon Elastic Block Store (Amazon EBS) volume"},{"letter":"B","text":"Throughput Optimized HDD Amazon Elastic Block Store (Amazon EBS) volume"},{"letter":"C","text":"Amazon ElastiCache for Memcached cluster"},{"letter":"D","text":"Instance store volume"}],"answer":["A"],"question":"A company is planning to deploy a business-critical application in the AWS Cloud. The application requires durable storage with consistent, low-latency performance.\nWhich type of storage should a solutions architect recommend to meet these requirements?"},{"id":50,"options":[{"letter":"A","text":"Configure Amazon Macie to monitor and report findings to AWS Config."},{"letter":"B","text":"Configure Amazon Inspector to monitor and report findings to AWS CloudTrail."},{"letter":"C","text":"Configure Amazon GuardDuty to monitor and report findings to AWS Security Hub."},{"letter":"D","text":"Configure AWS Config to monitor and report findings to Amazon EventBridge."}],"answer":["C"],"question":"A company has deployed its newest product on AWS. The product runs in an Auto Scaling group behind a Network Load Balancer. The company stores the product’s objects in an Amazon S3 bucket.\nThe company recently experienced malicious attacks against its systems. The company needs a solution that continuously monitors for malicious activity in the AWS account, workloads, and access patterns to the S3 bucket. The solution must also report suspicious activity and display the information on a dashboard.\nWhich solution will meet these requirements?\""},{"id":51,"options":[{"letter":"A","text":"Use AWS App2Container to containerize the application. Use an AWS CloudFormation template to deploy the application to Amazon Elastic Container Service (Amazon ECS) on AWS Fargate."},{"letter":"B","text":"Use AWS App2Container to containerize the application. Use an AWS CloudFormation template to deploy the application to Amazon Elastic Container Service (Amazon ECS) on Amazon EC2 instances."},{"letter":"C","text":"Use AWS App Runner to containerize the application. Use App Runner to deploy the application to Amazon Elastic Container Service (Amazon ECS) on AWS Fargate."},{"letter":"D","text":"Use AWS App Runner to containerize the application. Use App Runner to deploy the application to Amazon Elastic Kubernetes Service (Amazon EKS) on Amazon EC2 instances."}],"answer":["A"],"question":"A company currently runs an on-premises application that uses ASP.NET on Linux machines. The application is resource-intensive and serves customers directly.\nThe company wants to modernize the application to .NET. The company wants to run the application on containers and to scale based on Amazon CloudWatch metrics. The company also wants to reduce the time spent on operational maintenance activities.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":52,"options":[{"letter":"A","text":"Use Amazon EMR to ingest and process the data streams to Amazon Redshift for storage. Use Amazon Redshift Spectrum to search the data. Use Amazon QuickSight to create visualizations."},{"letter":"B","text":"Use Amazon EC2 instances to ingest and process the data streams to Amazon S3 buckets tor storage. Use Amazon Athena to search the data. Use Amazon Managed Grafana to create visualizations."},{"letter":"C","text":"Use Amazon Kinesis Data Streams to ingest and process the data streams to Amazon OpenSearch Service. Use OpenSearch Service to search the data. Use Amazon QuickSight to create visualizations."},{"letter":"D","text":"Use Amazon Elastic Kubernetes Service (Amazon EKS) to ingest and process the data streams to Amazon DynamoDB for storage. Use Amazon CloudWatch to create graphical dashboards to search and visualize the data."}],"answer":["C"],"question":"A finance company uses an on-premises search application to collect streaming data from various producers. The application provides real-time updates to search and visualization features.\nThe company is planning to migrate to AWS and wants to use an AWS native solution.\nWhich solution will meet these requirements?"},{"id":53,"options":[{"letter":"A","text":"Use an Amazon Simple Queue Service (Amazon SQS) standard queue between the web application server tier and the worker tier to store and forward form data."},{"letter":"B","text":"Use an Amazon API Gateway HTTP API between the web application server tier and the worker tier to store and forward form data."},{"letter":"C","text":"Use an Amazon Simple Queue Service (Amazon SQS) FIFO queue between the web application server tier and the worker tier to store and forward form data."},{"letter":"D","text":"Use an AWS Step Functions workflow. Create a synchronous workflow between the web application server tier and the worker tier that stores and forwards form data."}],"answer":["C"],"question":"A solutions architect is designing an application that helps users fill out and submit registration forms. The solutions architect plans to use a two-tier architecture that includes a web application server tier and a worker tier.\nThe application needs to process submitted forms quickly. The application needs to process each form exactly once. The solution must ensure that no data is lost.\nWhich solution will meet these requirements?"},{"id":54,"options":[{"letter":"A","text":"Create an AWS Lambda function that periodically queries and removes sensitive information from Lake Formation tables."},{"letter":"B","text":"Create an IAM role that includes permissions to access Lake Formation tables."},{"letter":"C","text":"Create an AWS Lambda function that removes sensitive information before Lake Formation ingests the data."},{"letter":"D","text":"Create data filters to implement row-level security and cell-level security."}],"answer":["D"],"question":"A company is building a data analysis platform on AWS by using AWS Lake Formation. The platform will ingest data from different sources such as Amazon S3 and Amazon RDS. The company needs a secure solution to prevent access to portions of the data that contain sensitive information.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":55,"options":[{"letter":"A","text":"Encrypt the data by using client-side encryption with Amazon S3 managed keys."},{"letter":"B","text":"Encrypt the data by using client-side encryption with customer managed keys."},{"letter":"C","text":"Encrypt the data by using server-side encryption with AWS KMS keys (SSE-KMS)."},{"letter":"D","text":"Encrypt the data by using server-side encryption with customer-provided keys (SSE-C)."}],"answer":["B"],"question":"A company is migrating an application from an on-premises environment to AWS. The application will store sensitive data in Amazon S3. The company must encrypt the data before storing the data in Amazon S3.\nWhich solution will meet these requirements?"},{"id":56,"options":[{"letter":"A","text":"Deploy an AWS Storage Gateway volume gateway that is configured with cached volumes."},{"letter":"B","text":"Deploy an AWS Storage Gateway volume gateway that is configured with stored volumes."},{"letter":"C","text":"Deploy Amazon Elastic Block Store (Amazon EBS) storage with backups to Amazon S3."},{"letter":"D","text":"Deploy an Amazon S3 File Gateway."}],"answer":["A"],"question":"A company has several on-premises Internet Small Computer Systems Interface (ISCSI) network storage servers. The company wants to reduce the number of these servers by moving to the AWS Cloud. A solutions architect must provide low-latency access to frequently used data and reduce the dependency on on-premises servers with a minimal number of infrastructure changes.\nWhich solution will meet these requirements?"},{"id":57,"options":[{"letter":"A","text":"Use rsync to transfer the data directly to Amazon S3."},{"letter":"B","text":"Order multiple AWS Snowball devices. Copy the data to the devices. Send the devices to AWS to copy the data to Amazon S3."},{"letter":"C","text":"Use the AWS CLI and multiple copy processes to send the data directly to Amazon S3."},{"letter":"D","text":"Configure AWS DataSync to migrate the data to Amazon S3 and to automatically verify the data."}],"answer":["B"],"question":"A company will migrate 10 PB of data to Amazon S3 in 6 weeks. The current data center has a 500 Mbps uplink to the internet. Other on-premises applications share the uplink. The company can use 80% of the internet bandwidth for this one-time migration task.\nWhich solution will meet these requirements?"},{"id":58,"options":[{"letter":"A","text":"Deploy an Amazon CloudFront distribution that listens on the TCP port that the application requires. Use an Application Load Balancer as the origin."},{"letter":"B","text":"Deploy an Application Load Balancer (ALB). Configure the ALB to be publicly accessible over the TCP port that the application requires."},{"letter":"C","text":"Deploy an Amazon API Gateway API that is configured with the TCP port that the application requires. Configure AWS Lambda functions with provisioned concurrency to process the requests."},{"letter":"D","text":"Deploy a Network Load Balancer (NLB). Configure the NLB to be publicly accessible over the TCP port that the application requires."}],"answer":["D"],"question":"A company is planning to migrate a TCP-based application into the company's VPC. The application is publicly accessible on a nonstandard TCP port through a hardware appliance in the company's data center. This public endpoint can process up to 3 million requests per second with low latency. The company requires the same level of performance for the new public endpoint in AWS.\nWhat should a solutions architect recommend to meet this requirement?"},{"id":59,"options":[{"letter":"A","text":"Configure an AWS Lambda function to read the ALB metrics to block attacks by updating a VPC network ACL"},{"letter":"B","text":"Configure an AWS WAF web ACL for the Global Accelerator accelerator to block traffic by using rate-based rules"},{"letter":"C","text":"Configure an AWS WAF web ACL on the ALB to block traffic by using rate-based rules"},{"letter":"D","text":"Configure an Amazon CloudFront distribution in front of the Global Accelerator accelerator"}],"answer":["C"],"question":"A company uses AWS to host its public ecommerce website. The website uses an AWS Global Accelerator accelerator for traffic from the internet. The Global Accelerator accelerator forwards the traffic to an Application Load Balancer (ALB) that is the entry point for an Auto Scaling group.\nThe company recently identified a DDoS attack on the website. The company needs a solution to mitigate future attacks.\nWhich solution will meet these requirements with the LEAST implementation effort?"},{"id":60,"options":[{"letter":"A","text":"Configure AWS Resource Access Manager to share the S3 bucket with the marketing firm AWS account."},{"letter":"B","text":"Configure S3 Cross-Region Replication (CRR) from the company’s S3 bucket to one of the marketing firm’s S3 buckets."},{"letter":"C","text":"Configure the Requester Pays feature on the company’s S3 bucket."},{"let xt":"Enable Performance Insights. Monitor the CPU load to identify the timeouts."}],"answer":["B"],"question":"A global ecommerce company runs its critical workloads on AWS. The workloads use an Amazon RDS for PostgreSQL DB instance that is configured for a Multi-AZ deployment.\nCustomers have reported application timeouts when the company undergoes database failovers. The company needs a resilient solution to reduce failover time.\nWhich solution will meet these requirements?"},{"id":63,"options":[{"letter":"A","text":"Associate AWS Site-to-Site VPN connections with the transit gateway that is attached to the VPCs."},{"letter":"B","text":"Establish an AWS Direct Connect connection. Create a transit virtual interface (VIF) to a Direct Connect gateway."},{"letter":"C","text":"Establish an AWS Site-to-Site VPN connection to an AWS Direct Connect gateway."},{"letter":"D","text":"Associate an AWS Direct Connect gateway with the transit gateway that is attached to the VPCs."},{"letter":"E","text":"Establish an AWS Site-to-Site VPN connection to each VPC."}],"answer":["B","D"],"question":"A company needs to design a hybrid network architecture. The company's workloads are currently stored in the AWS Cloud and in on-premises data centers. The workloads require single-digit latencies to communicate. The company uses an AWS Transit Gateway transit gateway to connect multiple VPCs.\nWhich combination of steps will meet these requirements MOST cost-effectively? (Choose two.)"},{"id":64,"options":[{"letter":"A","text":"Deploy Amazon EC2 Spot Instances to run the batch jobs. Store the data in Amazon S3 Standard. Move the data to Amazon S3 Glacier Flexible Retrieval after 30 days. Set an expiration to delete the data after 2 years."},{"letter":"B","text":"Deploy Amazon EC2 On-Demand Instances to run the batch jobs. Store the data in Amazon S3 Standard. Move the data to Amazon S3 Glacier Deep Archive after 30 days. Set an expiration to delete the data after 2 years."},{"letter":"C t every EC2 instance can be recovered after a disaster.\nWhat should the solutions architect do to meet this requirement with the LEAST amount of effort?"},{"id":68,"options":[{"letter":"A","text":"Configure Cross-Region Replication (CRR) on the existing S3 bucket. Use server-side encryption with Amazon S3 managed keys (SSE-S3). Use Amazon Athena to query the data."},{"letter":"B","text":"Create a new S3 bucket that uses server-side encryption with AWS KMS multi-Region keys (SSE-KMS). Configure Cross-Region Replication (CRR). Load the data into the new S3 bucket. Use Amazon Athena to query the data."},{"letter":"C","text":"Create a new S3 bucket that uses server-side encryption with Amazon S3 managed keys (SSE-S3). Configure Cross-Region Replication (CRR). Load the data into the new S3 bucket. Use Amazon RDS to query the data."},{"letter":"D","text":"Configure S3 Cross-Region Replication (CRR) on the existing S3 bucket. Use server-side encryption with AWS KMS multi-Region keys (SSE-KMS). Use Amazon RDS to query the data."}],"answer":["A"],"question":"A company wants to move its application to a serverless solution. The serverless solution needs to analyze existing data and new data by using SQL. The company stores the data in an Amazon S3 bucket. The data must be encrypted at rest and replicated to a different AWS Region.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":69,"options":[{"letter":"A","text":"Store the credentials in AWS Systems Manager Parameter Store. Configure the application to load the database credentials from Parameter Store. Set up a credentials rotation schedule in the RDS for MySQL database by using Parameter Store."},{"letter":"B","text":"Store the credentials in AWS Secrets Manager. Configure the application to load the database credentials from Secrets Manager. Set up a credentials rotation schedule by creating an AWS Lambda function for Secrets Manager."},{"letter":"C","text":"Store the credentials ion will meet these requirements MOST cost-effectively?"},{"id":101,"options":[{"letter":"A","text":"Add more Provisioned IOPS SSD (io1) EBS volumes. Use OS commands to create a Logical Volume Management (LVM) stripe."},{"letter":"B","text":"Increase the size of the Provisioned IOPS SSD (io1) EBS volume to 2 TB."},{"letter":"C","text":"Change the EC2 Linux instance to a storage optimized instance type. Do not change the Provisioned IOPS SSD (io1) EBS volume."},{"letter":"D","text":"Increase the Provisioned IOPS SSD (io1) EBS volume to more than 64,000 IOPS."}],"answer":["A"],"question":"A company recently performed a lift and shift migration of its on-premises Oracle database workload to run on an Amazon EC2 memory optimized Linux instance. The EC2 Linux instance uses a 1 TB Provisioned IOPS SSD (io1) EBS volume with 64,000 IOPS.\nThe database storage performance after the migration is slower than the performance of the on-premises database.\nWhich solution will improve storage performance?"},{"id":102,"options":[{"letter":"A","text":"Use an archive tool to group the files into large objects. Use DataSync to copy the objects to S3 Standard-Infrequent Access (S3 Standard-IA). Use a lifecycle configuration to transition the files to S3 Glacier Instant Retrieval after 1 year with a retention period of 7 years."},{"letter":"B","text":"Use an archive tool to group the files into large objects. Use DataSync to migrate the objects. Store the objects in S3 Glacier Instant Retrieval for the first year. Use a lifecycle configuration to transition the files to S3 Glacier Deep Archive after 1 year with a retention period of 7 years."},{"letter":"C","text":"Configure a DataSync task to transfer the files to S3 Standard-Infrequent Access (S3 Standard-IA). Use a lifecycle configuration to transition the files to S3 Deep Archive after 1 year with a retention period of 7 years."},{"letter":"D","text":"Configure the destination storage class for the files as S3 Glacier Instant Retrieval. Use a lifecycle policy to transition the files to S3 Glacier Flexible Retrieval after 1 year with a retention period of 7 years."}],"answer":["B"],"question":"A company is using AWS DataSync to migrate millions of files from an on-premises system to AWS. The files are 10 KB in size on average.\nThe company wants to use Amazon S3 for file storage. For the first year after the migration, the files will be accessed once or twice and must be immediately available. After 1 year, the files must be archived for at least 7 years.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":103,"options":[{"letter":"A","text":"Use a Gateway Load Balancer (GWLB) to manage web traffic. Use Amazon Elastic Container Service (Amazon ECS) to receive and process customer orders. Use the GWLB to capture and store unprocessed orders. Use Amazon DynamoDB to store processed customer orders."},{"letter":"B","text":"Use a Network Load Balancer (NLB) to manage web traffic. Use an Application Load Balancer to receive customer orders from the NLB. Use Amazon Redshift with a Multi-AZ deployment to store unprocessed and processed customer orders."},{"letter":"C","text":"Use a NAT gateway to manage web traffic. Use Amazon EC2 Auto Scaling groups to receive, process, and store processed customer orders. Use an AWS Lambda function to capture and store unprocessed orders."},{"letter":"D","text":"Use an Application Load Balancer to manage web traffic. Use Amazon EC2 Auto Scaling groups to receive and process customer orders. Use Amazon Simple Queue Service (Amazon SQS) to store unprocessed orders. Use Amazon RDS with a Multi-AZ deployment to store processed customer orders."}],"answer":["D"],"question":"A company needs to design a resilient web application to process customer orders. The web application must automatically handle increases in web traffic and application usage without affecting the customer experience or losing customer orders.\nWhich solution will meet these requirements?"},{"id":104,"options":[{"letter":"A","text":"Create separate AWS KMS keys for each customer's data that have granular access control and logging enabled."},{"letter":"B","text":"Generate a unique encryption key for each customer. Store the keys in an Amazon S3 bucket. Enable server-side encryption."},{"letter":"C","text":"Deploy a hardware security appliance in the AWS environment that securely stores customer-provided encryption keys. Integrate the security appliance with AWS KMS to encrypt the sensitive data in the application."},{"letter":"D","text":"Create a single AWS KMS key to encrypt all sensitive data across the application."}],"answer":["A"],"question":"A company is designing an application on AWS that processes sensitive data. The application stores and processes financial data for multiple customers.\nTo meet compliance requirements, the data for each customer must be encrypted separately at rest by using a secure, centralized key management solution. The company wants to use AWS Key Management Service (AWS KMS) to implement encryption.\nWhich solution will meet these requirements with the LEAST operational overhead?"},{"id":105,"options":[{"letter":"A","text":"Deploy an Amazon ElastiCache for Memcached duster. Store the player data in the ElastiCache cluster."},{"letter":"B","text":"Deploy an Amazon ElastiCache for Redis duster. Store the player data in the ElastiCache cluster."},{"letter":"C","text":"Create Amazon EC2 instances in multiple AWS Regions. Store the player data on the EC2 instances. Configure Amazon Route 53 with geolocation records to direct users to the closest EC2 instance."},{"letter":"D","text":"Configure an Amazon CloudFront distribution with an Amazon S3 bucket as the origin. Store the player data in the S3 bucket."}],"answer":["B"],"question":"A video game company is deploying a new gaming application to its global users. The company requires a solution that will provide near real-time reviews and rankings of the players
