loper will use S3 Standard storage for the first 180 days. The developer needs to configure an S3 Lifecycle rule.\nWhich solution will meet these requirements MOST cost-effectively?"},{"id":370,"options":[{"letter":"A","text":"Use Amazon Comprehend to translate the audio recordings into English."},{"letter":"B","text":"Use Amazon Lex to create the written sentiment analysis reports."},{"letter":"C","text":"Use Amazon Transcribe to convert the audio recordings in any language into text."},{"letter":"D","text":"Use Amazon Polly to convert the audio recordings into text."},{"letter":"E","text":"Use Amazon Translate to translate text in any language to English."},{"letter":"F","text":"Use Amazon Comprehend to create the sentiment analysis reports."}],"answer":["C","E","F"],"question":"A company wants to use artificial intelligence (AI) to determine the quality of its customer service calls. The company currently manages calls in four different languages, including English. The company will offer new languages in the future. The company does not have the resources to regularly maintain machine learning (ML) models.\nThe company needs to create written sentiment analysis reports from the customer service call recordings. The customer service call recording text must be translated into English.\nWhich combination of steps will meet these requirements? (Choose three.)"},{"id":371,"options":[{"letter":"A","text":"Configure the General Purpose SSD (gp2) EBS volume storage type and provision 15,000 IOPS."},{"letter":"B","text":"Configure the Provisioned IOPS SSD (io1) EBS volume storage type and provision 15,000 IOPS."},{"letter":"C","text":"Configure the General Purpose SSD (gp3) EBS volume storage type and provision 15,000 IOPS."},{"letter":"D","text":"Configure the EBS magnetic volume type to achieve maximum IOPS."}],"answer":["C"],"question":"An ecommerce company runs a PostgreSQL database on premises. The database stores data by using high IOPS Amazon Elastic Block Store \": \"Deny\",\n\"Action\": \"ds:Delete*\",\n\"Resource\": \"*\"\n}\n]\n}\nA cloud engineer is added as an IAM user to the IAM group. Which action will the cloud engineer be able to perform?"},{"id":383,"options":[{"letter":"A","text":"AWS ECS Fargate"},{"letter":"B","text":"Amazon EC2 Auto Scaling"},{"letter":"C","text":"Amazon DynamoDB"},{"letter":"D","text":"MySQL-compatible Amazon Aurora"},{"letter":"E","text":"AWS Lambda"}],"answer":["C","E"],"question":"A solutions architect is designing a new service behind Amazon API Gateway. The request patterns for the service will be unpredictable and can change suddenly from 0 requests to over 500 per second. The total size of the data that needs to be persisted in a backend database is currently less than 1 GB with unpredictable future growth. Data can be queried using simple key-value requests.\nWhich combination of AWS services would meet these requirements? (Choose two.)"},{"id":384,"options":[{"letter":"A","text":"Create an Amazon EC2 Windows instance. Install and configure a Windows file share role on the instance. Connect the application server to the file share."},{"letter":"B","text":"Create an Amazon FSx for Windows File Server file system. Attach the file system to the origin server. Connect the application server to the file system."},{"letter":"C","text":"Create an AWS Storage Gateway tape gateway. Configure tapes to use Amazon S3. Connect the application server to the tape gateway."},{"letter":"D","text":"Create an AWS Storage Gateway volume gateway. Create a file share that uses the required client protocol. Connect the application server to the file share."}],"answer":["B"],"question":"A company is implementing a shared storage solution for a media application that is hosted in the AWS Cloud. The company needs the ability to use SMB clients to access data. The solution must be fully managed.\nWhich AWS solution meets these requirements?"},{"id":385,"options":[{"letter":"A","text":"Add the root user to a group containing administrative permissions."},{"letter":"B","text":"Store root user access keys in an encrypted Amazon S3 bucket."},{"letter":"C","text":"Apply the required permissions to the root user with an inline policy document."},{"letter":"D","text":"Enable multi-factor authentication to the root user."},{"letter":"E","text":"Ensure the root user uses a strong password."}],"answer":["D","E"],"question":"A solutions architect has created a new AWS account and must secure AWS account root user access.\nWhich combination of actions will accomplish this? (Choose two.)"},{"id":386,"options":[{"letter":"A","text":"Use an AWS CloudFormation template to deploy the complete solution. Redeploy the CloudFormation stack every 30 days, and delete the original stack."},{"letter":"B","text":"Extend the application to add an attribute that has a value of the current timestamp plus 30 days to each new item that is created in the table. Configure DynamoDB to use the attribute as the TTL attribute."},{"letter":"C","text":"Use an EC2 instance that runs a monitoring application from AWS Marketplace. Configure the monitoring application to use Amazon DynamoDB Streams to store the timestamp when a new item is created in the table. Use a script that runs on the EC2 instance to delete items that have a timestamp that is older than 30 days."},{"letter":"D","text":"Configure Amazon DynamoDB Streams to invoke an AWS Lambda function when a new item is created in the table. Configure the Lambda function to delete items in the table that are older than 30 days."}],"answer":["B"],"question":"A company runs an application on a large fleet of Amazon EC2 instances. The application reads and writes entries into an Amazon DynamoDB table. The size of the DynamoDB table continuously grows, but the application needs only data from the last 30 days. The company needs a solution that minimizes cost and development effort.\nWhich solution meets these requirements?"},{"id":387,"options":[{"letter":"A","text":"Serve read traffic from the Multi-AZ standby instance."},{"letter":"B","text":"Configure the DB instance to use Transfer Acceleration."},{"letter":"C","text":"Create a read replica from the source DB instance. Serve read traffic from the read replica."},{"letter":"D","text":"Use Amazon Kinesis Data Firehose between the application and Amazon RDS to increase the concurrency of database requests."}],"answer":["C"],"question":"A company manages an application that stores data on an Amazon RDS for PostgreSQL Multi-AZ DB instance. Increases in traffic are causing performance problems. The company determines that database queries are the primary reason for the slow performance.\nWhat should a solutions architect do to improve the application's performance?"},{"id":388,"options":[{"letter":"A","text":"Set up AWS Transfer Family with SFTP for Amazon S3. Configure integrated Active Directory authentication."},{"letter":"B","text":"Set up AWS DataSync to synchronize between the on-premises location and the S3 location by using AWS IAM Identity Center (AWS Single Sign-On)."},{"letter":"C","text":"Set up a Windows Amazon EC2 instance with SFTP to connect the on-premises client with Amazon S3. Integrate AWS Identity and Access Management (IAM)."},{"letter":"D","text":"Set up AWS Database Migration Service (AWS DMS) to synchronize the on-premises client with Amazon S3. Configure integrated Active Directory authentication."}],"answer":["A"],"question":"A company wants to give a customer the ability to use on-premises Microsoft Active Directory to download files that are stored in Amazon S3. The customer’s application uses an SFTP client to download the files.\nWhich solution will meet these requirements with the LEAST operational overhead and no changes to the customer’s application?"},{"id":389,"options":[{"letter":"A","text":"Use scheduled scaling actions to scale up and scale down the Auto Scaling group."},{"letter":"B","text":"Use a target tracking policy to dynamically scale the Auto Scaling group."},{"letter":"C","text":"Use an AWS Lambda function ta update the desired Auto Scaling group capacity."},{"letter":"D","text":"Use a simple scaling policy to dynamically scale the Auto Scaling group."}],"answer":["B"],"question":"An application runs on Amazon EC2 instances across multiple Availability Zones. The instances run in an Amazon EC2 Auto Scaling group behind an Application Load Balancer. The application performs best when the CPU utilization of the EC2 instances is at or near 40%.\nWhat should a solutions architect do to maintain the desired performance across all instances in the group?"},{"id":390,"options":[{"letter":"A","text":"Create a script that runs locally on an Amazon EC2 Reserved Instance that is triggered by a cron job."},{"letter":"B","text":"Create an AWS Lambda function triggered by an Amazon EventBridge scheduled event."},{"letter":"C","text":"Use an Amazon Elastic Container Service (Amazon ECS) Fargate task triggered by an Amazon EventBridge scheduled event."},{"letter":"D","text":"Use an Amazon Elastic Container Service (Amazon ECS) task running on Amazon EC2 triggered by an Amazon EventBridge scheduled event."}],"answer":["C"],"question":"A solutions architect is creating a data processing job that runs once daily and can take up to 2 hours to complete. If the job is interrupted, it has to restart from the beginning.\nHow should the solutions architect address this issue in the MOST cost-effective manner?"}];
const LETTERS = ['A','B','C','D','E','F','G'];

// ---- helpers ----
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const $ = s => document.querySelector(s);

document.getElementById('total').textContent = BANK.length;
document.getElementById('bankInfo').textContent = BANK.length + ' câu · ' + BANK.filter(q=>q.answer.length>1).length + ' câu nhiều đáp án';

// presets
let chosenN = Math.min(65, BANK.length);
const presets = [10,20,65,130,BANK.length];
const presetsEl = $('#presets');
[...new Set(presets)].forEach(n=>{
  const c=document.createElement('div');c.className='chip';c.dataset.n=n;
  c.textContent = (n===BANK.length? 'Toàn bộ '+n : n+' câu');
  c.onclick=()=>{chosenN=n;$('#customN').value='';renderChips();};
  presetsEl.appendChild(c);
});
function renderChips(){document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',Number(c.dataset.n)===chosenN));}
renderChips();
$('#customN').addEventListener('input',e=>{const v=Number(e.target.value);if(v>0){chosenN=v;renderChips();}});

// ---- state ----
let quiz=[], idx=0, score=0, locked=false, results=[];

$('#startBtn').onclick=()=>{
  let pool = BANK;
  if($('#onlyMulti').checked) pool = BANK.filter(q=>q.answer.length>1);
  if(!pool.length){alert('Không có câu phù hợp.');return;}
  const n = Math.min(Math.max(1,chosenN), pool.length);
  quiz = shuffle(pool).slice(0,n).map(q=>({...q, opts: shuffle(q.options)}));
  idx=0;score=0;results=[];
  $('#setup').classList.add('hidden');$('#result').classList.add('hidden');$('#quiz').classList.remove('hidden');
  renderQ();
};

function renderQ(){
  locked=false;
  const q=quiz[idx];
  const multi=q.answer.length>1;
  $('#qNum').textContent='Câu '+(idx+1)+' / '+quiz.length;
  $('#scoreLbl').textContent='Điểm: '+score+' / '+quiz.length;
  $('#bar').style.width=((idx)/quiz.length*100)+'%';
  $('#qText').textContent=q.question;
  $('#qHint').textContent = multi ? '(Chọn '+q.answer.length+' đáp án)' : '';
  const optsEl=$('#opts');optsEl.innerHTML='';
  q.opts.forEach((o)=>{
    const lab=document.createElement('label');lab.className='opt';lab.dataset.letter=o.letter;
    const inp=document.createElement('input');inp.type=multi?'checkbox':'radio';inp.name='opt';inp.value=o.letter;
    inp.onchange=onSelect;
    lab.appendChild(inp);
    const wrap=document.createElement('span');
    wrap.innerHTML='<span class="letter">'+o.letter+'.</span> '+escapeHtml(o.text);
    lab.appendChild(wrap);
    lab.onclick=e=>{if(locked){e.preventDefault();}};
    optsEl.appendChild(lab);
  });
  $('#fb').classList.add('hidden');
  $('#checkBtn').classList.remove('hidden');$('#checkBtn').disabled=true;
  $('#nextBtn').classList.add('hidden');
  $('#nextBtn').textContent = idx===quiz.length-1 ? 'Xem kết quả →' : 'Câu tiếp →';
}

function onSelect(){
  document.querySelectorAll('#opts .opt').forEach(l=>l.classList.toggle('sel',l.querySelector('input').checked));
  $('#checkBtn').disabled = !document.querySelector('#opts input:checked');
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

$('#checkBtn').onclick=()=>{
  if(locked)return;locked=true;
  const q=quiz[idx];
  const picked=[...document.querySelectorAll('#opts input:checked')].map(i=>i.value);
  const correct=q.answer;
  const isRight = picked.length===correct.length && picked.every(p=>correct.includes(p));
  document.querySelectorAll('#opts .opt').forEach(l=>{
    const L=l.dataset.letter;l.classList.add('locked');
    l.querySelector('input').disabled=true;
    if(correct.includes(L)) l.classList.add('correct');
    else if(picked.includes(L)) l.classList.add('wrong');
  });
  if(isRight)score++;
  const fb=$('#fb');fb.classList.remove('hidden','ok','bad');
  fb.classList.add(isRight?'ok':'bad');
  fb.textContent = isRight ? '✓ Chính xác!' : '✗ Sai. Đáp án đúng: '+correct.join(', ');
  $('#scoreLbl').textContent='Điểm: '+score+' / '+quiz.length;
  $('#bar').style.width=((idx+1)/quiz.length*100)+'%';
  $('#checkBtn').classList.add('hidden');$('#nextBtn').classList.remove('hidden');
  results.push({q, picked, correct, isRight});
};

$('#nextBtn').onclick=()=>{ if(idx<quiz.length-1){idx++;renderQ();} else showResult(); };
$('#quitBtn').onclick=()=>{ if(confirm('Kết thúc và xem kết quả với các câu đã làm?')) showResult(); };

function showResult(){
  $('#quiz').classList.add('hidden');$('#result').classList.remove('hidden');
  const done=results.length;
  const pctVal = done? Math.round(score/done*100):0;
  const pass = pctVal>=72;
  const pctEl=$('#pct');pctEl.textContent=pctVal+'%';pctEl.className='big '+(pass?'pass':'fail');
  $('#resLine').textContent='Đúng '+score+' / '+done+' câu — '+(pass?'ĐẠT ✅ (ngưỡng 72%)':'CHƯA ĐẠT (cần ≥72%)');
  buildReview();
  $('#review').classList.add('hidden');$('#reviewToggle').textContent='Xem lại câu sai';
}

function buildReview(){
  const wrong=results.filter(r=>!r.isRight);
  const rv=$('#review');rv.innerHTML='';
  if(!wrong.length){rv.innerHTML='<p class="small">Tuyệt vời — không có câu sai nào! 🎉</p>';return;}
  const h=document.createElement('p');h.className='small mb-1';h.textContent=wrong.length+' câu sai:';rv.appendChild(h);
  wrong.forEach(r=>{
    const d=document.createElement('div');d.className='review-item';
    let opts='';
    r.q.opts.forEach(o=>{
      const isC=r.correct.includes(o.letter), isP=r.picked.includes(o.letter);
      let tag='';
      if(isC) tag='<span class="tag ok">ĐÚNG</span>';
      if(isP&&!isC) tag='<span class="tag bad">Bạn chọn</span>';
      opts+='<div class="ans-line">'+tag+'<span class="l">'+o.letter+'.</span> '+escapeHtml(o.text)+'</div>';
    });
    d.innerHTML='<div class="ri-q">Câu gốc #'+r.q.id+': '+escapeHtml(r.q.question)+'</div>'+opts;
    rv.appendChild(d);
  });
}

$('#reviewToggle').onclick=()=>{const rv=$('#review');const hid=rv.classList.toggle('hidden');
  $('#reviewToggle').textContent= hid?'Xem lại câu sai':'Ẩn câu sai';};
$('#againBtn').onclick=()=>{$('#result').classList.add('hidden');$('#setup').classList.remove('hidden');};

// keyboard: Enter = check/next
document.addEventListener('keydown',e=>{
  if($('#quiz').classList.contains('hidden'))return;
  if(e.key==='Enter'){
    if(!$('#nextBtn').classList.contains('hidden'))$('#nextBtn').click();
    else if(!$('#checkBtn').disabled)$('#checkBtn').click();
  }
});
</script>
</body>
</html>
